<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 14px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #111;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(4px);
    }
    h3 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 1rem;
      color: #ff0050;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    p {
      font-size: 0.8rem;
      color: #aaa;
      line-height: 1.4;
      margin-bottom: 14px;
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #ff0050 0%, #b0003a 100%);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }
    .btn:active {
      transform: translateY(0);
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      font-size: 0.78rem;
      display: none;
      text-align: center;
      line-height: 1.3;
    }
    .status.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      display: block;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>🔑 Zero FM Session Sync</h3>
    <p>Asegúrate de estar logueado en tiktok.com en este navegador, luego haz clic en el botón de abajo.</p>
    <button class="btn" id="sync-btn">🔗 Sincronizar Cookie</button>
    <div class="status" id="status-box"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
