<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cola de Pedidos - Zero FM</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <!-- Configuración compartida de Firebase -->
  <script src="firebase-config.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="queue.css">
</head>
<body>

  <div id="queue-container">
    <div id="empty-state">
      <div style="font-size: 40px; margin-bottom: 10px;">🎵</div>
      <div>Esperando solicitudes...</div>
    </div>
    <!-- Items se inyectarán aquí -->
  </div>

  <!-- Botón de Configuración -->
  <div id="notification-container"></div>
  <button id="settings-btn" title="Configurar Overlay">⚙️</button>
  
  <!-- Indicador de Duración Total -->
  <div id="total-duration-indicator" style="
      position: fixed; 
      bottom: 20px; 
      right: 20px; 
      background: rgba(0,0,0,0.7); 
      color: white; 
      padding: 8px 15px; 
      border-radius: 20px; 
      font-size: 14px; 
      font-weight: bold; 
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(5px);
      display: none;
      z-index: 9999;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  ">
    ⏳ Tiempo Total: <span id="total-time-val">0m</span>
  </div>

  <!-- Panel de Configuración -->
  <div id="settings-panel">
    <h3 style="margin-top:0; border-bottom: 1px solid #333; padding-bottom: 10px;">Configuración</h3>
    
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('general')">General</button>
      <button class="tab-btn" onclick="switchTab('appearance')">Apariencia</button>
      <button class="tab-btn" onclick="switchTab('animations')">Animación</button>
      <button class="tab-btn" onclick="switchTab('data')">Datos/API</button>
    </div>

    <!-- TAB: GENERAL -->
    <div id="tab-general" class="tab-content active">
        <div class="settings-group">
          <label>Tema de Interfaz</label>
          <select id="inp-theme">
            <option value="classic">Clásico (Original)</option>
            <option value="neon-glass">Neon Glass (Premium)</option>
            <option value="vision">Apple Vision (Glassmorphic)</option>
          </select>
        </div>

        <div class="settings-group">
          <label>Ancho de Tarjeta (px)</label>
          <input type="number" id="inp-width" value="350" min="0">
        </div>

        <div class="settings-group">
          <label>Alto Mínimo de Tarjeta (px)</label>
          <input type="number" id="inp-minHeight" value="80" min="0">
        </div>

        <div class="settings-group">
          <label>Espacio entre Tarjetas (px)</label>
          <input type="number" id="inp-spacing" value="15" min="0">
        </div>

        <div class="settings-group">
          <label>Radio de Borde (px)</label>
          <input type="number" id="inp-borderRadius" value="6" min="0">
        </div>

        <div class="settings-group">
          <label>Relleno (Padding) (px)</label>
          <input type="number" id="inp-padding" value="15" min="0">
        </div>

        <div class="settings-group">
          <label>Espaciado Textos (Gap) (px)</label>
          <input type="number" id="inp-textGap" value="4" min="0">
        </div>
        
        <div class="settings-group">
          <label>Simulación</label>
          <div style="display: flex; gap: 10px;">
            <button class="btn" style="background: #333;" onclick="simulateQueueRequest()">+ Pedido</button>
            <button class="btn" style="background: #333;" onclick="simulateToggleFirst(event)" title="Shift+click = skip (sin puntos)">Next</button>
          </div>
        </div>
    </div>

    <!-- TAB: APARIENCIA -->
    <div id="tab-appearance" class="tab-content">
        <div class="settings-group" style="display: flex; gap: 10px; flex-wrap: wrap;">
           <label style="width: 100%;">Visibilidad de Elementos</label>
           <label style="display: inline-flex; align-items: center; gap: 5px; cursor: pointer;">
             <input type="checkbox" id="inp-showHeader" checked> Cabecera
           </label>
           <label style="display: inline-flex; align-items: center; gap: 5px; cursor: pointer;">
             <input type="checkbox" id="inp-showArtist" checked> Artista
           </label>
           <label style="display: inline-flex; align-items: center; gap: 5px; cursor: pointer;">
             <input type="checkbox" id="inp-showUser" checked> Usuario
           </label>
            <label style="display: inline-flex; align-items: center; gap: 5px; cursor: pointer;">
              <input type="checkbox" id="inp-showEmpty" checked> Mensaje Vacío
            </label>
         </div>

         <div class="settings-group">
           <label>Fuente</label>
          <select id="inp-font">
            <option value="'Montserrat', sans-serif">Montserrat</option>
            <option value="'Roboto', sans-serif">Roboto</option>
            <option value="'Open Sans', sans-serif">Open Sans</option>
            <option value="'Lato', sans-serif">Lato</option>
            <option value="sans-serif">System Default</option>
          </select>
        </div>

        <div class="settings-group">
          <label>Tamaño de Fuente Base (px)</label>
          <input type="number" id="inp-fontSize" value="16" min="0">
        </div>

        <div class="settings-group">
          <label>Color de Acento</label>
          <input type="color" id="inp-accent" value="#00e5ff">
        </div>

        <div class="settings-group">
          <label>Color de Fondo</label>
          <input type="color" id="inp-bg" value="#000000">
        </div>

        <div class="settings-group">
          <label>Color de Texto</label>
          <input type="color" id="inp-text" value="#ffffff">
        </div>

        <div class="settings-group">
          <label>Opacidad Tarjeta Principal</label>
          <input type="range" id="inp-primaryOpacity" min="0" max="100" value="100" oninput="document.getElementById('primary-opacity-val').innerText = this.value + '%'">
          <span id="primary-opacity-val" style="float: right; margin-top: -30px; margin-right: 10px; font-size: 12px; color: #aaa;">100%</span>
        </div>

        <div class="settings-group">
          <label>Opacidad Tarjetas Cola</label>
          <input type="range" id="inp-secondaryOpacity" min="0" max="100" value="60" oninput="document.getElementById('opacity-val').innerText = this.value + '%'">
          <span id="opacity-val" style="float: right; margin-top: -30px; margin-right: 10px; font-size: 12px; color: #aaa;">60%</span>
        </div>

        <div class="settings-group">
          <label>Máximo de Tarjetas (3-6)</label>
          <input type="range" id="inp-maxCards" min="3" max="6" value="3" step="1" oninput="document.getElementById('max-cards-val').innerText = this.value">
          <span id="max-cards-val" style="float: right; margin-top: -30px; margin-right: 10px; font-size: 12px; color: #aaa;">3</span>
        </div>

        <div class="settings-group">
            <label>Nivelador de Anchura (Ajuste fino)</label>
            <input type="range" id="inp-widthScale" min="0.5" max="1.5" value="1.0" step="0.05" oninput="document.getElementById('width-scale-val').innerText = this.value + 'x'">
            <span id="width-scale-val" style="float: right; margin-top: -30px; margin-right: 10px; font-size: 12px; color: #aaa;">1.0x</span>
        </div>

        <div class="settings-group">
            <label>Nivelador de Altura (Ajuste fino)</label>
            <input type="range" id="inp-heightScale" min="0.5" max="1.5" value="1.0" step="0.05" oninput="document.getElementById('height-scale-val').innerText = this.value + 'x'">
            <span id="height-scale-val" style="float: right; margin-top: -30px; margin-right: 10px; font-size: 12px; color: #aaa;">1.0x</span>
        </div>
    </div>

    <!-- TAB: ANIMACIONES -->
    <div id="tab-animations" class="tab-content">
        <div class="settings-group">
          <label>Animación de Entrada</label>
          <select id="inp-animEntry">
            <option value="anim-entry-slide-left">Slide Left (Default)</option>
            <option value="anim-entry-slide-up">Slide Up</option>
            <option value="anim-entry-fade">Fade In</option>
            <option value="anim-entry-zoom">Zoom In</option>
          </select>
        </div>

        <div class="settings-group">
          <label>Animación de Salida</label>
          <select id="inp-animExit">
            <option value="anim-exit-slide-right">Slide Right (Default)</option>
            <option value="anim-exit-slide-down">Slide Down</option>
            <option value="anim-exit-fade">Fade Out</option>
            <option value="anim-exit-zoom">Zoom Out</option>
          </select>
        </div>
    </div>

    <!-- TAB: DATA/API (NUEVO) -->
    <div id="tab-data" class="tab-content">
        <div class="settings-group">
           <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
             <input type="checkbox" id="inp-autocorrect"> 
             <div>
               <strong>🧠 Autocorregir Nombres</strong><br>
               <small style="color:#aaa;">Usa Apple Music para corregir títulos</small>
             </div>
           </label>
        </div>

        <div class="settings-group">
           <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
             <input type="checkbox" id="inp-showAlbumArt"> 
             <div>
               <strong>🎨 Portadas HQ</strong><br>
               <small style="color:#aaa;">Muestra carátula del álbum (600x600)</small>
             </div>
           </label>
        </div>

        <div class="settings-group">
           <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
             <input type="checkbox" id="inp-showWaitTime"> 
             <div>
               <strong>⏱️ Tiempo de Espera</strong><br>
               <small style="color:#aaa;">Muestra "Siguiente" o "en X min"</small>
             </div>
           </label>
        </div>

        <div class="settings-group">
           <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
             <input type="checkbox" id="inp-showTotalDuration"> 
             <div>
               <strong>📊 Duración Total Cola</strong><br>
               <small style="color:#aaa;">Indicador flotante del tiempo total</small>
             </div>
           </label>
        </div>

        <div class="settings-group">
           <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
             <input type="checkbox" id="inp-syncAppleMusic"> 
             <div>
               <strong>🎵 Sincronizar Apple Music</strong><br>
               <small style="color:#aaa;">Marca canciones como reproducidas (Req. Cider/Widget)</small>
             </div>
           </label>
        </div>
    </div>

    <div class="settings-actions">
      <button class="btn btn-reset" onclick="resetSettings()">Reset</button>
      <button class="btn btn-save" onclick="saveSettings()">Guardar</button>
    </div>
  </div>

  <!-- Controles de Depuración -->
   <div id="debug-controls" style="position: fixed; bottom: 20px; left: 20px; opacity: 0.2; transition: opacity 0.3s; z-index: 10000;">
     <button onclick="simulateQueueRequest()" style="padding: 10px; cursor: pointer;">➕ Simular Pedido</button>
     <button onclick="toggleMarkPanel()" onmouseenter="showMarkPanel()" onmouseleave="scheduleHideMarkPanel()" style="padding: 10px; cursor: pointer;" title="Abrir acciones de marcado">✅ Marcar</button>
     <button onclick="toggleDebugBorders()" style="padding: 10px; cursor: pointer;">🖼️ Ver Bordes</button>
     <button onclick="toggleWidgetMover()" style="padding: 10px; cursor: pointer;">🧩 Mover Widget</button>
   </div>
   <div id="mark-panel" onmouseenter="cancelHideMarkPanel()" onmouseleave="scheduleHideMarkPanel()" style="position: fixed; bottom: 80px; left: 20px; z-index: 10001; background: rgba(0,0,0,0.80); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 10px; color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; width: 220px;" hidden>
     <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;">
       <strong>Marcar canción</strong>
       <button onclick="toggleMarkPanel()" style="padding: 6px 8px; cursor:pointer; border-radius: 10px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.06); color:#fff;">Cerrar</button>
     </div>
     <div style="display:flex; gap:8px;">
       <button onclick="markFirstPendingFromPanel(true)" style="flex:1; padding: 10px; cursor:pointer; border-radius: 12px; border: 1px solid rgba(255,255,255,0.25); background: rgba(251,191,36,0.15); color:#fff; font-weight: 700;">⏭️ Skip</button>
       <button onclick="markFirstPendingFromPanel(false)" style="flex:1; padding: 10px; cursor:pointer; border-radius: 12px; border: 1px solid rgba(255,255,255,0.25); background: rgba(34,197,94,0.15); color:#fff; font-weight: 700;">✅ Reproducida</button>
     </div>
     <div style="font-size: 12px; opacity: 0.85; margin-top: 10px; line-height: 1.25;">
       Skip marca sin puntos. Reproducida marca y suma puntos.
     </div>
   </div>
  <div id="widget-mover" style="position: fixed; bottom: 80px; left: 20px; z-index: 10001; background: rgba(0,0,0,0.86); border: 1px solid rgba(255,255,255,0.18); border-radius: 16px; padding: 12px; color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; width: 380px; max-width: calc(100vw - 24px); max-height: 58vh; overflow: auto; box-shadow: 0 16px 40px rgba(0,0,0,0.45); backdrop-filter: blur(10px);" hidden>
     <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;">
       <strong>Mover tarjetas (cola)</strong>
       <div style="display:flex; gap:8px; align-items:center;">
         <button onclick="resetManualOrder()" style="padding: 6px 8px; cursor:pointer; border-radius: 10px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.06); color:#fff;">Reset</button>
         <button onclick="toggleWidgetMover()" style="padding: 6px 8px; cursor:pointer; border-radius: 10px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.06); color:#fff;">Cerrar</button>
       </div>
     </div>
      <div id="widget-mover-list" style="display:flex; flex-direction:column; gap:10px;"></div>
     <div style="font-size: 12px; opacity: 0.85; margin-top: 10px; line-height: 1.25;">
       Arrastra una tarjeta para cambiar el orden. Esto escribe en manualOrders del día.
     </div>
   </div>

  <script src="queue.js" defer></script>
</body>
</html>
