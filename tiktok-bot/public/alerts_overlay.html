<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas Premium — Zero FM</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
    <!-- Lottie Player for high-quality alerts -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.4/dist/lottie-player.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        /* =============================================
           RESET & BASE
        ============================================= */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            font-size: var(--font-size-base, 16px);
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =============================================
           ALERT CONTAINER
        ============================================= */
        .alert-wrapper {
            position: relative;
            width: 480px;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 100;
        }

        /* =============================================
           MEDIA OVERLAYS & LOTTIE CONTAINER
        ============================================= */
        .media-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: -40px; /* Overlap with content for premium look */
            z-index: 2;
        }

        .media-container lottie-player {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .user-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            z-index: 3;
            animation: avatarPulse 2s infinite ease-in-out;
        }

        @keyframes avatarPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 30px rgba(255,255,255,0.2); }
            50%       { transform: scale(1.05); box-shadow: 0 8px 45px rgba(255,255,255,0.45); }
        }

        /* =============================================
           GLASSMOPHISM BOX (ALERT BODY)
        ============================================= */
        .alert-box {
            width: 100%;
            padding: 55px 30px 30px 30px;
            border-radius: var(--card-border-radius, 28px);
            background: rgba(15, 15, 25, var(--card-bg-opacity, 0.76));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: var(--card-border-width, 1px) var(--card-border-style, solid) var(--card-border-color, rgba(255, 255, 255, 0.08));
            box-shadow: 
                0 24px 70px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        /* Glow effect in background of alert box */
        .alert-glow {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Alert type theme glows */
        .type-follow .alert-glow    { background: radial-gradient(circle, rgba(236, 72, 153, 0.28) 0%, rgba(236, 72, 153, 0) 70%); }
        .type-gift .alert-glow      { background: radial-gradient(circle, rgba(234, 179, 8, 0.28) 0%, rgba(234, 179, 8, 0) 70%); }
        .type-subscribe .alert-glow { background: radial-gradient(circle, rgba(6, 182, 212, 0.28) 0%, rgba(6, 182, 212, 0) 70%); }
        .type-like .alert-glow      { background: radial-gradient(circle, rgba(239, 68, 68, 0.28) 0%, rgba(239, 68, 68, 0) 70%); }

        /* =============================================
           TYPOGRAPHY & TEXT EFFECTS
        ============================================= */
        .alert-title {
            font-size: 0.85em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.45);
        }

        .type-follow .alert-title    { color: #f472b6; }
        .type-gift .alert-title      { color: #fbbf24; }
        .type-subscribe .alert-title { color: #22d3ee; }
        .type-like .alert-title      { color: #f87171; }

        /* Username styling with Bounce & Rainbow capability */
        .username-container {
            font-size: 2.2em;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.5px;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            margin: 4px 0;
            perspective: 800px;
        }

        /* 3D bounce animation for letters */
        .bounce-char {
            display: inline-block;
            transform-origin: bottom center;
            animation: bounceLetter 0.6s ease infinite alternate;
            animation-delay: var(--delay);
            text-shadow: 
                0 1px 0 #1e1b4b,
                0 2px 0 #1e1b4b,
                0 3px 0 #1e1b4b,
                0 6px 15px rgba(0,0,0,0.5);
        }

        @keyframes bounceLetter {
            0% { transform: translateY(0) scaleY(1); }
            100% { transform: translateY(-12px) scaleY(0.92); }
        }

        /* Rainbow / Aurora color effect */
        .rainbow-text .bounce-char {
            background: linear-gradient(90deg, #ff007f, #7f00ff, #00f0ff, #ff007f);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: bounceLetter 0.6s ease infinite alternate, rainbowFlow 3s linear infinite;
            animation-delay: var(--delay), calc(var(--delay) * 0.5);
            text-shadow: none;
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .alert-message {
            font-size: 1.15em;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.2px;
        }

        /* =============================================
           PARTICLES / CONFETTI EFFECT
        ============================================= */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 5;
            animation: particleFly 1.8s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
        }

        @keyframes particleFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* =============================================
           ENTRY / EXIT TRANSITIONS
        ============================================= */
        .anim-enter {
            animation: alertEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .anim-exit {
            animation: alertExit 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
        }

        @keyframes alertEnter {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes alertExit {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-40px) scale(0.9);
            }
        }

        /* Responsive scaling for narrow viewports (e.g., dashboard previews) */
        @media (max-width: 520px) {
            .alert-wrapper {
                width: 90%;
                max-width: 440px;
            }
            .media-container {
                width: 180px;
                height: 180px;
                margin-bottom: -30px;
            }
            .user-avatar {
                width: 80px;
                height: 80px;
            }
            .alert-box {
                padding: 40px 20px 20px 20px;
            }
            .username-container {
                font-size: 1.8em;
            .alert-message {
                font-size: 1rem;
            }
        }

        /* =============================================
           CUSTOM CONFIGURATION OVERRIDES & SHADOWS
        ============================================= */
        .alert-box.no-card-bg {
            background: transparent !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        
        .alert-box.no-card-bg .alert-glow {
            display: none !important;
        }

        /* Text Shadow Styles */
        .shadow-style-none .bounce-char,
        .shadow-style-none .username-container,
        .shadow-style-none .alert-title,
        .shadow-style-none .alert-message {
            text-shadow: none !important;
            -webkit-text-stroke: unset !important;
        }

        .shadow-style-subtle .bounce-char,
        .shadow-style-subtle .username-container,
        .shadow-style-subtle .alert-title,
        .shadow-style-subtle .alert-message {
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.4) !important;
            -webkit-text-stroke: unset !important;
        }

        .shadow-style-3d-retro .bounce-char {
            text-shadow: 
                0 1px 0 #1e1b4b,
                0 2px 0 #1e1b4b,
                0 3px 0 #1e1b4b,
                0 6px 15px rgba(0,0,0,0.5) !important;
            -webkit-text-stroke: unset !important;
        }
        .shadow-style-3d-retro .username-container,
        .shadow-style-3d-retro .alert-title,
        .shadow-style-3d-retro .alert-message {
            text-shadow: 0 2px 4px rgba(0,0,0,0.6) !important;
            -webkit-text-stroke: unset !important;
        }

        .shadow-style-neon-glow .bounce-char,
        .shadow-style-neon-glow .username-container,
        .shadow-style-neon-glow .alert-title,
        .shadow-style-neon-glow .alert-message {
            text-shadow: 
                0 0 8px var(--theme-color-glow, #fff),
                0 0 20px var(--theme-color-glow, #fff),
                0 0 30px rgba(0, 0, 0, 0.8) !important;
            -webkit-text-stroke: unset !important;
        }

        .shadow-style-thick-stroke .bounce-char,
        .shadow-style-thick-stroke .username-container,
        .shadow-style-thick-stroke .alert-title,
        .shadow-style-thick-stroke .alert-message {
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 0px  4px 8px rgba(0, 0, 0, 0.8) !important;
            -webkit-text-stroke: 1.5px #000 !important;
        }

    </style>
</head>

<body>

    <div class="alert-wrapper" id="alertWrapper">
        <div class="media-container" id="mediaContainer">
            <!-- Dynamic Lottie Player or avatar goes here -->
            <img class="user-avatar" id="userAvatar" src="" style="display: none;" />
        </div>
        <div class="alert-box">
            <div class="alert-glow"></div>
            <div class="alert-title" id="alertTitle">Alerta</div>
            <div class="username-container" id="usernameContainer">Usuario</div>
            <div class="alert-message" id="alertMessage">¡Gracias por apoyarnos!</div>
        </div>
    </div>

    <!-- Hidden audio element for alerts -->
    <audio id="alertAudio" src="" preload="auto"></audio>

    <script>
        // =============================================
        //  CONFIGURACIÓN & PRESET ALERTS
        // =============================================
        var CID = new URLSearchParams(document.location.search).get("cid") || "";
        var urlType = new URLSearchParams(document.location.search).get("type") || "all";

        // Recursos multimedia premium (Lottie y Sonidos libres)
        const ALERT_THEMES = {
            follow: {
                title: "Nuevo Seguidor",
                lottie: "https://assets9.lottiefiles.com/packages/lf20_q45qp1.json", // Estrellas brillantes
                audio: "https://codesandbox.io/p/sandbox/github/zeroferreira/ZeroFM/resources/follow.mp3", // Fallback a sound general
                defaultAudio: "https://www.myinstants.com/media/sounds/notification_alert.mp3",
                color: "#ec4899"
            },
            gift: {
                title: "¡Regalo Recibido!",
                lottie: "https://assets6.lottiefiles.com/packages/lf20_LevelUp.json", // Explosión premium coins
                audio: "https://www.myinstants.com/media/sounds/gold-coins.mp3", // Sonido de monedas
                color: "#eab308"
            },
            subscribe: {
                title: "¡Nuevo Suscriptor!",
                lottie: "https://assets5.lottiefiles.com/packages/lf20_Trophy.json", // Trofeo brillante
                audio: "https://www.myinstants.com/media/sounds/level-up-epic.mp3", // Sonido premium nivel
                color: "#06b6d4"
            },
            like: {
                title: "¡Tormenta de Likes!",
                lottie: "https://assets10.lottiefiles.com/packages/lf20_like.json", // Corazón gigante explotando
                audio: "https://www.myinstants.com/media/sounds/pop-sound.mp3", // Sonido pop burbuja
                color: "#ef4444"
            }
        };

        // Configuración de Firebase (Sincronizado)
        const firebaseConfig = {
            apiKey: "AIzaSyA6c3EaIvuPEfM6sTV0YHqCBHuz35ZmNIU",
            authDomain: "zero-strom-web.firebaseapp.com",
            projectId: "zero-strom-web",
            storageBucket: "zero-strom-web.firebasestorage.app",
            messagingSenderId: "758369466349",
            appId: "1:758369466349:web:f2ced362a5a049c70b59e4"
        };

        // =============================================
        //  ESTADOS DE COLA
        // =============================================
        let db = null;
        let alertQueue = [];
        let isAlertPlaying = false;
        let activeAlertTimeout = null;
        let activeAlertExitTimeout = null;
        const overlayStartedAt = new Date(); // Para jugar solo alertas nuevas

        // =============================================
        //  INICIALIZAR FIREBASE
        // =============================================
        try {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("[Firebase] Alertas conectadas con éxito ✓ [Tipo URL: " + urlType + "]");

                // Escuchar personalización visual de alertas premium
                db.collection('systemConfig').doc('overlayAlertsConfig')
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            window.overlayAlertsConfig = data; // Guardamos todo en global
                            
                            if (data.likeslockOpacity !== undefined) window.likeslockOpacityOverride = data.likeslockOpacity;
                            if (data.likeslockRadius !== undefined) window.likeslockRadiusOverride = data.likeslockRadius;
                            
                            // Aplicar estilos estáticos de carga inicial
                            applyInitialStyles();
                        }
                    }, err => {
                        console.warn("[Firebase] Error al cargar overlayAlertsConfig para alertas:", err);
                    });

                // Escuchar la colección de notificaciones del Bot
                db.collection('notifications')
                    .where('timestamp', '>', overlayStartedAt)
                    .onSnapshot(snap => {
                        snap.docChanges().forEach(change => {
                            if (change.type === 'added') {
                                const data = change.doc.data();
                                // Validar que sea un tipo de alerta soportado
                                if (['follow', 'subscribe', 'gift', 'like'].includes(data.type)) {
                                    // Filtrar por tipo si está fijado en la URL
                                    if (urlType === 'all' || data.type === urlType) {
                                        console.log(`🔔 Alerta recibida desde bot [${data.type}]:`, data.user);
                                        addAlert(data);
                                    }
                                }
                            }
                        });
                    }, err => {
                        console.error("[Firebase] Error en listener de alertas:", err);
                    });
            }
        } catch (e) {
            console.error("[Firebase] No se pudo conectar:", e);
        }

        // Cargador dinámico de Google Fonts
        function loadFontDynamically(fontName) {
            if (!fontName) return;
            const linkId = `google-font-${fontName.toLowerCase().replace(/\s+/g, '-')}`;
            if (!document.getElementById(linkId)) {
                const link = document.createElement('link');
                link.id = linkId;
                link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g, '+')}:wght@400;600;700;800;900&display=swap`;
                document.head.appendChild(link);
            }
            document.body.style.fontFamily = `'${fontName}', sans-serif`;
        }

        // Aplicador dinámico de sombras y bordes de texto
        function applyTextShadow(shadowStyle, themeColor) {
            const wrapper = document.getElementById('alertWrapper');
            if (!wrapper) return;
            
            // Remover clases de sombra anteriores
            Array.from(wrapper.classList).forEach(className => {
                if (className.startsWith('shadow-style-')) {
                    wrapper.classList.remove(className);
                }
            });
            
            // Agregar la nueva clase de sombra
            const styleClass = shadowStyle || '3d-retro';
            wrapper.classList.add(`shadow-style-${styleClass}`);
            
            // Definir color acento para el brillo de neón
            document.documentElement.style.setProperty('--theme-color-glow', themeColor || '#fff');
        }

        // Aplicar estilos de diseño según el tipo fijado en la URL
        function applyInitialStyles() {
            const data = window.overlayAlertsConfig || {};
            const root = document.documentElement;
            
            // Si la URL es específica, aplicamos sus valores de inmediato
            if (urlType !== 'all') {
                let opacity = 0.76;
                let radius = 28;
                let fontSize = 16;
                let showCard = true;
                let fontFamily = 'Outfit';
                let textShadow = '3d-retro';
                
                if (urlType === 'follow') {
                    opacity = data.followOpacity !== undefined ? data.followOpacity : 0.76;
                    radius = data.followRadius !== undefined ? data.followRadius : 28;
                    fontSize = data.followFontSize !== undefined ? data.followFontSize : 16;
                    showCard = data.followShowCard !== undefined ? data.followShowCard : true;
                    fontFamily = data.followFontFamily !== undefined ? data.followFontFamily : 'Outfit';
                    textShadow = data.followTextShadow !== undefined ? data.followTextShadow : '3d-retro';
                } else if (urlType === 'like') {
                    opacity = data.likeOpacity !== undefined ? data.likeOpacity : 0.76;
                    radius = data.likeRadius !== undefined ? data.likeRadius : 28;
                    fontSize = data.likeFontSize !== undefined ? data.likeFontSize : 16;
                    showCard = data.likeShowCard !== undefined ? data.likeShowCard : true;
                    fontFamily = data.likeFontFamily !== undefined ? data.likeFontFamily : 'Outfit';
                    textShadow = data.likeTextShadow !== undefined ? data.likeTextShadow : '3d-retro';
                } else if (urlType === 'gift') {
                    opacity = data.giftOpacity !== undefined ? data.giftOpacity : 0.76;
                    radius = data.giftRadius !== undefined ? data.giftRadius : 28;
                    fontSize = data.giftFontSize !== undefined ? data.giftFontSize : 16;
                    showCard = data.giftShowCard !== undefined ? data.giftShowCard : true;
                    fontFamily = data.giftFontFamily !== undefined ? data.giftFontFamily : 'Outfit';
                    textShadow = data.giftTextShadow !== undefined ? data.giftTextShadow : '3d-retro';
                } else if (urlType === 'subscribe') {
                    opacity = data.subscribeOpacity !== undefined ? data.subscribeOpacity : 0.76;
                    radius = data.subscribeRadius !== undefined ? data.subscribeRadius : 28;
                    fontSize = data.subscribeFontSize !== undefined ? data.subscribeFontSize : 16;
                    showCard = data.subscribeShowCard !== undefined ? data.subscribeShowCard : true;
                    fontFamily = data.subscribeFontFamily !== undefined ? data.subscribeFontFamily : 'Outfit';
                    textShadow = data.subscribeTextShadow !== undefined ? data.subscribeTextShadow : '3d-retro';
                }
                
                let borderWidth = 1;
                let borderColor = '#ffffff';
                let borderOpacity = 8;
                let borderStyle = 'solid';
                
                if (urlType === 'follow') {
                    borderWidth = data.followBorderWidth !== undefined ? data.followBorderWidth : 1;
                    borderColor = data.followBorderColor || '#ffffff';
                    borderOpacity = data.followBorderOpacity !== undefined ? data.followBorderOpacity : 8;
                    borderStyle = data.followBorderStyle || 'solid';
                } else if (urlType === 'like') {
                    borderWidth = data.likeBorderWidth !== undefined ? data.likeBorderWidth : 1;
                    borderColor = data.likeBorderColor || '#ffffff';
                    borderOpacity = data.likeBorderOpacity !== undefined ? data.likeBorderOpacity : 8;
                    borderStyle = data.likeBorderStyle || 'solid';
                } else if (urlType === 'gift') {
                    borderWidth = data.giftBorderWidth !== undefined ? data.giftBorderWidth : 1;
                    borderColor = data.giftBorderColor || '#ffffff';
                    borderOpacity = data.giftBorderOpacity !== undefined ? data.giftBorderOpacity : 8;
                    borderStyle = data.giftBorderStyle || 'solid';
                } else if (urlType === 'subscribe') {
                    borderWidth = data.subscribeBorderWidth !== undefined ? data.subscribeBorderWidth : 1;
                    borderColor = data.subscribeBorderColor || '#ffffff';
                    borderOpacity = data.subscribeBorderOpacity !== undefined ? data.subscribeBorderOpacity : 8;
                    borderStyle = data.subscribeBorderStyle || 'solid';
                }
                
                const brVal = parseInt(borderColor.substr(1,2), 16) || 255;
                const bgVal = parseInt(borderColor.substr(3,2), 16) || 255;
                const bbVal = parseInt(borderColor.substr(5,2), 16) || 255;
                const bOp = borderOpacity / 100;
                
                root.style.setProperty('--card-border-width', borderWidth + 'px');
                root.style.setProperty('--card-border-style', borderStyle);
                root.style.setProperty('--card-border-color', `rgba(${brVal},${bgVal},${bbVal},${bOp})`);
                
                root.style.setProperty('--card-bg-opacity', opacity);
                root.style.setProperty('--card-border-radius', radius + 'px');
                root.style.setProperty('--font-size-base', fontSize + 'px');

                // Cargar fuente
                loadFontDynamically(fontFamily);

                // Alternar tarjeta
                const alertBox = document.querySelector('.alert-box');
                if (alertBox) {
                    if (!showCard) {
                        alertBox.classList.add('no-card-bg');
                    } else {
                        alertBox.classList.remove('no-card-bg');
                    }
                }

                // Cargar estilo de sombra
                const themeColors = { follow: '#ec4899', gift: '#eab308', subscribe: '#06b6d4', like: '#ef4444' };
                applyTextShadow(textShadow, themeColors[urlType] || '#fff');
            } else {
                // Si es general, cargamos la configuración clásica
                const opacity = data.alertsOpacity !== undefined ? data.alertsOpacity : 0.76;
                const radius = data.alertsRadius !== undefined ? data.alertsRadius : 28;
                const fontSize = data.alertsFontSize !== undefined ? data.alertsFontSize : 16;
                root.style.setProperty('--card-bg-opacity', opacity);
                root.style.setProperty('--card-border-radius', radius + 'px');
                root.style.setProperty('--font-size-base', fontSize + 'px');
            }
        }

        // =============================================
        //  AÑADIR A LA COLA
        // =============================================
        function addAlert(data) {
            alertQueue.push(data);
            processQueue();
        }

        // =============================================
        //  PROCESAR COLA
        // =============================================
        function processQueue() {
            if (isAlertPlaying || alertQueue.length === 0) return;
            isAlertPlaying = true;

            const currentAlert = alertQueue.shift();
            playAlert(currentAlert);
        }

        // =============================================
        //  PLAY ALERT
        // =============================================
        function playAlert(data) {
            const config = window.overlayAlertsConfig || {};
            const type = data.type; // 'follow', 'like', 'gift', 'subscribe'
            
            // Determinar si esta alerta específica está habilitada y cuáles son sus efectos
            let enableAlert = true;
            let playAudio = true;
            let showLottie = true;
            let ttsEnabled = true;
            let rainbowText = false;
            let bounceText = true;
            let showCard = true;
            let fontFamily = 'Outfit';
            let textShadow = '3d-retro';
            
            if (type === 'follow') {
                enableAlert = config.enableFollowAlert !== undefined ? config.enableFollowAlert : true;
                playAudio = config.followPlayAudio !== undefined ? config.followPlayAudio : true;
                showLottie = config.followShowLottie !== undefined ? config.followShowLottie : true;
                ttsEnabled = config.followTtsEnabled !== undefined ? config.followTtsEnabled : false;
                rainbowText = config.followRainbowText !== undefined ? config.followRainbowText : false;
                bounceText = config.followBounceText !== undefined ? config.followBounceText : true;
                showCard = config.followShowCard !== undefined ? config.followShowCard : true;
                fontFamily = config.followFontFamily !== undefined ? config.followFontFamily : 'Outfit';
                textShadow = config.followTextShadow !== undefined ? config.followTextShadow : '3d-retro';
            } else if (type === 'like') {
                enableAlert = config.enableLikeAlert !== undefined ? config.enableLikeAlert : true;
                playAudio = config.likePlayAudio !== undefined ? config.likePlayAudio : true;
                showLottie = config.likeShowLottie !== undefined ? config.likeShowLottie : true;
                ttsEnabled = config.likeTtsEnabled !== undefined ? config.likeTtsEnabled : false;
                rainbowText = config.likeRainbowText !== undefined ? config.likeRainbowText : false;
                bounceText = config.likeBounceText !== undefined ? config.likeBounceText : true;
                showCard = config.likeShowCard !== undefined ? config.likeShowCard : true;
                fontFamily = config.likeFontFamily !== undefined ? config.likeFontFamily : 'Outfit';
                textShadow = config.likeTextShadow !== undefined ? config.likeTextShadow : '3d-retro';
            } else if (type === 'gift') {
                enableAlert = config.enableGiftAlert !== undefined ? config.enableGiftAlert : true;
                playAudio = config.giftPlayAudio !== undefined ? config.giftPlayAudio : true;
                showLottie = config.giftShowLottie !== undefined ? config.giftShowLottie : true;
                ttsEnabled = config.giftTtsEnabled !== undefined ? config.giftTtsEnabled : true;
                rainbowText = config.giftRainbowText !== undefined ? config.giftRainbowText : true;
                bounceText = config.giftBounceText !== undefined ? config.giftBounceText : true;
                showCard = config.giftShowCard !== undefined ? config.giftShowCard : true;
                fontFamily = config.giftFontFamily !== undefined ? config.giftFontFamily : 'Outfit';
                textShadow = config.giftTextShadow !== undefined ? config.giftTextShadow : '3d-retro';
            } else if (type === 'subscribe') {
                enableAlert = config.enableSubscribeAlert !== undefined ? config.enableSubscribeAlert : true;
                playAudio = config.subscribePlayAudio !== undefined ? config.subscribePlayAudio : true;
                showLottie = config.subscribeShowLottie !== undefined ? config.subscribeShowLottie : true;
                ttsEnabled = config.subscribeTtsEnabled !== undefined ? config.subscribeTtsEnabled : true;
                rainbowText = config.subscribeRainbowText !== undefined ? config.subscribeRainbowText : true;
                bounceText = config.subscribeBounceText !== undefined ? config.subscribeBounceText : true;
                showCard = config.subscribeShowCard !== undefined ? config.subscribeShowCard : true;
                fontFamily = config.subscribeFontFamily !== undefined ? config.subscribeFontFamily : 'Outfit';
                textShadow = config.subscribeTextShadow !== undefined ? config.subscribeTextShadow : '3d-retro';
            }

            // Si la alerta está desactivada en la configuración, no la reproducimos
            if (!enableAlert) {
                isAlertPlaying = false;
                processQueue();
                return;
            }

            const theme = ALERT_THEMES[type] || ALERT_THEMES.follow;
            const $wrapper = $("#alertWrapper");

            // Limpiar clases previas de tipo
            $wrapper.removeClass("type-follow type-gift type-subscribe type-like anim-enter anim-exit");
            $wrapper.addClass(`type-${type}`);

            // Rellenar títulos e información
            $("#alertTitle").text(theme.title);
            $("#alertMessage").text(data.message || "¡Gracias por el apoyo!");

            // Aplicar personalización visual independiente para Likes Lock vs Alertas normales
            const isLikesLock = data.message && (data.message.includes('🔒') || data.message.includes('Enlaces bloqueados'));
            const alertBox = document.querySelector('.alert-box');
            if (alertBox) {
                if (isLikesLock) {
                    const finalOpacity = window.likeslockOpacityOverride !== undefined ? window.likeslockOpacityOverride : 0.85;
                    const finalRadius = window.likeslockRadiusOverride !== undefined ? window.likeslockRadiusOverride : 22;
                    alertBox.style.setProperty('--card-bg-opacity', finalOpacity);
                    alertBox.style.setProperty('--card-border-radius', finalRadius + 'px');
                    alertBox.classList.remove('no-card-bg'); // Keep lock background for readability
                } else {
                    let borderWidth = 1;
                    let borderColor = '#ffffff';
                    let borderOpacity = 8;
                    let borderStyle = 'solid';
                    
                    if (type === 'follow') {
                        opacity = config.followOpacity !== undefined ? config.followOpacity : 0.76;
                        radius = config.followRadius !== undefined ? config.followRadius : 28;
                        fontSize = config.followFontSize !== undefined ? config.followFontSize : 16;
                        borderWidth = config.followBorderWidth !== undefined ? config.followBorderWidth : 1;
                        borderColor = config.followBorderColor || '#ffffff';
                        borderOpacity = config.followBorderOpacity !== undefined ? config.followBorderOpacity : 8;
                        borderStyle = config.followBorderStyle || 'solid';
                    } else if (type === 'like') {
                        opacity = config.likeOpacity !== undefined ? config.likeOpacity : 0.76;
                        radius = config.likeRadius !== undefined ? config.likeRadius : 28;
                        fontSize = config.likeFontSize !== undefined ? config.likeFontSize : 16;
                        borderWidth = config.likeBorderWidth !== undefined ? config.likeBorderWidth : 1;
                        borderColor = config.likeBorderColor || '#ffffff';
                        borderOpacity = config.likeBorderOpacity !== undefined ? config.likeBorderOpacity : 8;
                        borderStyle = config.likeBorderStyle || 'solid';
                    } else if (type === 'gift') {
                        opacity = config.giftOpacity !== undefined ? config.giftOpacity : 0.76;
                        radius = config.giftRadius !== undefined ? config.giftRadius : 28;
                        fontSize = config.giftFontSize !== undefined ? config.giftFontSize : 16;
                        borderWidth = config.giftBorderWidth !== undefined ? config.giftBorderWidth : 1;
                        borderColor = config.giftBorderColor || '#ffffff';
                        borderOpacity = config.giftBorderOpacity !== undefined ? config.giftBorderOpacity : 8;
                        borderStyle = config.giftBorderStyle || 'solid';
                    } else if (type === 'subscribe') {
                        opacity = config.subscribeOpacity !== undefined ? config.subscribeOpacity : 0.76;
                        radius = config.subscribeRadius !== undefined ? config.subscribeRadius : 28;
                        fontSize = config.subscribeFontSize !== undefined ? config.subscribeFontSize : 16;
                        borderWidth = config.subscribeBorderWidth !== undefined ? config.subscribeBorderWidth : 1;
                        borderColor = config.subscribeBorderColor || '#ffffff';
                        borderOpacity = config.subscribeBorderOpacity !== undefined ? config.subscribeBorderOpacity : 8;
                        borderStyle = config.subscribeBorderStyle || 'solid';
                    }
                    
                    alertBox.style.setProperty('--card-bg-opacity', opacity);
                    alertBox.style.setProperty('--card-border-radius', radius + 'px');
                    document.documentElement.style.setProperty('--font-size-base', fontSize + 'px');
                    
                    const brVal = parseInt(borderColor.substr(1,2), 16) || 255;
                    const bgVal = parseInt(borderColor.substr(3,2), 16) || 255;
                    const bbVal = parseInt(borderColor.substr(5,2), 16) || 255;
                    const bOp = borderOpacity / 100;
                    alertBox.style.setProperty('--card-border-width', borderWidth + 'px');
                    alertBox.style.setProperty('--card-border-style', borderStyle);
                    alertBox.style.setProperty('--card-border-color', `rgba(${brVal},${bgVal},${bbVal},${bOp})`);
                    
                    if (!showCard) {
                        alertBox.classList.add('no-card-bg');
                    } else {
                        alertBox.classList.remove('no-card-bg');
                    }
                }
            }

            // Aplicar fuentes y sombras dinámicas en base a la alerta activa actual
            loadFontDynamically(fontFamily);
            applyTextShadow(textShadow, theme.color);

            // Construir texto del username con efecto de rebote letra por letra
            const $usernameContainer = $("#usernameContainer");
            $usernameContainer.removeClass("rainbow-text");
            $usernameContainer.empty();

            const name = data.user || "Anónimo";
            // Activar arcoíris si está habilitado
            if (rainbowText) {
                $usernameContainer.addClass("rainbow-text");
            }

            name.split("").forEach((char, index) => {
                const $span = $("<span>").text(char === " " ? "\u00A0" : char);
                if (bounceText) {
                    $span.addClass("bounce-char");
                    $span.css("--delay", `${index * 0.05}s`);
                }
                $usernameContainer.append($span);
            });

            // Configurar Lottie / Avatar
            const $mediaContainer = $("#mediaContainer");
            $mediaContainer.find("lottie-player").remove();
            const $userAvatar = $("#userAvatar");
            $userAvatar.hide();

            // Cargar lottie si está activo
            if (showLottie && theme.lottie) {
                const player = document.createElement("lottie-player");
                player.setAttribute("src", theme.lottie);
                player.setAttribute("background", "transparent");
                player.setAttribute("speed", "1");
                player.setAttribute("autoplay", "");
                $mediaContainer.append(player);
            }

            // Cargar avatar si existe en la notificación
            if (data.profilePic) {
                $userAvatar.attr("src", data.profilePic).show();
            } else {
                $userAvatar.hide();
            }

            // Reproducir Audio
            if (playAudio) {
                const $audio = $("#alertAudio");
                const audioUrl = theme.audio || theme.defaultAudio;
                $audio.attr("src", audioUrl);
                const audioEl = $audio[0];
                audioEl.volume = 0.5;
                
                // Forzar play con manejo de políticas del navegador
                audioEl.play().catch(e => console.warn("[Audio] Interacción bloqueada por el navegador:", e));
            }

            // Disparar explosión de partículas de colores (Confeti)
            spawnParticles(theme.color);

            // TTS (Text to Speech) - Leer mensaje en voz alta
            triggerTTS(data, ttsEnabled);

            // Mostrar el overlay con animación
            $wrapper.css("display", "flex").addClass("anim-enter");

            // Clear any existing active timeouts
            if (activeAlertTimeout) clearTimeout(activeAlertTimeout);
            if (activeAlertExitTimeout) clearTimeout(activeAlertExitTimeout);

            // Duración de la alerta (5.5 segundos)
            activeAlertTimeout = setTimeout(() => {
                $wrapper.addClass("anim-exit");
                activeAlertExitTimeout = setTimeout(() => {
                    $wrapper.hide();
                    isAlertPlaying = false;
                    processQueue(); // Siguiente alerta
                }, 400);
            }, 5500);
        }

        // =============================================
        //  SPAWN PARTICLES (Confeti Premium)
        // =============================================
        function spawnParticles(color) {
            const numParticles = 40;
            const container = document.body;

            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement("div");
                particle.className = "particle";
                
                // Color aleatorio derivado o el del tema
                particle.style.background = color || "#fff";
                if (Math.random() > 0.5) particle.style.background = "#ffffff";

                // Tamaño aleatorio
                const size = Math.random() * 12 + 6;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;

                // Configurar origen en el centro del alerta
                particle.style.left = "50vw";
                particle.style.top = "45vh";

                // Configurar destino aleatorio (explosión circular)
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 260 + 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const rot = Math.random() * 720 - 360;

                particle.style.setProperty("--tx", `${tx}px`);
                particle.style.setProperty("--ty", `${ty}px`);
                particle.style.setProperty("--rot", `${rot}deg`);

                container.appendChild(particle);

                // Remover elemento después de terminar animación
                particle.addEventListener("animationend", () => {
                    particle.remove();
                });
            }
        }

        // =============================================
        //  TEXT-TO-SPEECH (TTS)
        // =============================================
        function triggerTTS(data, ttsEnabled) {
            if (!('speechSynthesis' in window) || !ttsEnabled) return;
            
            setTimeout(() => {
                const text = `${data.user} ${data.message.replace(/🎁|👤|⭐|❤️/g, "")}`;
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Configurar voz en español
                utterance.lang = 'es-MX';
                const voices = window.speechSynthesis.getVoices();
                const esVoice = voices.find(v => v.lang.includes('es') || v.lang.includes('ES'));
                if (esVoice) utterance.voice = esVoice;
                
                utterance.rate = 1.0;
                utterance.volume = 0.85;
                
                window.speechSynthesis.speak(utterance);
            }, 1000); // Retraso de 1s para que suene el audio primero
        }

        // Pre-cargar voces al iniciar
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }

        // =============================================
        //  PREVIEW / DEMO
        // =============================================
        window.preview = function(type) {
            const types = ['follow', 'gift', 'subscribe', 'like'];
            const chosenType = type || types[Math.floor(Math.random() * types.length)];
            
            let mockData = {};
            if (chosenType === 'follow') {
                mockData = {
                    type: 'follow',
                    user: "ZeroFM_Lover",
                    message: "¡Gracias por seguir el canal! 👤",
                    profilePic: "https://i.pravatar.cc/100?img=21"
                };
            } else if (chosenType === 'gift') {
                mockData = {
                    type: 'gift',
                    user: "GifterPro",
                    giftName: "TikTok Rose",
                    coins: 10,
                    message: "¡Gracias por 10x TikTok Rose! 🎁",
                    profilePic: "https://i.pravatar.cc/100?img=12"
                };
            } else if (chosenType === 'subscribe') {
                mockData = {
                    type: 'subscribe',
                    user: "MusicFanatic",
                    message: "¡Gracias por suscribirte al canal! ⭐",
                    profilePic: "https://i.pravatar.cc/100?img=33"
                };
            } else if (chosenType === 'like') {
                mockData = {
                    type: 'like',
                    user: "SuperLiker",
                    likes: 1200,
                    message: "¡Envió 1,200 likes! ❤️",
                    profilePic: "https://i.pravatar.cc/100?img=47"
                };
            }
            
            addAlert(mockData);
        };

        // Receptor de eventos de mensajería (postMessage) para simulación local offline y actualizaciones en tiempo real
        window.addEventListener('message', function(event) {
            if (!event.data) return;
            
            if (event.data.action === 'triggerTestAlert') {
                console.log("[alerts_overlay] Alerta de prueba local recibida:", event.data.payload);
                const payload = event.data.payload;
                // Filtrar simulación por tipo si la URL está restringida
                if (urlType === 'all' || payload.type === urlType) {
                    addAlert(payload);
                }
            } else if (event.data.action === 'updateLiveConfig') {
                console.log("[alerts_overlay] Configuración en tiempo real recibida:", event.data.config);
                window.overlayAlertsConfig = event.data.config;
                // Aplicar estilos estáticos inmediatos
                applyInitialStyles();
                
                // Si la alerta actual está reproduciéndose, actualizarla en tiempo real en el DOM
                if (isAlertPlaying) {
                    const config = window.overlayAlertsConfig || {};
                    const alertBox = document.querySelector('.alert-box');
                    if (alertBox) {
                        let opacity = 0.76;
                        let radius = 28;
                        let fontSize = 16;
                        let showCard = true;
                        let fontFamily = 'Outfit';
                        let textShadow = '3d-retro';
                        let messageTemplate = '';
                        
                        const $wrapper = $("#alertWrapper");
                        let type = 'follow';
                        if ($wrapper.hasClass('type-like')) type = 'like';
                        else if ($wrapper.hasClass('type-gift')) type = 'gift';
                        else if ($wrapper.hasClass('type-subscribe')) type = 'subscribe';
                        
                        if (type === 'follow') {
                            opacity = config.followOpacity !== undefined ? config.followOpacity : 0.76;
                            radius = config.followRadius !== undefined ? config.followRadius : 28;
                            fontSize = config.followFontSize !== undefined ? config.followFontSize : 16;
                            showCard = config.followShowCard !== undefined ? config.followShowCard : true;
                            fontFamily = config.followFontFamily !== undefined ? config.followFontFamily : 'Outfit';
                            textShadow = config.followTextShadow !== undefined ? config.followTextShadow : '3d-retro';
                        } else if (type === 'like') {
                            opacity = config.likeOpacity !== undefined ? config.likeOpacity : 0.76;
                            radius = config.likeRadius !== undefined ? config.likeRadius : 28;
                            fontSize = config.likeFontSize !== undefined ? config.likeFontSize : 16;
                            showCard = config.likeShowCard !== undefined ? config.likeShowCard : true;
                            fontFamily = config.likeFontFamily !== undefined ? config.likeFontFamily : 'Outfit';
                            textShadow = config.likeTextShadow !== undefined ? config.likeTextShadow : '3d-retro';
                            messageTemplate = config.likesAlertMsg || '¡Envió {likes} likes! ❤️';
                        } else if (type === 'gift') {
                            opacity = config.giftOpacity !== undefined ? config.giftOpacity : 0.76;
                            radius = config.giftRadius !== undefined ? config.giftRadius : 28;
                            fontSize = config.giftFontSize !== undefined ? config.giftFontSize : 16;
                            showCard = config.giftShowCard !== undefined ? config.giftShowCard : true;
                            fontFamily = config.giftFontFamily !== undefined ? config.giftFontFamily : 'Outfit';
                            textShadow = config.giftTextShadow !== undefined ? config.giftTextShadow : '3d-retro';
                        } else if (type === 'subscribe') {
                            opacity = config.subscribeOpacity !== undefined ? config.subscribeOpacity : 0.76;
                            radius = config.subscribeRadius !== undefined ? config.subscribeRadius : 28;
                            fontSize = config.subscribeFontSize !== undefined ? config.subscribeFontSize : 16;
                            showCard = config.subscribeShowCard !== undefined ? config.subscribeShowCard : true;
                            fontFamily = config.subscribeFontFamily !== undefined ? config.subscribeFontFamily : 'Outfit';
                            textShadow = config.subscribeTextShadow !== undefined ? config.subscribeTextShadow : '3d-retro';
                        }
                        
                        alertBox.style.setProperty('--card-bg-opacity', opacity);
                        alertBox.style.setProperty('--card-border-radius', radius + 'px');
                        document.documentElement.style.setProperty('--font-size-base', fontSize + 'px');
                        
                        if (!showCard) {
                            alertBox.classList.add('no-card-bg');
                        } else {
                            alertBox.classList.remove('no-card-bg');
                        }
                        
                        loadFontDynamically(fontFamily);
                        const theme = ALERT_THEMES[type] || ALERT_THEMES.follow;
                        applyTextShadow(textShadow, theme.color);
                        
                        // Si es de tipo Likes, actualizar mensaje si cambió
                        if (type === 'like' && messageTemplate) {
                            $("#alertMessage").text(messageTemplate.replace('{likes}', '150'));
                        }
                    }
                    
                    // Prolongar la duración de la alerta mientras el usuario configure cosas
                    if (activeAlertTimeout) clearTimeout(activeAlertTimeout);
                    if (activeAlertExitTimeout) clearTimeout(activeAlertExitTimeout);
                    
                    const $wrapper = $("#alertWrapper");
                    $wrapper.removeClass("anim-exit"); // Evitar animación de salida durante edición
                    
                    activeAlertTimeout = setTimeout(() => {
                        $wrapper.addClass("anim-exit");
                        activeAlertExitTimeout = setTimeout(() => {
                            $wrapper.hide();
                            isAlertPlaying = false;
                            processQueue();
                        }, 400);
                    }, 5500); // 5.5 segundos más
                }
            }
        });
    </script>

</body>
</html>
