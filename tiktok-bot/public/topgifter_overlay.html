<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Gifters — Zero FM</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.min.js" crossorigin="anonymous"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        /* =============================================
           RESET & BASE
        ============================================= */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --topgifter-opacity: 0.72;
            --topgifter-radius: 16px;
            --topgifter-font-size: 14px;
            --topgifter-width: 340px;
            --topgifter-gap: 6px;
            --topgifter-card-padding: 7px 12px 7px 10px;
            --topgifter-border-width: 1px;
            --topgifter-border-style: solid;
            --topgifter-border-color: rgba(255, 255, 255, 0.07);
            --topgifter-box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255,255,255,0.06);
            --topgifter-animation-duration: 0.35s;
        }

        body {
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            background: transparent;
            overflow: hidden;
            width: var(--topgifter-width);
        }

        /* =============================================
           CONTAINER
        ============================================= */
        #rankingContainer {
            display: flex;
            flex-direction: column;
            gap: var(--topgifter-gap);
            padding: 4px 2px;
            width: var(--topgifter-width);
            max-height: 100vh;
            overflow: hidden;
        }

        /* =============================================
           RANK USER CARD
        ============================================= */
        .rankUser {
            display: none;
            align-items: center;
            gap: 10px;
            padding: var(--topgifter-card-padding);
            border-radius: var(--topgifter-radius);
            background: rgba(15, 15, 25, var(--topgifter-opacity));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--topgifter-border-width) var(--topgifter-border-style) var(--topgifter-border-color);
            box-shadow: var(--topgifter-box-shadow);
            position: relative;
            overflow: visible;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-size: var(--topgifter-font-size);
        }

        .rankUser.animate-in {
            animation: slideIn var(--topgifter-animation-duration) cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .rankUser.no-card-bg {
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            box-shadow: none !important;
        }

        .rankUser:hover {
            transform: translateX(3px);
        }

        /* First place special card */
        .rankUser.first-place {
            background: rgba(20, 15, 5, var(--topgifter-opacity));
            border-color: var(--topgifter-first-border-color, rgba(255, 195, 0, 0.35));
            box-shadow: var(--topgifter-first-box-shadow, 0 4px 24px rgba(255, 185, 0, 0.18), 0 0 0 1px rgba(255, 185, 0, 0.12), inset 0 1px 0 rgba(255, 220, 80, 0.10));
        }

        .rankUser.second-place {
            border-color: var(--topgifter-second-border-color, rgba(192, 192, 192, 0.25));
        }

        .rankUser.third-place {
            border-color: var(--topgifter-third-border-color, rgba(205, 127, 50, 0.25));
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-18px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* =============================================
           RANK NUMBER
        ============================================= */
        .rankId {
            font-size: 0.85em;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.35);
            width: 22px;
            min-width: 22px;
            text-align: center;
            flex-shrink: 0;
            letter-spacing: -0.5px;
        }

        .rankId img {
            height: 1.3em;
            width: auto;
            border-radius: 0;
            margin: 0;
        }

        /* =============================================
           AVATAR
        ============================================= */
        .avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .profilePicture {
            height: 42px;
            width: 42px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 2.5px solid rgba(255,255,255,0.12);
            transition: border-color 0.3s;
        }

        .first-place .profilePicture {
            border-color: rgb(246, 183, 56);
            box-shadow: 0 0 10px rgba(246,183,56,0.5);
        }

        .second-place .profilePicture {
            border-color: rgb(192,192,192);
            box-shadow: 0 0 8px rgba(192,192,192,0.35);
        }

        .third-place .profilePicture {
            border-color: rgb(205,127,50);
            box-shadow: 0 0 8px rgba(205,127,50,0.35);
        }

        /* Crown badge */
        .crown1 {
            display: none;
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            height: 22px;
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(255, 200, 0, 0.7));
            animation: crownFloat 2.5s ease-in-out infinite;
        }

        @keyframes crownFloat {
            0%, 100% { transform: translateX(-50%) translateY(0px); }
            50%       { transform: translateX(-50%) translateY(-3px); }
        }

        /* =============================================
           USER INFO
        ============================================= */
        .user-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .username {
            font-weight: 700;
            font-size: 0.92em;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            letter-spacing: 0.01em;
        }

        .first-place .username {
            color: #ffe080;
        }

        /* =============================================
           POINTS / COINS
        ============================================= */
        .points {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.78em;
            font-weight: 600;
            color: rgba(255,255,255,0.55);
            line-height: 1;
        }

        .first-place .points {
            color: rgba(255, 210, 80, 0.85);
        }

        .coin-icon {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
        }

        .coin-amount {
            letter-spacing: 0.02em;
        }

        /* =============================================
           RANK GLOW ACCENT (left bar)
        ============================================= */
        .rank-accent {
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: rgba(255,255,255,0.08);
            transition: background 0.3s;
        }

        .first-place .rank-accent  { background: linear-gradient(180deg, #ffd700, #ff9800); box-shadow: 0 0 8px rgba(255,180,0,0.6); }
        .second-place .rank-accent { background: linear-gradient(180deg, #e0e0e0, #9e9e9e); }
        .third-place .rank-accent  { background: linear-gradient(180deg, #cd7f32, #8d4e0b); }

        /* =============================================
           SPARKLE PARTICLE for 1st place
        ============================================= */
        .sparkle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9em;
            animation: sparkleAnim 1.8s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0.5; transform: translateY(-50%) scale(1); }
            50%       { opacity: 1;   transform: translateY(-54%) scale(1.15); }
        }

        /* =============================================
           EMPTY STATE
        ============================================= */
        #emptyState {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.82em;
            padding: 20px 10px;
            font-weight: 500;
            display: none;
        }

        /* =============================================
           ANIMATIONS (Rainbow, 3D Bounce, Heartbeat)
        ============================================= */
        @keyframes rainbow-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rainbow-text, .rainbow-text span {
            background: linear-gradient(90deg, #ff007f, #ffaa00, #00ffaa, #00aaff, #ff007f) !important;
            background-size: 300% 100% !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            color: transparent !important;
            animation: rainbow-flow 4s linear infinite !important;
            display: inline-block;
        }

        .bounce-letter {
            display: inline-block;
            animation: letterBounce3D 1.8s infinite ease-in-out;
        }

        @keyframes letterBounce3D {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-6px) scale(1.15) rotate(4deg);
                text-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        .heartbeat-active {
            animation: heartbeat 0.3s ease-in-out;
            color: #ffd700 !important;
        }

    </style>
</head>

<body>

    <div id="rankingContainer">
        <!-- Template card (hidden, cloned via JS) -->
        <div class="rankUser" id="rankTemplate" style="display:none !important;">
            <div class="rank-accent"></div>
            <div class="rankId">1.</div>
            <div class="avatar-wrap">
                <img class="crown1" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 16'%3E%3Cpolygon points='12,0 20,10 24,4 24,16 0,16 0,4 4,10' fill='%23FFD700' stroke='%23FF9800' stroke-width='0.8'/%3E%3Ccircle cx='12' cy='1.5' r='2' fill='%23FF6F00'/%3E%3Ccircle cx='0' cy='5' r='1.8' fill='%23FF6F00'/%3E%3Ccircle cx='24' cy='5' r='1.8' fill='%23FF6F00'/%3E%3C/svg%3E" alt="👑" />
                <img class="profilePicture" src="" onerror="this.src='https://via.placeholder.com/42'" />
            </div>
            <div class="user-info">
                <div class="username">Usuario</div>
                <div class="points">
                    <span class="coin-icon">
                        <svg width="12" height="12" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="24" cy="24" r="22" fill="#FFEC9B"/>
                            <circle cx="24" cy="24" r="17" fill="#FACE15"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M40.9347 25.5C40.9779 25.0058 41 24.5055 41 24C41 14.6112 33.3888 7 24 7C14.6112 7 7 14.6112 7 24C7 24.5055 7.02206 25.0058 7.06527 25.5C7.82466 16.8137 15.1166 10 24 10C32.8834 10 40.1753 16.8137 40.9347 25.5Z" fill="#FABC15"/>
                            <path d="M33 19C30.2041 19 27.9375 16.7614 27.9375 14H24.5625V27.6111C24.5625 29.2986 23.1774 30.6667 21.4688 30.6667C19.7601 30.6667 18.375 29.2986 18.375 27.6111C18.375 25.9236 19.7601 24.5556 21.4688 24.5556C21.722 24.5556 21.9659 24.5853 22.1981 24.6406V21.2763C22.0358 21.2406 21.7541 21.2222 21.4688 21.2222C17.8962 21.2222 15 24.0826 15 27.6111C15 31.1396 17.8962 34 21.4688 34C25.0413 34 27.9375 31.1396 27.9375 27.6111V20.6673C29.3477 21.7134 31.1005 22.3333 33 22.3333V19Z" fill="#FEF5CD"/>
                        </svg>
                    </span>
                    <span class="coin-amount">0</span>
                    <span class="currency-label"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        //  CONFIG — edita aquí si no usas TikFinity
        // =============================================
        var NOTHUMB = "https://via.placeholder.com/42/1a1a2e/ffffff?text=?";

        // Parámetros de URL
        var params    = new URLSearchParams(document.location.search);
        var CID       = params.get("cid") || "";
        var currency  = params.get("currency") || "";
        var maxItems  = parseInt(params.get("max") || "10");

        // =============================================
        //  STATE
        // =============================================
        var rankingContainer = $("#rankingContainer");
        var template         = null;
        var lastRankingJson  = null;
        var lastUserList     = [];
        var settings         = {
            topgifter_showCrown:      true,
            topgifter_showTrophy:     false,
            topgifter_showRank:       true,
            topgifter_showCoins:      true,
            topgifter_showCoinSymbol: true,
            topgifter_showBoxShadow:  false,
            topgifter_rankColor:      null,
            topgifter_pointsColor:    null,
            topgifter_usernameColor:  "#ffffff",
            showUserNicknames:        true,
            currencyName:             currency,
            topgifterShowCardBg:      true,
            topgifter_rainbow_username: false,
            topgifter_bounce_username:  false,
            topgifter_bounce_coins:     true
        };

        // Helper para convertir hex a rgba con opacidad
        function hexToRgba(hex, opacityPercent) {
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c = hex.substring(1).split('');
                if(c.length == 3){
                    c = [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c = '0x' + c.join('');
                return 'rgba(' + [(c>>16)&255, (c>>8)&255, c&255].join(',') + ',' + (opacityPercent/100) + ')';
            }
            return hex;
        }

        function applyGifterStyles(data) {
            const root = document.documentElement;
            
            if (data.topgifterOpacity !== undefined) {
                root.style.setProperty('--topgifter-opacity', data.topgifterOpacity);
            }
            if (data.topgifterRadius !== undefined) {
                root.style.setProperty('--topgifter-radius', data.topgifterRadius + 'px');
            }
            if (data.topgifterFontSize !== undefined) {
                root.style.setProperty('--topgifter-font-size', data.topgifterFontSize + 'px');
            }
            if (data.topgifterWidth !== undefined) {
                root.style.setProperty('--topgifter-width', data.topgifterWidth + 'px');
            }
            if (data.topgifterGap !== undefined) {
                root.style.setProperty('--topgifter-gap', data.topgifterGap + 'px');
            }
            if (data.topgifterCardPadding !== undefined) {
                let p = '7px 12px 7px 10px';
                if (data.topgifterCardPadding === 'small') p = '5px 8px';
                if (data.topgifterCardPadding === 'large') p = '10px 16px';
                root.style.setProperty('--topgifter-card-padding', p);
            }
            if (data.topgifterAnimationDuration !== undefined) {
                root.style.setProperty('--topgifter-animation-duration', data.topgifterAnimationDuration + 's');
            }
            
            // Bordes
            const borderWidth = data.topgifterBorderWidth !== undefined ? data.topgifterBorderWidth : 1;
            const borderStyle = data.topgifterBorderStyle || 'solid';
            const borderColor = data.topgifterBorderColor || '#ffffff';
            const borderOpacity = data.topgifterBorderOpacity !== undefined ? data.topgifterBorderOpacity : 7;
            
            const rgbaBorderColor = hexToRgba(borderColor, borderOpacity);
            root.style.setProperty('--topgifter-border-width', borderWidth + 'px');
            root.style.setProperty('--topgifter-border-style', borderStyle);
            root.style.setProperty('--topgifter-border-color', rgbaBorderColor);
            
            // Bordes especiales para 1st, 2nd, 3rd place (solo si el borde general es el default, de lo contrario aplicar el personalizado a todos)
            if (data.topgifterBorderWidth !== undefined || data.topgifterBorderColor !== undefined) {
                root.style.setProperty('--topgifter-first-border-color', rgbaBorderColor);
                root.style.setProperty('--topgifter-second-border-color', rgbaBorderColor);
                root.style.setProperty('--topgifter-third-border-color', rgbaBorderColor);
            } else {
                root.style.removeProperty('--topgifter-first-border-color');
                root.style.removeProperty('--topgifter-second-border-color');
                root.style.removeProperty('--topgifter-third-border-color');
            }
            
            // Sombras
            const showShadow = data.topgifterShowShadow !== undefined ? data.topgifterShowShadow : true;
            if (showShadow) {
                const shadowColor = data.topgifterShadowColor || '#000000';
                const shadowBlur = data.topgifterShadowBlur !== undefined ? data.topgifterShadowBlur : 20;
                const shadowOpacity = data.topgifterShadowOpacity !== undefined ? data.topgifterShadowOpacity : 35;
                const rgbaShadowColor = hexToRgba(shadowColor, shadowOpacity);
                root.style.setProperty('--topgifter-box-shadow', `0 4px ${shadowBlur}px ${rgbaShadowColor}, inset 0 1px 0 rgba(255,255,255,0.06)`);
                root.style.removeProperty('--topgifter-first-box-shadow');
            } else {
                root.style.setProperty('--topgifter-box-shadow', 'none');
                root.style.setProperty('--topgifter-first-box-shadow', 'none');
            }
            
            // Mostrar Fondo
            const showBg = data.topgifterShowCardBg !== undefined ? data.topgifterShowCardBg : true;
            settings.topgifterShowCardBg = showBg;
            
            // Aplicar la clase .no-card-bg a todos los elementos rankUser
            if (!showBg) {
                $('.rankUser').addClass('no-card-bg');
            } else {
                $('.rankUser').removeClass('no-card-bg');
            }
        }

        // =============================================
        //  FIREBASE FIRESTORE (Conexión al Bot)
        // =============================================
        const firebaseConfig = {
            apiKey: "AIzaSyA6c3EaIvuPEfM6sTV0YHqCBHuz35ZmNIU",
            authDomain: "zero-strom-web.firebaseapp.com",
            projectId: "zero-strom-web",
            storageBucket: "zero-strom-web.firebasestorage.app",
            messagingSenderId: "758369466349",
            appId: "1:758369466349:web:f2ced362a5a049c70b59e4"
        };

        let db = null;
        let hasFirebaseData = false;

        try {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("[Firebase] Conectado exitosamente en TopGifter ✓");
                
                // Escuchar cambios en tiempo real del ranking del bot
                db.collection('globalStats').doc('topGifters').onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data && Array.isArray(data.list)) {
                            console.log("[Firebase] Ranking Top Gifters actualizado ✓");
                            hasFirebaseData = true;
                            updateRanking(data.list);
                        }
                    }
                }, err => {
                    console.warn("[Firebase] Error en onSnapshot de topGifters:", err);
                });

                // Escuchar configuraciones de estilo de overlays desde el panel de control
                db.collection('systemConfig').doc('overlayAlertsConfig').onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        console.log("[Firebase] Configuración de estilo de Top Gifter actualizada ✓");
                        settings = Object.assign(settings, data);
                        applyGifterStyles(data);
                        if (data.topgifter_max !== undefined) {
                            maxItems = Number(data.topgifter_max);
                        }
                        updateSettings(true);
                    }
                }, err => {
                    console.warn("[Firebase] Error en onSnapshot de overlayAlertsConfig:", err);
                });
            }
        } catch(e) {
            console.error("[Firebase] Error al iniciar Firebase:", e);
        }

        // =============================================
        //  SOCKET.IO  (Fallback de TikFinity)
        // =============================================
        var io = null;
        try {
            // Intenta conectar al servidor local de TikFinity (puerto 21213)
            io = window.io ? window.io("http://localhost:21213") : null;
            if (io) {
                io.on("connect", function() {
                    console.log("[TopGifter] Socket conectado ✓");
                    io.emit("joinWidget", { cid: CID, widget: "topgifter" });
                });
                io.on("updateTopGifter", function(userList) {
                    if (!hasFirebaseData) { // Priorizar datos de Firebase
                        updateRanking(userList);
                    }
                });
                io.on("settingsUpdate", function(newSettings) {
                    settings = Object.assign(settings, newSettings);
                    updateSettings(true);
                });
                io.on("disconnect", function() {
                    console.warn("[TopGifter] Socket desconectado");
                });
            }
        } catch(e) {
            console.warn("[TopGifter] Socket.IO no disponible:", e);
        }

        // =============================================
        //  RENDER RANKING
        // =============================================
        function updateRanking(userList) {
            if (!template) {
                template = $("#rankTemplate").clone();
                template.removeAttr("id");
                $("#rankTemplate").remove();
            }
            if (!userList) userList = lastUserList;
            lastUserList = userList;

            // Limita items
            var list = userList.slice(0, maxItems);

            // 1. Identificar usuarios que ya no están en el top y eliminarlos
            const newUsernames = new Set(list.map(u => u.username));
            $(".rankUser:not(#rankTemplate)").each(function() {
                const username = $(this).attr("data-username");
                if (username && !newUsernames.has(username)) {
                    $(this).fadeOut(150, function() { $(this).remove(); });
                }
            });

            // Si la lista está vacía, no hay nada más que hacer
            if (list.length === 0) {
                return;
            }

            // 2. Procesar cada usuario de la lista en orden
            list.forEach(function(user, idx) {
                const rank = idx + 1;
                let card = $(`.rankUser[data-username="${user.username}"]`);
                let isNew = false;

                if (card.length === 0) {
                    // No existe, creamos una nueva tarjeta
                    card = template.clone();
                    card.removeAttr("id");
                    card.attr("data-username", user.username);
                    isNew = true;
                } else {
                    // Detener cualquier animación en progreso para evitar que se oculte
                    card.stop(true, true);
                }

                // Clases de posición
                card.removeClass("first-place second-place third-place");
                if (rank === 1) card.addClass("first-place");
                if (rank === 2) card.addClass("second-place");
                if (rank === 3) card.addClass("third-place");

                // Rank number / trophy
                const $rankId = card.find(".rankId");
                if (settings.topgifter_showTrophy && rank <= 3) {
                    const trophyEmoji = rank === 1 ? "🥇" : rank === 2 ? "🥈" : "🥉";
                    $rankId.html('<span style="font-size:1.1em">' + trophyEmoji + '</span>');
                } else {
                    $rankId.text(rank + ".");
                }
                $rankId.toggle(settings.topgifter_showRank !== false);

                // Avatar (solo si es nueva o cambió la URL)
                const picUrl = user.profilePictureUrl || NOTHUMB;
                const $pic = card.find(".profilePicture");
                if (isNew || $pic.attr("src") !== picUrl) {
                    $pic.attr("src", picUrl).on("error", function() {
                        $(this).attr("src", NOTHUMB);
                    });
                }

                // Crown (only rank 1)
                const $crown = card.find(".crown1");
                if (rank === 1 && settings.topgifter_showCrown !== false) {
                    $crown.css("display", "block");
                } else {
                    $crown.css("display", "none");
                }

                // Sparkle for 1st
                let $sparkle = card.find(".sparkle");
                if (rank === 1) {
                    if ($sparkle.length === 0) {
                        card.append('<span class="sparkle">✨</span>');
                    }
                } else {
                    $sparkle.remove();
                }

                // Username
                const displayName = settings.showUserNicknames === false
                    ? ("@" + user.username)
                    : (user.nickname || ("@" + user.username));
                const $usernameEl = card.find(".username");

                // Rainbow Text Animation
                if (settings.topgifter_rainbow_username) {
                    $usernameEl.addClass("rainbow-text");
                } else {
                    $usernameEl.removeClass("rainbow-text");
                }

                // Bounce Text Animation
                if (settings.topgifter_bounce_username) {
                    $usernameEl.empty();
                    const chars = displayName.split("");
                    chars.forEach((char, charIdx) => {
                        const $span = $("<span>").text(char === " " ? "\u00A0" : char);
                        $span.addClass("bounce-letter");
                        $span.css("animation-delay", (charIdx * 0.08) + "s");
                        $usernameEl.append($span);
                    });
                } else {
                    $usernameEl.text(displayName);
                }

                // Points / Coins
                const amount = parseFloat(user.totalAmount) || 0;
                const $amountSpan = card.find(".coin-amount");
                const oldAmount = parseFloat($amountSpan.attr("data-prev-amount")) || 0;

                $amountSpan.text(amount.toLocaleString("es-MX"));
                $amountSpan.attr("data-prev-amount", amount);

                if (!isNew && amount > oldAmount && settings.topgifter_bounce_coins !== false) {
                    const $pointsDiv = card.find(".points");
                    $pointsDiv.addClass("heartbeat-active");
                    setTimeout(() => {
                        $pointsDiv.removeClass("heartbeat-active");
                    }, 350);
                }

                const $coinIcon = card.find(".coin-icon");
                if (settings.topgifter_showCoinSymbol === false) {
                    $coinIcon.hide();
                    $amountSpan.text(amount.toLocaleString("es-MX") + " Coins");
                } else {
                    $coinIcon.show();
                }

                const $currLabel = card.find(".currency-label");
                if (currency) {
                    $currLabel.text(" " + currency);
                } else {
                    $currLabel.text("");
                }

                card.find(".points").toggle(settings.topgifter_showCoins !== false);

                if (settings.topgifterShowCardBg === false) {
                    card.addClass("no-card-bg");
                } else {
                    card.removeClass("no-card-bg");
                }

                // Mapear estilos dinámicos del panel si existen
                if (settings.topgifter_rankColor)   card.find(".rankId").css("color", settings.topgifter_rankColor);
                if (settings.topgifter_pointsColor) card.find(".points").css("color", settings.topgifter_pointsColor);
                if (settings.topgifter_usernameColor) card.find(".username").css("color", settings.topgifter_usernameColor);

                // Mover/añadir la tarjeta a la posición correspondiente en el contenedor
                rankingContainer.append(card);

                if (isNew) {
                    card.addClass("animate-in");
                    card.removeAttr('style');
                    card.css({
                        display: "flex",
                        opacity: 0
                    }).animate({ opacity: 1 }, 180);
                } else {
                    card.removeClass("animate-in");
                    card.css({
                        display: "flex",
                        opacity: 1
                    });
                }
            });
        }

        // =============================================
        //  SETTINGS APPLY
        // =============================================
        function updateSettings(hasChanges) {
            if (settings.topgifter_rankColor)   $(".rankId").css("color", settings.topgifter_rankColor);
            if (settings.topgifter_pointsColor) $(".points").css("color", settings.topgifter_pointsColor);
            if (settings.topgifter_usernameColor) $(".username").css("color", settings.topgifter_usernameColor);
            if (settings.currencyName)          $(".currency-label").text(" " + settings.currencyName);

            if (hasChanges) {
                lastRankingJson = null;
                updateRanking();
            }
        }

        // =============================================
        //  INIT
        // =============================================
        $(function() {
            // Clone template BEFORE removing it
            if (!template) {
                template = $("#rankTemplate").clone();
                template.removeAttr("id");
                $("#rankTemplate").remove();
            }

            updateSettings(false);

            // Si no hay datos del bot en Firebase, iniciar preview
            setTimeout(function() {
                if (!hasFirebaseData) {
                    window.preview && window.preview();
                }
            }, 1500);
        });

        let previewInterval = null;
        window.preview = function() {
            if (previewInterval) clearInterval(previewInterval);
            
            const firstNames = ["Zero", "Donador", "Música", "TikTok", "Gifter", "Super", "Night", "Fan", "Sponsor", "VIP"];
            const lastNames = ["FM", "Lover", "Pro", "Star", "King", "Owl", "Vida", "Activo", "Zero", "Collector"];
            
            const count = 7;
            const list = [];
            for (let i = 0; i < count; i++) {
                const fn = firstNames[i % firstNames.length];
                const ln = lastNames[i % lastNames.length];
                const username = (fn + "_" + ln + (i + 10)).toLowerCase();
                const nickname = fn + " " + ln;
                const randomPicId = 10 + i;
                
                list.push({
                    username: username,
                    nickname: nickname,
                    profilePictureUrl: `https://i.pravatar.cc/100?img=${randomPicId}`,
                    totalAmount: 5000 - i * 500
                });
            }
            
            list.sort((a, b) => b.totalAmount - a.totalAmount);
            updateRanking(list);

            previewInterval = setInterval(() => {
                if (hasFirebaseData) {
                    clearInterval(previewInterval);
                    return;
                }
                const randomUserIndex = Math.floor(Math.random() * list.length);
                const extraAmount = Math.floor(Math.random() * 300) + 50;
                list[randomUserIndex].totalAmount += extraAmount;
                
                if (Math.random() > 0.8) {
                    const fn = firstNames[Math.floor(Math.random() * firstNames.length)];
                    const ln = lastNames[Math.floor(Math.random() * lastNames.length)];
                    const username = (fn + "_" + ln + Math.floor(Math.random() * 90 + 10)).toLowerCase();
                    const nickname = fn + " " + ln;
                    const randomPicId = Math.floor(Math.random() * 70) + 1;
                    
                    list[list.length - 1] = {
                        username: username,
                        nickname: nickname,
                        profilePictureUrl: `https://i.pravatar.cc/100?img=${randomPicId}`,
                        totalAmount: list[list.length - 2].totalAmount - 20
                    };
                }

                list.sort((a, b) => b.totalAmount - a.totalAmount);
                updateRanking(list);
            }, 3000);
        };

        // Receptor de eventos de mensajería (postMessage) para simulación local offline y actualización en tiempo real
        window.addEventListener('message', function(event) {
            if (!event.data) return;
            
            if (event.data.action === 'triggerTestTopGifters' || event.data.action === 'triggerTestAlert') {
                console.log("[topgifter_overlay] Alerta de prueba local recibida. Generando datos de prueba aleatorios...");
                window.preview();
            } else if (event.data.action === 'updateLiveConfig' || event.data.action === 'updateConfig') {
                console.log("[topgifter_overlay] Configuración en tiempo real recibida:", event.data.config || event.data.payload);
                const data = event.data.config || event.data.payload || {};
                
                // Mapear configuraciones de estilos
                applyGifterStyles(data);
                if (data.topgifter_show_crown !== undefined) {
                    settings.topgifter_showCrown = data.topgifter_show_crown;
                }
                if (data.topgifter_show_coin_symbol !== undefined) {
                    settings.topgifter_showCoinSymbol = data.topgifter_show_coin_symbol;
                }
                if (data.topgifter_max !== undefined) {
                    maxItems = Number(data.topgifter_max);
                }
                if (data.topgifter_rainbow_username !== undefined) {
                    settings.topgifter_rainbow_username = data.topgifter_rainbow_username;
                }
                if (data.topgifter_bounce_username !== undefined) {
                    settings.topgifter_bounce_username = data.topgifter_bounce_username;
                }
                if (data.topgifter_bounce_coins !== undefined) {
                    settings.topgifter_bounce_coins = data.topgifter_bounce_coins;
                }
                
                updateSettings(true);
            }
        });
    </script>

</body>
