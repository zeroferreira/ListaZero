<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta — Zero FM</title>
    
    <script>
        (function() {
            const P_TYPE = new URLSearchParams(location.search).get('type') || 'unknown';
            const logSource = 'goal_overlay_' + P_TYPE;
            
            function sendLog(level, args) {
                const message = Array.from(args).map(arg => {
                    if (arg instanceof Error) return arg.message + '\n' + arg.stack;
                    if (typeof arg === 'object') {
                        try { return JSON.stringify(arg); } catch(e) { return String(arg); }
                    }
                    return String(arg);
                }).join(' ');
                
                fetch('/api/client-log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level, message, source: logSource })
                }).catch(() => {});
            }
            
            const originalLog = console.log;
            const originalWarn = console.warn;
            const originalError = console.error;
            
            console.log = function() {
                originalLog.apply(console, arguments);
                sendLog('log', arguments);
            };
            console.warn = function() {
                originalWarn.apply(console, arguments);
                sendLog('warn', arguments);
            };
            console.error = function() {
                originalError.apply(console, arguments);
                sendLog('error', arguments);
            };
            
            window.onerror = function(message, source, lineno, colno, error) {
                const errStr = `${message} at ${source}:${lineno}:${colno}` + (error ? '\n' + error.stack : '');
                sendLog('uncaught-error', [errStr]);
                return false;
            };
            
            window.onunhandledrejection = function(event) {
                sendLog('unhandled-rejection', [event.reason]);
            };
            
            console.log('[RemoteLog] Initialized remote logging for goal_overlay ' + P_TYPE);
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- Firebase SDK compat v9.22.2 -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>

    <style>
        /* =============================================
           RESET & BASE
        ============================================= */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--goal-font-family, 'Outfit', 'Segoe UI', sans-serif);
            font-size: var(--goal-font-size, 14px);
            color: var(--goal-text-color, #ffffff);
            background: transparent;
            overflow: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        /* =============================================
           CARD PRINCIPAL
        ============================================= */
        #goalCard {
            width: var(--goal-width, 500px);
            max-width: 100%;
            padding: 20px 22px 18px;
            border-radius: var(--goal-border-radius, 22px);
            background: rgba(10, 10, 20, var(--goal-bg-opacity, 0.78));
            backdrop-filter: blur(22px) saturate(160%);
            -webkit-backdrop-filter: blur(22px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(255, 255, 255, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            display: none; /* shown when enabled */
        }

        #goalCard.visible {
            display: block;
            animation: cardEntrance 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1);    }
        }

        /* Glow background decoration */
        #goalCard::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--goal-border-radius, 22px);
            background: radial-gradient(ellipse at 50% -20%, var(--glow-color, rgba(236,72,153,0.18)) 0%, transparent 65%);
            pointer-events: none;
            transition: background 0.6s ease;
        }

        /* =============================================
           HEADER ROW
        ============================================= */
        #goalHeader {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        #goalIcon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: var(--primary-rgba, rgba(236,72,153,0.18));
            border: 1px solid var(--primary-border, rgba(236,72,153,0.3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            flex-shrink: 0;
            box-shadow: 0 2px 12px var(--primary-shadow, rgba(236,72,153,0.25));
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-3px); }
        }

        #goalMeta {
            flex: 1;
            min-width: 0;
        }

        #goalLabel {
            font-size: 0.82em;
            font-weight: 700;
            color: var(--goal-text-color-muted, rgba(255, 255, 255, 0.45));
            text-transform: uppercase;
            letter-spacing: 0.08em;
            line-height: 1;
            margin-bottom: 3px;
        }

        #goalTitle {
            font-size: 1.05em;
            font-weight: 800;
            color: var(--goal-text-color, #ffffff);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        #goalCounters {
            display: flex;
            align-items: baseline;
            gap: 3px;
        }

        #goalCurrent {
            font-size: 1.7em;
            font-weight: 900;
            color: var(--primary-color, #ec4899);
            line-height: 1;
            letter-spacing: -0.03em;
            transition: color 0.4s;
            font-variant-numeric: tabular-nums;
        }

        #goalSep {
            font-size: 1em;
            font-weight: 700;
            color: var(--goal-text-color-muted, rgba(255,255,255,0.25));
        }

        #goalTarget {
            font-size: 0.95em;
            font-weight: 600;
            color: var(--goal-text-color-muted, rgba(255, 255, 255, 0.38));
            font-variant-numeric: tabular-nums;
        }

        /* =============================================
           PROGRESS BAR
        ============================================= */
        #progressWrap {
            position: relative;
            width: 100%;
            height: var(--bar-height, 18px);
            border-radius: var(--bar-radius, 100px);
            background: var(--bar-bg, rgba(255, 255, 255, 0.06));
            overflow: visible;
            border: 1px solid rgba(255, 255, 255, 0.07);
            margin-bottom: 12px;
        }

        #progressTrack {
            position: absolute;
            inset: 0;
            border-radius: var(--bar-radius, 100px);
            overflow: hidden;
        }

        #progressBar {
            height: 100%;
            border-radius: var(--bar-radius, 100px);
            width: 100%;
            transform: scaleX(0);
            transform-origin: left;
            background: linear-gradient(90deg,
                var(--bar-start, #be185d),
                var(--primary-color, #ec4899),
                var(--bar-end, #f472b6)
            );
            box-shadow:
                0 0 14px var(--primary-shadow, rgba(236,72,153,0.6)),
                inset 0 1px 0 rgba(255,255,255,0.25);
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        /* Shimmer sweep */
        #progressBar::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--bar-radius, 100px);
            background: linear-gradient(
                100deg,
                transparent 0%,
                rgba(255, 255, 255, 0.35) 50%,
                transparent 100%
            );
            background-size: 200% 100%;
            animation: shimmer 2.2s linear infinite;
        }

        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200%  0; }
        }

        /* Percentage bubble that follows progress */
        #pctBubble {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.92);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 100px;
            padding: 1px 7px;
            font-size: 0.68em;
            font-weight: 800;
            color: #fff;
            white-space: nowrap;
            pointer-events: none;
            transition: left 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.45);
        }

        /* =============================================
           REWARD TEXT
        ============================================= */
        #rewardRow {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-top: 2px;
        }

        #rewardIcon {
            font-size: 0.85em;
            opacity: 0.7;
        }

        #rewardText {
            font-size: 0.78em;
            font-weight: 600;
            color: var(--goal-text-color-muted, rgba(255, 255, 255, 0.48));
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.01em;
        }

        /* =============================================
           CELEBRATION MODE (100%)
        ============================================= */
        #goalCard.complete #goalTitle {
            color: var(--primary-color, #ec4899);
        }

        #goalCard.complete #rewardText {
            color: var(--primary-color, #ec4899);
            font-weight: 700;
        }

        #goalCard.complete #rewardIcon {
            opacity: 1;
        }

        #goalCard.complete #progressBar {
            animation: pulseBar 1.4s ease-in-out infinite;
        }

        @keyframes pulseBar {
            0%, 100% { box-shadow: 0 0 14px var(--primary-shadow, rgba(236,72,153,0.6)); }
            50%       { box-shadow: 0 0 36px var(--primary-shadow, rgba(236,72,153,0.9)),
                                    0 0 60px var(--primary-shadow, rgba(236,72,153,0.4)); }
        }

        #goalCard.complete::before {
            animation: glowPulse 1.6s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.7; }
            50%       { opacity: 1.4; }
        }

        /* Celebration text badge */
        #celebrationBadge {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            padding: 7px 14px;
            border-radius: 100px;
            background: linear-gradient(
                135deg,
                var(--bar-start, #be185d),
                var(--primary-color, #ec4899)
            );
            box-shadow:
                0 4px 20px var(--primary-shadow, rgba(236,72,153,0.45)),
                inset 0 1px 0 rgba(255,255,255,0.2);
            font-size: 0.8em;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            animation: badgePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        #goalCard.complete #celebrationBadge {
            display: flex;
        }

        @keyframes badgePop {
            from { transform: scale(0.6); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        /* =============================================
           CONFETTI CANVAS
        ============================================= */
        #confettiCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            display: none;
        }

        /* =============================================
           PARTICLE SPARKS (progress milestone)
        ============================================= */
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary-color, #ec4899);
            pointer-events: none;
            animation: sparkFly var(--d, 0.8s) ease-out forwards;
        }

        @keyframes sparkFly {
            0%   { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx, 30px), var(--ty, -30px)) scale(0); opacity: 0; }
        }

        /* =============================================
           MODOS DE DISEÑO (LAYOUTS)
        ============================================= */
        
        /* 1.5 MODO MINIMALISTA */
        #goalCard.layout-minimalista {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            padding: 5px 0 !important;
            width: var(--goal-width, 500px) !important;
            display: flex !important;
            flex-direction: column !important;
        }

        #goalCard.layout-minimalista::before {
            display: none !important;
        }

        #goalCard.layout-minimalista #progressWrap {
            order: 1 !important;
            margin-bottom: 0 !important;
            border: none !important;
            box-shadow: none !important;
            height: var(--bar-height, 22px) !important;
            border-radius: var(--bar-radius, 100px) !important;
            background: rgba(255, 255, 255, 0.04) !important;
            backdrop-filter: blur(4px) !important;
            -webkit-backdrop-filter: blur(4px) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        #goalCard.layout-minimalista #progressTrack {
            border-radius: var(--bar-radius, 100px) !important;
        }

        #goalCard.layout-minimalista #progressBar {
            border-radius: var(--bar-radius, 100px) !important;
        }

        #goalCard.layout-minimalista #skewedPercent {
            display: flex !important;
            position: absolute !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) !important;
            font-size: var(--goal-font-size, 14px) !important;
            font-weight: 800 !important;
            color: #ffffff !important;
            z-index: 10 !important;
            pointer-events: none !important;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8) !important;
            line-height: 1 !important;
        }

        #goalCard.layout-minimalista #goalHeader {
            order: 2 !important;
            display: flex !important;
            justify-content: var(--counters-justify, center) !important;
            align-items: center !important;
            margin-top: var(--counters-spacing, 8px) !important;
            margin-bottom: 0 !important;
            border: none !important;
            background: transparent !important;
            padding: 0 !important;
            gap: 0 !important;
        }

        #goalCard.layout-minimalista #goalIcon {
            display: none !important;
        }

        #goalCard.layout-minimalista #goalMeta {
            display: none !important;
        }

        #goalCard.layout-minimalista #goalCounters {
            display: inline-flex !important;
            align-items: center !important;
            gap: 4px !important;
            font-size: var(--counters-font-size, 13px) !important;
            font-weight: 600 !important;
            color: var(--goal-text-color, #ffffff) !important;
            letter-spacing: 0.02em !important;
            text-transform: uppercase !important;
            background: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            padding: 0.35em 0.9em !important;
            border-radius: 100px !important;
            backdrop-filter: blur(4px) !important;
            -webkit-backdrop-filter: blur(4px) !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 2px 8px rgba(0,0,0,0.2) !important;
        }

        #goalCard.layout-minimalista #goalCurrent {
            font-size: 1em !important;
            font-weight: 800 !important;
            color: var(--primary-color, #ec4899) !important;
        }

        #goalCard.layout-minimalista #goalSep {
            font-size: 1em !important;
            margin: 0 3px !important;
            color: var(--goal-text-color-muted, rgba(255,255,255,0.4)) !important;
        }

        #goalCard.layout-minimalista #goalTarget {
            font-size: 1em !important;
            font-weight: 800 !important;
            color: var(--goal-text-color, #ffffff) !important;
        }

        #goalCard.layout-minimalista #pctBubble {
            display: none !important;
        }

        #goalCard.layout-minimalista #rewardRow {
            display: none !important;
        }

        /* 1. MODO MINIMALISTA (Tikfinity Style) */
        #goalCard.layout-minimal {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            padding: 10px 0 5px !important;
        }

        #goalCard.layout-minimal::before {
            display: none !important;
        }

        #goalCard.layout-minimal #goalHeader {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
            gap: 15px;
        }

        #goalCard.layout-minimal #goalIcon {
            display: none !important;
        }

        #goalCard.layout-minimal #goalMeta {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex: 1;
            margin: 0;
            padding: 0;
        }

        #goalCard.layout-minimal #goalLabel {
            margin-bottom: 0;
            font-size: 0.9em;
            order: 2; /* Switch order to look like "Goal (Label)" */
        }

        #goalCard.layout-minimal #goalTitle {
            font-size: 1.05em;
            font-weight: 700;
            order: 1;
            color: var(--goal-text-color, #ffffff);
        }

        #goalCard.layout-minimal #goalCounters {
            align-items: baseline;
        }

        #goalCard.layout-minimal #goalCurrent {
            font-size: 1.15em;
            font-weight: 800;
        }

        #goalCard.layout-minimal #goalSep {
            font-size: 0.9em;
        }

        #goalCard.layout-minimal #goalTarget {
            font-size: 0.95em;
            font-weight: 600;
        }

        #goalCard.layout-minimal #pctBubble {
            display: none !important;
        }

        #goalCard.layout-minimal #progressWrap {
            margin-bottom: 5px;
            border: none;
            box-shadow: none;
        }

        #goalCard.layout-minimal #rewardRow {
            margin-top: 5px;
        }

        /* 2. MODO INTEGRADO (Inline) */
        #goalCard.layout-inline {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            padding: 5px 0 !important;
        }

        #goalCard.layout-inline::before {
            display: none !important;
        }

        #goalCard.layout-inline #goalHeader {
            display: none !important;
        }

        #goalCard.layout-inline #pctBubble {
            display: none !important;
        }

        #goalCard.layout-inline #progressWrap {
            margin-bottom: 5px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #goalCard.layout-inline #inlineTextWrap {
            display: flex !important;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            inset: 0;
            padding: 0 12px;
            pointer-events: none;
            z-index: 5;
            font-family: var(--goal-font-family, 'Outfit', sans-serif);
            font-size: var(--goal-font-size, 14px);
            color: var(--goal-text-color, #ffffff);
            line-height: 1;
        }
        
        #goalCard.layout-inline #inlineTitle {
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        #goalCard.layout-inline #inlineCounter {
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        /* Tarjeta de fondo configurable */
        #goalCard.hide-card-bg {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            padding-top: 10px !important;
            padding-bottom: 10px !important;
        }
        #goalCard.hide-card-bg::before {
            display: none !important;
        }

        /* 3. MODO SESGADO (Cyberpunk/Sport) */
        #goalCard.layout-skewed {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            padding: 10px 0 !important;
        }

        #goalCard.layout-skewed::before {
            display: none !important;
        }

        #goalCard.layout-skewed #goalHeader {
            display: none !important;
        }

        #goalCard.layout-skewed #pctBubble {
            display: none !important;
        }

        #goalCard.layout-skewed #rewardRow {
            display: none !important;
        }

        #goalCard.layout-skewed #progressWrap {
            margin-bottom: 5px;
            transform: skewX(-15deg);
            transform-origin: top left;
            border: 4px solid var(--skewed-border-color, #9e9e9e);
            background: #000000 !important;
            border-radius: 0 !important;
            box-shadow: none;
            overflow: visible;
            height: var(--bar-height, 35px);
        }

        #goalCard.layout-skewed #progressTrack {
            border-radius: 0 !important;
        }

        #goalCard.layout-skewed #progressBar {
            border-radius: 0 !important;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
        }

        #goalCard.layout-skewed #progressBar::after {
            border-radius: 0 !important;
        }

        #goalCard.layout-skewed #skewedPercent {
            display: flex !important;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
            color: #d2f3ff;
            font-family: var(--goal-font-family, 'Outfit', sans-serif);
            font-size: calc(var(--goal-font-size, 14px) + 2px);
            font-weight: 900;
            z-index: 10;
            pointer-events: none;
            transform: skewX(15deg);
        }

        #goalCard.layout-skewed #skewedLabelWrap {
            display: inline-block !important;
            background: #9e9e9e;
            padding: 5px 18px;
            margin-top: 8px;
            transform: skewX(-15deg);
            transform-origin: top left;
        }

        #goalCard.layout-skewed #skewedText {
            font-family: var(--goal-font-family, 'Outfit', sans-serif);
            font-size: var(--goal-font-size, 14px);
            font-weight: 800;
            color: #111111;
            transform: skewX(15deg);
            white-space: nowrap;
        }

        /* Text shadow customizations */
        #pctBubble, #skewedPercent, #inlineTitle, #inlineCounter {
            text-shadow: var(--goal-text-shadow-inside, none) !important;
        }
        #goalTitle, #goalLabel, #goalCurrent, #goalSep, #goalTarget, #goalCounterLabel, #rewardText, #skewedText {
            text-shadow: var(--goal-text-shadow-outside, none) !important;
        }
    </style>
</head>

<body>

    <!-- Confetti canvas for celebration -->
    <canvas id="confettiCanvas"></canvas>

    <div id="goalCard">
        <!-- Decorative header -->
        <div id="goalHeader">
            <div id="goalIcon">🎯</div>
            <div id="goalMeta">
                <div id="goalLabel">Meta de sesión</div>
                <div id="goalTitle">¡Meta de seguidores!</div>
            </div>
            <div id="goalCounters">
                <span id="goalCounterLabel" style="display: none;"></span>
                <span id="goalCurrent">0</span>
                <span id="goalSep">/</span>
                <span id="goalTarget">500</span>
            </div>
        </div>

        <!-- Progress bar -->
        <div id="progressWrap">
            <div id="progressTrack">
                <div id="progressBar"></div>
            </div>
            <div id="pctBubble">0%</div>
            <!-- Inline text overlay for inline design mode -->
            <div id="inlineTextWrap" style="display: none;">
                <span id="inlineTitle"></span>
                <span id="inlineCounter"></span>
            </div>
            <!-- Center percentage for skewed design mode -->
            <div id="skewedPercent" style="display: none;">0%</div>
        </div>

        <!-- Slanted label wrapper for skewed design mode -->
        <div id="skewedLabelWrap" style="display: none;">
            <div id="skewedText"></div>
        </div>

        <!-- Reward text -->
        <div id="rewardRow">
            <span id="rewardIcon">🎁</span>
            <span id="rewardText">¡Desbloqueas una canción especial!</span>
        </div>

        <!-- Celebration badge (shown at 100%) -->
        <div id="celebrationBadge">
            <span>🎉</span>
            <span id="celebText">¡META ALCANZADA!</span>
            <span>🎉</span>
        </div>
    </div>

    <script>
        // =============================================
        //  URL PARAMS (overrides)
        // =============================================
        const params     = new URLSearchParams(location.search);
        const P_TYPE     = params.get('type')   || null;   // follows|likes|shares|coins
        const P_TARGET   = params.get('target') ? parseInt(params.get('target')) : null;
        const P_LABEL    = params.get('label')  || null;
        const P_COLOR    = params.get('color')  || null;

        // =============================================
        //  STATE
        // =============================================
        let cfg = {
            goalType:       P_TYPE   || 'follows',
            goalTarget:     P_TARGET || 500,
            goalLabel:      P_LABEL  || '¡Meta de seguidores!',
            goalRewardText: '¡Desbloqueas una canción especial!',
            primaryColor:   P_COLOR  || '#ec4899',
            enabled:        true,
            autoLoop:       false,
            layoutMode:     'premium',
            barHeight:      18,
            barRadius:      100,
            barBgColor:     'rgba(255, 255, 255, 0.06)',
            fontFamily:     'Outfit',
            fontSize:       14,
            textColor:      '#ffffff',
            showIcon:       true,
            showReward:     true,
            showPercentage: true,
            customWidth:    500,
            showCardBg:     true,
            textShadowInside:  '',
            textShadowOutside: '',
            insideShadowEnabled:  false,
            insideShadowX:        1,
            insideShadowY:        1,
            insideShadowBlur:     2,
            insideShadowColor:    '#000000',
            insideShadowOpacity:  80,
            outsideShadowEnabled: false,
            outsideShadowX:       1,
            outsideShadowY:       1,
            outsideShadowBlur:    2,
            outsideShadowColor:   '#000000',
            outsideShadowOpacity: 80
        };

        let currentValue    = 0;
        let wasComplete     = false;
        let confettiRunning = false;

        const GOAL_ICONS = {
            follows: '👥',
            likes:   '❤️',
            shares:  '🔁',
            coins:   '🪙'
        };

        // =============================================
        //  FIREBASE INIT
        // =============================================
        const localFirebaseConfigFallback = {
            apiKey:            'AIzaSyA6c3EaIvuPEfM6sTV0YHqCBHuz35ZmNIU',
            authDomain:        'zero-strom-web.firebaseapp.com',
            projectId:         'zero-strom-web',
            storageBucket:     'zero-strom-web.appspot.com',
            messagingSenderId: '758369466349',
            appId:             '1:758369466349:web:f2ced362a5a049c70b59e4'
        };

        let db             = null;
        let hasFirebase    = false;
        
        // Timer references
        let confettiTimeout = null;
        let completeTimeout = null;

        // Unsubscribe references
        let unsubConfig     = null;
        let unsubGeneral    = null;

        try {
            if (typeof firebase !== 'undefined') {
                const localFirebaseConfig = window.ZERO_FM_FIREBASE || localFirebaseConfigFallback;
                let app;
                if (firebase.apps && firebase.apps.length > 0) {
                    app = firebase.apps[0];
                    console.log('[Firebase] Reutilizando instancia existente ✓');
                } else {
                    app = firebase.initializeApp(localFirebaseConfig);
                    console.log('[Firebase] Conectado ✓');
                }
                db = firebase.firestore();
                hasFirebase = true;

                // Desuscribir listener anterior si existe
                if (unsubConfig) unsubConfig();

                // Listen: systemConfig/goalOverlayConfig
                unsubConfig = db.collection('systemConfig').doc('goalOverlayConfig').onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        console.log('[Firebase] goalOverlayConfig actualizado ✓', d);

                        // URL params take priority over Firestore config
                        cfg.goalType       = P_TYPE   || d.goalType       || cfg.goalType;
                        
                        const typeConfig = d[cfg.goalType] || {};
                        cfg.goalTarget     = P_TARGET || typeConfig.goalTarget     || d.goalTarget     || cfg.goalTarget;
                        cfg.goalLabel      = P_LABEL  || typeConfig.goalLabel      || d.goalLabel      || cfg.goalLabel;
                        cfg.goalRewardText = typeConfig.goalRewardText || d.goalRewardText || cfg.goalRewardText;
                        cfg.primaryColor   = P_COLOR  || typeConfig.primaryColor   || d.primaryColor   || cfg.primaryColor;
                        cfg.enabled        = typeConfig.enabled !== undefined ? typeConfig.enabled : (d.enabled !== undefined ? d.enabled : true);
                        cfg.goalsOpacity   = typeConfig.goalsOpacity !== undefined ? typeConfig.goalsOpacity : (d.goalsOpacity !== undefined ? d.goalsOpacity : 0.85);
                        cfg.goalsRadius    = typeConfig.goalsRadius !== undefined ? typeConfig.goalsRadius : (d.goalsRadius !== undefined ? d.goalsRadius : 22);
                        cfg.autoLoop       = typeConfig.autoLoop !== undefined ? typeConfig.autoLoop : (d.autoLoop !== undefined ? d.autoLoop : false);

                        // New customizable parameters
                        cfg.layoutMode     = typeConfig.layoutMode     || d.layoutMode     || 'premium';
                        cfg.barHeight      = typeConfig.barHeight !== undefined ? typeConfig.barHeight : (d.barHeight !== undefined ? d.barHeight : 18);
                        cfg.barRadius      = typeConfig.barRadius !== undefined ? typeConfig.barRadius : (d.barRadius !== undefined ? d.barRadius : 100);
                        cfg.barBgColor     = typeConfig.barBgColor     || d.barBgColor     || 'rgba(255, 255, 255, 0.06)';
                        cfg.fontFamily     = typeConfig.fontFamily     || d.fontFamily     || 'Outfit';
                        cfg.fontSize       = typeConfig.fontSize !== undefined ? typeConfig.fontSize : (d.fontSize !== undefined ? d.fontSize : 14);
                        cfg.textColor      = typeConfig.textColor      || d.textColor      || '#ffffff';
                        cfg.showIcon       = typeConfig.showIcon !== undefined ? typeConfig.showIcon : (d.showIcon !== undefined ? d.showIcon : true);
                        cfg.showReward     = typeConfig.showReward !== undefined ? typeConfig.showReward : (d.showReward !== undefined ? d.showReward : true);
                        cfg.showPercentage = typeConfig.showPercentage !== undefined ? typeConfig.showPercentage : (d.showPercentage !== undefined ? d.showPercentage : true);
                        cfg.customWidth    = typeConfig.customWidth !== undefined ? typeConfig.customWidth : (d.customWidth !== undefined ? d.customWidth : 500);
                        cfg.showCardBg     = typeConfig.showCardBg !== undefined ? typeConfig.showCardBg : (d.showCardBg !== undefined ? d.showCardBg : true);
                        cfg.countersAlign  = typeConfig.countersAlign  || d.countersAlign  || 'center';
                        cfg.countersSpacing = typeConfig.countersSpacing !== undefined ? typeConfig.countersSpacing : (d.countersSpacing !== undefined ? d.countersSpacing : 8);
                        cfg.countersLabel   = typeConfig.countersLabel !== undefined ? typeConfig.countersLabel : (d.countersLabel !== undefined ? d.countersLabel : '');
                        cfg.countersFontSize = typeConfig.countersFontSize !== undefined ? typeConfig.countersFontSize : (d.countersFontSize !== undefined ? d.countersFontSize : 13);
                        cfg.textShadowInside = typeConfig.textShadowInside !== undefined ? typeConfig.textShadowInside : (d.textShadowInside || '');
                        cfg.textShadowOutside = typeConfig.textShadowOutside !== undefined ? typeConfig.textShadowOutside : (d.textShadowOutside || '');

                        cfg.insideShadowEnabled = typeConfig.insideShadowEnabled !== undefined ? typeConfig.insideShadowEnabled : (d.insideShadowEnabled !== undefined ? d.insideShadowEnabled : false);
                        cfg.insideShadowX = typeConfig.insideShadowX !== undefined ? typeConfig.insideShadowX : (d.insideShadowX !== undefined ? d.insideShadowX : 1);
                        cfg.insideShadowY = typeConfig.insideShadowY !== undefined ? typeConfig.insideShadowY : (d.insideShadowY !== undefined ? d.insideShadowY : 1);
                        cfg.insideShadowBlur = typeConfig.insideShadowBlur !== undefined ? typeConfig.insideShadowBlur : (d.insideShadowBlur !== undefined ? d.insideShadowBlur : 2);
                        cfg.insideShadowColor = typeConfig.insideShadowColor || d.insideShadowColor || '#000000';
                        cfg.insideShadowOpacity = typeConfig.insideShadowOpacity !== undefined ? typeConfig.insideShadowOpacity : (d.insideShadowOpacity !== undefined ? d.insideShadowOpacity : 80);

                        cfg.outsideShadowEnabled = typeConfig.outsideShadowEnabled !== undefined ? typeConfig.outsideShadowEnabled : (d.outsideShadowEnabled !== undefined ? d.outsideShadowEnabled : false);
                        cfg.outsideShadowX = typeConfig.outsideShadowX !== undefined ? typeConfig.outsideShadowX : (d.outsideShadowX !== undefined ? d.outsideShadowX : 1);
                        cfg.outsideShadowY = typeConfig.outsideShadowY !== undefined ? typeConfig.outsideShadowY : (d.outsideShadowY !== undefined ? d.outsideShadowY : 1);
                        cfg.outsideShadowBlur = typeConfig.outsideShadowBlur !== undefined ? typeConfig.outsideShadowBlur : (d.outsideShadowBlur !== undefined ? d.outsideShadowBlur : 2);
                        cfg.outsideShadowColor = typeConfig.outsideShadowColor || d.outsideShadowColor || '#000000';
                        cfg.outsideShadowOpacity = typeConfig.outsideShadowOpacity !== undefined ? typeConfig.outsideShadowOpacity : (d.outsideShadowOpacity !== undefined ? d.outsideShadowOpacity : 80);

                        applyConfig();
                    }
                }, err => console.warn('[Firebase] goalOverlayConfig error:', err));

                // Desuscribir listener anterior si existe
                if (unsubGeneral) unsubGeneral();

                // Listen: globalStats/general
                unsubGeneral = db.collection('globalStats').doc('general').onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        const params = new URLSearchParams(window.location.search);
                        // Default to using streamTotalLikes unless streamLikes is explicitly 'false'
                        const useStreamLikes = params.get('streamLikes') !== 'false' && params.get('useStreamLikes') !== 'false';
                        const fieldMap = {
                            follows: 'sessionFollows',
                            likes:   useStreamLikes ? 'streamTotalLikes' : 'sessionLikes',
                            shares:  'sessionShares',
                            coins:   'sessionCoins'
                        };
                        const field = fieldMap[cfg.goalType] || 'sessionFollows';
                        const val   = Number(d[field] || 0);
                        console.log(`[Firebase] globalStats.general → ${field} = ${val}`);
                        window.lastRealProgress = val;
                        if (!window.isTestActive) {
                            updateProgress(val);
                        }
                    }
                }, err => console.warn('[Firebase] globalStats/general error:', err));
            }
        } catch (e) {
            console.error('[Firebase] Error al iniciar:', e);
        }

        // =============================================
        //  APPLY CONFIG TO DOM
        // =============================================
        function applyConfig() {
            const card = document.getElementById('goalCard');

            // enabled guard
            if (!cfg.enabled) {
                card.style.display = 'none';
                return;
            } else {
                card.style.display = 'block';
            }

            // Colors
            setColorVars(cfg.primaryColor);

            // Apply customizable styles via CSS variables
            const root = document.documentElement;
            
            // Width
            const widthVal = cfg.customWidth !== undefined ? cfg.customWidth : 500;
            root.style.setProperty('--goal-width', widthVal + 'px');
            
            // Font Family
            const fontVal = cfg.fontFamily || 'Outfit';
            root.style.setProperty('--goal-font-family', `'${fontVal}', 'Segoe UI', sans-serif`);
            
            // Font Size
            const sizeVal = cfg.fontSize !== undefined ? cfg.fontSize : 14;
            root.style.setProperty('--goal-font-size', sizeVal + 'px');
            
            // Text Colors
            const textCol = cfg.textColor || '#ffffff';
            root.style.setProperty('--goal-text-color', textCol);
            root.style.setProperty('--goal-text-color-muted', getMutedColor(textCol, 0.5));
            
            // Bar Dimensions & Colors
            const barH = cfg.barHeight !== undefined ? cfg.barHeight : 18;
            root.style.setProperty('--bar-height', barH + 'px');
            
            const barRad = cfg.barRadius !== undefined ? cfg.barRadius : 100;
            root.style.setProperty('--bar-radius', barRad + 'px');
            
            const barBgCol = cfg.barBgColor || 'rgba(255, 255, 255, 0.06)';
            root.style.setProperty('--bar-bg', barBgCol);

            // Counters Alignment & Spacing Mapping
            const align = cfg.countersAlign || 'center';
            let justify = 'center';
            if (align === 'left') justify = 'flex-start';
            else if (align === 'right') justify = 'flex-end';
            root.style.setProperty('--counters-justify', justify);
            
            const spacingVal = cfg.countersSpacing !== undefined ? cfg.countersSpacing : 8;
            root.style.setProperty('--counters-spacing', spacingVal + 'px');

            const countersFontVal = cfg.countersFontSize !== undefined ? cfg.countersFontSize : 13;
            root.style.setProperty('--counters-font-size', countersFontVal + 'px');

            // Opacity & Border Radius Overrides (Premium Card only)
            if (cfg.goalsOpacity !== undefined) {
                root.style.setProperty('--goal-bg-opacity', cfg.goalsOpacity);
            }
            if (cfg.goalsRadius !== undefined) {
                root.style.setProperty('--goal-border-radius', cfg.goalsRadius + 'px');
            }

            const hexToRgbaStr = (hex, opacity) => {
                try {
                    const rgb = hexToRgb(hex);
                    return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;
                } catch (e) {
                    return hex;
                }
            };

            // Text shadows
            let shadowInside = cfg.textShadowInside || 'none';
            if (cfg.insideShadowEnabled) {
                const x = cfg.insideShadowX !== undefined ? cfg.insideShadowX : 1;
                const y = cfg.insideShadowY !== undefined ? cfg.insideShadowY : 1;
                const blur = cfg.insideShadowBlur !== undefined ? cfg.insideShadowBlur : 2;
                const color = cfg.insideShadowColor || '#000000';
                const opacity = (cfg.insideShadowOpacity !== undefined ? cfg.insideShadowOpacity : 80) / 100;
                shadowInside = `${x}px ${y}px ${blur}px ${hexToRgbaStr(color, opacity)}`;
            }
            root.style.setProperty('--goal-text-shadow-inside', shadowInside);

            let shadowOutside = cfg.textShadowOutside || 'none';
            if (cfg.outsideShadowEnabled) {
                const x = cfg.outsideShadowX !== undefined ? cfg.outsideShadowX : 1;
                const y = cfg.outsideShadowY !== undefined ? cfg.outsideShadowY : 1;
                const blur = cfg.outsideShadowBlur !== undefined ? cfg.outsideShadowBlur : 2;
                const color = cfg.outsideShadowColor || '#000000';
                const opacity = (cfg.outsideShadowOpacity !== undefined ? cfg.outsideShadowOpacity : 80) / 100;
                shadowOutside = `${x}px ${y}px ${blur}px ${hexToRgbaStr(color, opacity)}`;
            }
            root.style.setProperty('--goal-text-shadow-outside', shadowOutside);

            // Layout classes toggle
            card.className = 'visible';
            card.classList.add(`layout-${cfg.layoutMode || 'premium'}`);
            if (cfg.showCardBg === false) {
                card.classList.add('hide-card-bg');
            }

            // Visibilities
            document.getElementById('goalIcon').style.display = cfg.showIcon !== false ? 'flex' : 'none';
            document.getElementById('rewardRow').style.display = cfg.showReward !== false ? 'flex' : 'none';
            
            // Inline text wrap visibility
            const inlineWrap = document.getElementById('inlineTextWrap');
            if (inlineWrap) {
                inlineWrap.style.display = cfg.layoutMode === 'inline' ? 'flex' : 'none';
                if (cfg.layoutMode === 'inline') {
                    document.getElementById('inlineTitle').textContent = cfg.goalLabel;
                }
            }

            // Skewed layout elements visibility
            const skewedPercent = document.getElementById('skewedPercent');
            const skewedLabelWrap = document.getElementById('skewedLabelWrap');
            if (skewedPercent) {
                skewedPercent.style.display = (cfg.layoutMode === 'skewed' || cfg.layoutMode === 'minimalista') ? 'flex' : 'none';
            }
            if (skewedLabelWrap) {
                skewedLabelWrap.style.display = cfg.layoutMode === 'skewed' ? 'inline-block' : 'none';
            }

            // Icon
            const icon = GOAL_ICONS[cfg.goalType] || '🎯';
            document.getElementById('goalIcon').textContent = icon;

            // Texts
            document.getElementById('goalLabel').textContent = labelForType(cfg.goalType);
            document.getElementById('rewardText').textContent = cfg.goalRewardText;
            
            const elTitle = document.getElementById('goalTitle');
            if (elTitle && cfg.layoutMode !== 'minimalista') {
                elTitle.textContent = cfg.goalLabel;
            }
            
            // Minimalista label prefix setting
            const MINIMALISTA_LABELS = {
                likes:   'Meta LIKES ♥️ ',
                follows: 'Meta SEGUIDORES 👥 ',
                shares:  'Meta COMPARTIDOS 🔁 ',
                coins:   'Meta REGALOS 🪙 '
            };
            const minimalistaLabel = document.getElementById('goalCounterLabel');
            if (minimalistaLabel) {
                if (cfg.layoutMode === 'minimalista') {
                    const customLabel = cfg.countersLabel !== undefined ? cfg.countersLabel : '';
                    minimalistaLabel.textContent = customLabel !== '' ? customLabel : (MINIMALISTA_LABELS[cfg.goalType] || 'Meta ');
                    minimalistaLabel.style.display = 'inline';
                } else {
                    minimalistaLabel.style.display = 'none';
                }
            }
            
            // If minimal layout, formatting of goalTarget is updated in updateProgress to include percentage inline
            if (cfg.layoutMode !== 'minimal') {
                document.getElementById('goalTarget').textContent = cfg.goalTarget.toLocaleString('es-MX');
            }
        }

        function getMutedColor(hex, opacity = 0.5) {
            const rgb = hexToRgb(hex);
            if (!rgb) return `rgba(255, 255, 255, ${opacity})`;
            return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;
        }

        function labelForType(type) {
            const labels = {
                follows: 'Seguidores',
                likes:   'Me gusta',
                shares:  'Compartidos',
                coins:   'Monedas'
            };
            return labels[type] || 'Meta';
        }

        function setColorVars(hex) {
            const rgb = hexToRgb(hex);
            if (!rgb) return;
            const r = rgb.r, g = rgb.g, b = rgb.b;

            const root = document.documentElement;
            root.style.setProperty('--primary-color',  hex);
            root.style.setProperty('--primary-rgba',   `rgba(${r},${g},${b},0.18)`);
            root.style.setProperty('--primary-border',  `rgba(${r},${g},${b},0.30)`);
            root.style.setProperty('--primary-shadow',  `rgba(${r},${g},${b},0.55)`);
            root.style.setProperty('--glow-color',      `rgba(${r},${g},${b},0.22)`);
            root.style.setProperty('--bar-start',       shiftColor(hex, -30));
            root.style.setProperty('--bar-end',         shiftColor(hex, +40));
        }

        // =============================================
        //  UPDATE PROGRESS
        // =============================================
        function updateProgress(val) {
            const prev    = currentValue;
            currentValue  = Math.max(0, val);
            const target  = Math.max(1, cfg.goalTarget);
            
            let displayVal = currentValue;
            let displayTarget = target;
            let pct = (currentValue / target) * 100;
            
            if (cfg.autoLoop) {
                // Modo Auto-loop: Incrementar el target al siguiente múltiplo y mostrar valor acumulado
                const level = currentValue > 0 ? Math.floor((currentValue - 1) / target) : 0;
                displayTarget = (level + 1) * target;
                displayVal = currentValue;
                pct = (currentValue / displayTarget) * 100;
                
                // Si completó un ciclo (por ejemplo, subió de nivel) emitir sparks y confetti
                const prevLevel = prev > 0 ? Math.floor((prev - 1) / target) : 0;
                if (level > prevLevel) {
                    emitSparks(100);
                    startConfetti();
                }
            } else {
                // Modo Normal: sparks normales en hitos
                const milestones = [25, 50, 75, 100];
                const prevPct    = Math.min(100, (prev / target) * 100);
                const currentPct = Math.min(100, pct);
                milestones.forEach(m => {
                    if (prevPct < m && currentPct >= m) emitSparks(m);
                });
            }

            const pctInt  = Math.round(pct);
            const isComp  = pct >= 100;

            // Animate counter
            animateCounter(
                document.getElementById('goalCurrent'),
                prev,
                displayVal
            );

            // Bar (usar GPU transform scaleX en lugar de reflow de width)
            document.getElementById('progressBar').style.transform = 'scaleX(' + (Math.min(100, pct) / 100) + ')';

            // Percentage bubble
            const bubble = document.getElementById('pctBubble');
            if (bubble) {
                bubble.textContent = pctInt + '%';
                const clampedLeft = Math.min(Math.max(pct, 4), 96);
                bubble.style.left  = clampedLeft + '%';
                bubble.style.display = cfg.showPercentage !== false && cfg.layoutMode === 'premium' ? 'block' : 'none';
            }

            // Minimal layout inline percentage or normal target counter
            if (cfg.layoutMode === 'minimal') {
                const showPct = cfg.showPercentage !== false;
                const pctText = showPct ? ` (${pctInt}%)` : '';
                document.getElementById('goalTarget').textContent = `${displayTarget.toLocaleString('es-MX')}${pctText}`;
            } else {
                document.getElementById('goalTarget').textContent = displayTarget.toLocaleString('es-MX');
            }

            // Inline design mode texts
            const inlineCounter = document.getElementById('inlineCounter');
            if (inlineCounter) {
                const showPct = cfg.showPercentage !== false;
                const pctText = showPct ? ` (${pctInt}%)` : '';
                inlineCounter.textContent = `${displayVal.toLocaleString('es-MX')} / ${displayTarget.toLocaleString('es-MX')}${pctText}`;
            }

            // Skewed design mode percentage
            const skewedPercent = document.getElementById('skewedPercent');
            if (skewedPercent) {
                skewedPercent.textContent = pctInt + '%';
            }

            // Minimalista (TikFinity style) dynamic title percentage
            if (cfg.layoutMode === 'minimalista') {
                const elTitle = document.getElementById('goalTitle');
                if (elTitle) {
                    elTitle.textContent = pctInt + '%';
                }
            }

            // Skewed design mode bottom label text
            const skewedText = document.getElementById('skewedText');
            if (skewedText) {
                let metricName = 'Seguidores';
                if (cfg.goalType === 'likes') metricName = 'Likes';
                else if (cfg.goalType === 'shares') metricName = 'Compartidos';
                else if (cfg.goalType === 'coins') metricName = 'Monedas';
                
                skewedText.textContent = `${cfg.goalLabel} - ${displayVal.toLocaleString('es-MX')} / ${displayTarget.toLocaleString('es-MX')} ${metricName}`;
            }

            // Complete state
            const card = document.getElementById('goalCard');
            if (!cfg.autoLoop) {
                if (isComp) {
                    if (!wasComplete) {
                        card.classList.add('complete');
                        startConfetti();
                        wasComplete = true;
                    }
                } else {
                    if (wasComplete) {
                        card.classList.remove('complete');
                        stopConfetti();
                        wasComplete = false;
                    }
                }
            } else {
                // En modo loop, si subió de nivel (completó un ciclo), brillar temporalmente
                const prevLevel = prev > 0 ? Math.floor((prev - 1) / target) : 0;
                const level = currentValue > 0 ? Math.floor((currentValue - 1) / target) : 0;
                if (level > prevLevel) {
                    card.classList.add('complete');
                    if (completeTimeout) clearTimeout(completeTimeout);
                    completeTimeout = setTimeout(() => {
                        completeTimeout = null;
                        card.classList.remove('complete');
                    }, 2500);
                }
            }
        }

        // =============================================
        //  ANIMATED NUMBER COUNTER
        // =============================================
        function animateCounter(el, from, to) {
            const duration = 900;
            const start    = performance.now();
            const diff     = to - from;

            function step(now) {
                const t        = Math.min((now - start) / duration, 1);
                const ease     = 1 - Math.pow(1 - t, 4);
                const current  = Math.round(from + diff * ease);
                el.textContent = current.toLocaleString('es-MX');
                if (t < 1) requestAnimationFrame(step);
                else el.textContent = to.toLocaleString('es-MX');
            }
            requestAnimationFrame(step);
        }

        // =============================================
        //  SPARKS BURST
        // =============================================
        function emitSparks(milestone) {
            const wrap = document.getElementById('progressWrap');
            const pct  = Math.min(milestone, 96);

            for (let i = 0; i < 8; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                const angle = (Math.random() * 180 + 180) * (Math.PI / 180);
                const dist  = 20 + Math.random() * 30;
                const tx    = Math.round(Math.cos(angle) * dist);
                const ty    = Math.round(Math.sin(angle) * dist - 15);
                const dur   = 0.5 + Math.random() * 0.5;
                spark.style.setProperty('--tx', tx + 'px');
                spark.style.setProperty('--ty', ty + 'px');
                spark.style.setProperty('--d',  dur + 's');
                spark.style.left = pct + '%';
                spark.style.top  = '50%';
                wrap.appendChild(spark);
                spark.addEventListener('animationend', () => spark.remove());
            }
        }

        // =============================================
        //  CONFETTI ENGINE
        // =============================================
        const canvas  = document.getElementById('confettiCanvas');
        const ctx     = canvas.getContext('2d');
        let confetti  = [];
        let confettiRaf = null;

        function startConfetti() {
            if (confettiRunning) return;
            confettiRunning = true;
            canvas.style.display = 'block';
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;

            // Spawn particles
            const colors = buildConfettiPalette(cfg.primaryColor);
            for (let i = 0; i < 120; i++) {
                confetti.push(makeParticle(colors));
            }

            // Auto-stop after 4 s
            if (confettiTimeout) clearTimeout(confettiTimeout);
            confettiTimeout = setTimeout(() => {
                confettiTimeout = null;
                stopConfetti();
            }, 4000);
            drawConfetti();
        }

        function stopConfetti() {
            if (confettiTimeout) {
                clearTimeout(confettiTimeout);
                confettiTimeout = null;
            }
            confettiRunning = false;
            cancelAnimationFrame(confettiRaf);
            confetti = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.style.display = 'none';
        }

        function buildConfettiPalette(hex) {
            return [
                hex,
                shiftColor(hex, -30),
                shiftColor(hex, +40),
                '#ffffff',
                '#ffec9b',
                '#a5f3fc'
            ];
        }

        function makeParticle(colors) {
            return {
                x:      Math.random() * canvas.width,
                y:      Math.random() * -canvas.height * 0.5,
                w:      6  + Math.random() * 8,
                h:      3  + Math.random() * 5,
                color:  colors[Math.floor(Math.random() * colors.length)],
                rot:    Math.random() * Math.PI * 2,
                rotV:   (Math.random() - 0.5) * 0.18,
                vx:     (Math.random() - 0.5) * 3,
                vy:     2  + Math.random() * 4,
                alpha:  0.85 + Math.random() * 0.15
            };
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confetti.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();

                p.x   += p.vx;
                p.y   += p.vy;
                p.rot += p.rotV;
                if (p.y > canvas.height + 20) {
                    p.y = -10;
                    p.x = Math.random() * canvas.width;
                }
            });
            if (confettiRunning) {
                confettiRaf = requestAnimationFrame(drawConfetti);
            }
        }

        // =============================================
        //  COLOR UTILITIES
        // =============================================
        function hexToRgb(hex) {
            hex = hex.replace(/^#/, '');
            if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
            const n = parseInt(hex, 16);
            return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
        }

        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(v =>
                Math.max(0, Math.min(255, v)).toString(16).padStart(2, '0')
            ).join('');
        }

        function shiftColor(hex, amount) {
            const { r, g, b } = hexToRgb(hex);
            return rgbToHex(r + amount, g + amount, b + amount);
        }

        // =============================================
        //  PREVIEW (mock data when no Firebase)
        // =============================================
        function showPreview() {
            console.log('[Goal] Mostrando preview (sin Firebase)');
            cfg = {
                goalType:       P_TYPE   || 'follows',
                goalTarget:     P_TARGET || 500,
                goalLabel:      P_LABEL  || '¡Meta de seguidores!',
                goalRewardText: '¡Desbloqueas una canción especial!',
                primaryColor:   P_COLOR  || '#ec4899',
                enabled:        true,
                layoutMode:     'premium',
                barHeight:      18,
                barRadius:      100,
                barBgColor:     'rgba(255, 255, 255, 0.06)',
                fontFamily:     'Outfit',
                fontSize:       14,
                textColor:      '#ffffff',
                showIcon:       true,
                showReward:     true,
                showPercentage: true,
                customWidth:    500,
                showCardBg:     true
            };
            applyConfig();
            const card = document.getElementById('goalCard');
            card.classList.add('visible');
            // 65% progress demo
            const mockVal = Math.round(cfg.goalTarget * 0.65);
            updateProgress(mockVal);
        }

        // =============================================
        //  INIT
        // =============================================
        window.addEventListener('load', () => {
            // Apply initial config (URL params / defaults)
            applyConfig();
            
            setTimeout(() => {
                if (!hasFirebase) {
                    showPreview();
                }
            }, 1000);
        });

        // Receptor de mensajería (postMessage) para previsualización interactiva offline
        window.addEventListener('message', function(event) {
            if (event.data) {
                if (event.data.action === 'triggerTestGoal') {
                    console.log("[goal_overlay] Progreso de prueba recibido:", event.data.payload);
                    window.isTestActive = true;
                    // Make card visible for preview
                    const card = document.getElementById('goalCard');
                    if (card) card.classList.add('visible');
                    updateProgress(Number(event.data.payload.value));
                    
                    if (window.testGoalTimeout) clearTimeout(window.testGoalTimeout);
                    window.testGoalTimeout = setTimeout(() => {
                        window.isTestActive = false;
                        console.log("[goal_overlay] Test finished. Restoring real progress...");
                        if (window.lastRealProgress !== undefined) {
                            updateProgress(window.lastRealProgress);
                        } else if (!hasFirebase) {
                            // No real data; hide card again
                            if (card) card.classList.remove('visible');
                        }
                    }, 8000);
                } else if (event.data.action === 'updateConfig') {
                    console.log("[goal_overlay] Config de prueba recibida:", event.data.payload);
                    window.isTestActive = false;
                    if (window.testGoalTimeout) clearTimeout(window.testGoalTimeout);
                    Object.assign(cfg, event.data.payload);
                    applyConfig();
                    // Make card visible so preview shows immediately after config update
                    const card = document.getElementById('goalCard');
                    if (card) card.classList.add('visible');
                    
                    if (window.lastRealProgress !== undefined) {
                        updateProgress(window.lastRealProgress);
                    } else {
                        // Restore currentValue progress based on raw current content text
                        let currentVal = 0;
                        const elCurrent = document.getElementById('goalCurrent');
                        if (elCurrent) {
                            currentVal = parseInt(elCurrent.textContent.replace(/,/g, '')) || 0;
                        }
                        updateProgress(currentVal);
                    }
                }
            }
        });
    </script>

</body>
