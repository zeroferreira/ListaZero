<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>YouTube Display Overlay - Zero FM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <!-- Firebase Shared Config -->
  <script src="firebase-config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #ff003c;
      --accent2: #ff6b6b;
      --card-w: 420px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: transparent;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 28px;
      overflow: hidden;
    }

    /* ─── IDLE ─────────────────────────────── */
    #idle {
      display: none; /* hidden by default in OBS */
    }

    /* ─── PLAYER CARD ──────────────────────── */
    #player-card {
      width: var(--card-w);
      background: rgba(10, 10, 15, 0.82);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 22px;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.7),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.10) inset;
      overflow: hidden;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none;
    }

    #player-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── Blurred background artwork ──────── */
    .card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(60px) brightness(0.25) saturate(2);
      transform: scale(1.3);
      z-index: 0;
      transition: background-image 0.6s ease;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ─── Top row: thumbnail + info ─────── */
    .top-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    /* Thumbnail / Artwork */
    .artwork-wrap {
      flex-shrink: 0;
      width: 82px;
      height: 82px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative;
      background: #111;
    }

    .artwork-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s ease;
    }

    /* YouTube logo watermark on artwork */
    .yt-badge {
      position: absolute;
      bottom: 5px;
      right: 5px;
      background: rgba(0,0,0,0.75);
      border-radius: 5px;
      padding: 2px 5px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .yt-badge svg { display: block; }

    /* Text info */
    .info-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 2px;
    }

    .yt-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.9;
      margin-bottom: 2px;
    }

    .song-title {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      line-height: 1.25;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .artist-name {
      font-size: 12.5px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── Requester pill ────────────────── */
    .requester-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .req-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 0, 60, 0.12);
      border: 1px solid rgba(255, 0, 60, 0.28);
      border-radius: 99px;
      padding: 5px 12px;
      font-size: 11.5px;
      font-weight: 700;
      color: #fff;
      max-width: 100%;
      overflow: hidden;
    }
    .req-pill .req-icon { font-size: 12px; flex-shrink: 0; }
    .req-pill .req-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── Progress bar ──────────────────── */
    .progress-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.8s linear;
    }

    /* Shimmer when "playing" */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .progress-fill.playing {
      background: linear-gradient(90deg, #ff003c, #ff6b6b, #ff003c);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.04em;
    }

    /* ─── State indicator dot ───────────── */
    .state-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--accent);
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    .state-dot.playing { animation: pulse-dot 1.2s ease-in-out infinite; }
    .state-dot.paused { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; animation: none; }
    .state-dot.ended, .state-dot.idle { background: #6b7280; box-shadow: none; animation: none; }

    .state-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: -4px;
    }
  </style>
</head>
<body>

  <!-- Player Card -->
  <div id="player-card">
    <div class="card-bg" id="card-bg"></div>
    <div class="card-inner">

      <!-- Top: Artwork + Info -->
      <div class="top-row">
        <div class="artwork-wrap">
          <img id="artwork" src="" alt="Thumbnail">
          <div class="yt-badge">
            <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
              <rect width="14" height="10" rx="2.5" fill="#FF0000"/>
              <path d="M5.5 3L9.5 5L5.5 7V3Z" fill="white"/>
            </svg>
          </div>
        </div>
        <div class="info-col">
          <div class="yt-label">▶ YouTube — Zero FM</div>
          <div class="song-title" id="song-title">Cargando...</div>
          <div class="artist-name" id="artist-name">—</div>
        </div>
      </div>

      <!-- Status row -->
      <div class="status-row">
        <div class="state-dot" id="state-dot"></div>
        <div class="state-label" id="state-label">En espera</div>
      </div>

      <!-- Progress bar -->
      <div class="progress-section">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="time-elapsed">0:00</span>
          <span id="time-total">—</span>
        </div>
      </div>

      <!-- Requester -->
      <div class="requester-row">
        <div class="req-pill">
          <span class="req-icon">👤</span>
          <span class="req-name" id="req-name">—</span>
        </div>
      </div>

    </div>
  </div>
  
  <!-- Invisible YouTube Iframe Player Container -->
  <div id="yt-player" style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; left: -9999px;"></div>

<script>
  // ─── DOM refs ────────────────────────────────
  const card       = document.getElementById('player-card');
  const cardBg     = document.getElementById('card-bg');
  const artwork    = document.getElementById('artwork');
  const songTitle  = document.getElementById('song-title');
  const artistName = document.getElementById('artist-name');
  const stateDot   = document.getElementById('state-dot');
  const stateLabel = document.getElementById('state-label');
  const progressFill = document.getElementById('progress-fill');
  const timeElapsed  = document.getElementById('time-elapsed');
  const timeTotal    = document.getElementById('time-total');
  const reqName    = document.getElementById('req-name');

  // ─── State ───────────────────────────────────
  let currentVideoId  = null;
  let currentState    = 'idle';   // idle | playing | paused | ended
  let elapsedSec      = 0;
  let durationSec     = 0;
  let timerInterval   = null;
  let isVisible       = false;

  // YouTube Player instance state
  let ytPlayer = null;
  let isYtApiReady = false;
  let pendingVideoId = null;
  let currentVolume = 100;

  // ─── YouTube Iframe API Loader ────────────────
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  window.onYouTubeIframeAPIReady = function() {
    isYtApiReady = true;
    console.log("🎥 API de YouTube lista");
    if (pendingVideoId) {
      createOrLoadPlayer(pendingVideoId);
      pendingVideoId = null;
    }
  };

  function createOrLoadPlayer(videoId) {
    if (!isYtApiReady) {
      pendingVideoId = videoId;
      return;
    }

    if (ytPlayer) {
      try {
        ytPlayer.loadVideoById(videoId);
        updatePlayerMuteState();
        ytPlayer.playVideo();
        return;
      } catch (e) {
        console.warn("Error re-using player, re-creating...", e);
      }
    }

    ytPlayer = new YT.Player('yt-player', {
      height: '1',
      width: '1',
      videoId: videoId,
      playerVars: {
        'autoplay': 1,
        'controls': 0,
        'disablekb': 1,
        'fs': 0,
        'rel': 0,
        'showinfo': 0,
        'iv_load_policy': 3
      },
      events: {
        'onReady': (event) => {
          updatePlayerMuteState(currentVolume);
          event.target.playVideo();
        },
        'onStateChange': (event) => {
          // 1 = PLAYING, 2 = PAUSED, 0 = ENDED
          if (event.data === 1) {
            if (currentState !== 'playing') {
              applyState('playing');
            }
          } else if (event.data === 2) {
            if (currentState !== 'paused') {
              applyState('paused');
            }
          } else if (event.data === 0) {
            if (currentState !== 'ended') {
              applyState('ended');
              reportEndedToFirestore();
            }
          }
        }
      }
    });
  }

  function updatePlayerMuteState(customVolume) {
    if (!ytPlayer || typeof ytPlayer.mute !== 'function') return;
    
    if (typeof customVolume === 'number') {
      if (customVolume > 0) {
        ytPlayer.unMute();
        ytPlayer.setVolume(customVolume);
        console.log(`🔊 Audio des-silenciado. Volumen: ${customVolume}`);
      } else {
        ytPlayer.mute();
        console.log(`🔇 Audio silenciado (volumen 0)`);
      }
      return;
    }
    
    const params = new URLSearchParams(window.location.search);
    const isObsParam = params.get('obs') === 'true' || window.location.search.includes('obs') || (typeof window.obsstudio !== 'undefined');
    
    const hostname = window.location.hostname;
    const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
    
    // Check if it is running on a Mac browser (macOS)
    const isMac = navigator.userAgent.includes('Macintosh') || navigator.userAgent.includes('Mac OS X');

    // Muted if:
    // - Explicitly asked for OBS (isObsParam)
    // - Loaded via localhost/127.0.0.1 (usually local OBS sources)
    // - NOT running on macOS (to prevent Windows PC from playing audio)
    if (isObsParam || isLocalhost || !isMac) {
      ytPlayer.mute();
      console.log(`🔇 Audio silenciado por defecto. Host: ${hostname}, Mac: ${isMac}, OBS: ${isObsParam}`);
    } else {
      ytPlayer.unMute();
      ytPlayer.setVolume(100);
      console.log(`🔊 Audio activado por defecto. Host: ${hostname}, Mac: ${isMac}`);
    }
  }

  function syncPlayerState(state, vid) {
    if (typeof YT === 'undefined' || !isYtApiReady) {
      if (vid) pendingVideoId = vid;
      return;
    }
    if (vid && (!ytPlayer || vid !== currentVideoId)) {
      createOrLoadPlayer(vid);
      return;
    }
    if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
      const ytState = ytPlayer.getPlayerState();
      if (state === 'playing' && ytState !== 1) {
        updatePlayerMuteState();
        ytPlayer.playVideo();
      } else if (state === 'paused' && ytState !== 2) {
        ytPlayer.pauseVideo();
      } else if ((state === 'ended' || state === 'idle') && ytState !== 0 && ytState !== 5) {
        ytPlayer.stopVideo();
      }
    }
  }

  async function reportEndedToFirestore() {
    if (db) {
      try {
        await db.collection('systemConfig').doc('activeYoutubeVideo').update({
          state: 'ended'
        });
        console.log("✅ Video marcado como terminado en Firestore");
      } catch (e) {
        console.error("Error al actualizar Firestore (ended):", e);
      }
    }
  }

  // ─── Helpers ─────────────────────────────────
  function getYoutubeVideoId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtu\.be\/|v\/|watch\?v=|shorts\/)([^#&?]{11})/);
    return m ? m[1] : (url.length === 11 ? url : null);
  }

  function getThumbnailUrl(videoId) {
    if (!videoId) return '';
    return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
  }

  function fmtTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  // ─── Update UI from data ──────────────────────
  function applyData(data) {
    if (!data || !data.videoId) { setIdle(); return; }

    const vid = getYoutubeVideoId(data.videoId) || data.videoId;
    const thumb = getThumbnailUrl(vid);

    // Artwork + blurred BG
    artwork.src = thumb;
    cardBg.style.backgroundImage = `url('${thumb}')`;

    songTitle.textContent  = data.title    || 'Sin título';
    artistName.textContent = data.artist   || 'YouTube Creator';
    reqName.textContent    = data.requester || '—';

    // Duration
    if (data.duration) {
      durationSec = parseFloat(data.duration);
      timeTotal.textContent = fmtTime(durationSec);
    } else {
      durationSec = 0;
      timeTotal.textContent = '—';
    }

    // Elapsed / seek
    if (typeof data.elapsed === 'number') {
      elapsedSec = data.elapsed;
    } else if (data.state === 'playing' && currentVideoId !== vid) {
      elapsedSec = 0;
    }

    const videoChanged = currentVideoId !== vid;
    
    applyState(data.state || 'playing');
    
    // Sync YT audio player state
    if (videoChanged) {
      createOrLoadPlayer(vid);
    } else {
      syncPlayerState(data.state || 'playing', vid);
    }
    
    if (typeof data.volume === 'number') {
      currentVolume = data.volume;
      updatePlayerMuteState(currentVolume);
    }

    currentVideoId = vid;
    showCard();
  }

  function showCard() {
    if (!isVisible) {
      card.classList.add('visible');
      isVisible = true;
    }
  }

  function hideCard() {
    card.classList.remove('visible');
    isVisible = false;
  }

  function applyState(state) {
    currentState = state;
    stopTimer();

    stateDot.className   = 'state-dot';
    progressFill.className = 'progress-fill';

    if (state === 'playing') {
      stateDot.classList.add('playing');
      progressFill.classList.add('playing');
      stateLabel.textContent = 'Reproduciendo';
      startTimer();
    } else if (state === 'paused') {
      stateDot.classList.add('paused');
      stateLabel.textContent = 'En pausa';
      updateProgress();
    } else if (state === 'ended') {
      stateDot.classList.add('ended');
      stateLabel.textContent = 'Terminado';
      elapsedSec = durationSec;
      updateProgress();
      // Auto-hide after 4s
      setTimeout(() => setIdle(), 4000);
    } else {
      stateDot.classList.add('idle');
      stateLabel.textContent = 'En espera';
    }
    syncPlayerState(state, currentVideoId);
  }

  function setIdle() {
    stopTimer();
    hideCard();
    currentVideoId = null;
    elapsedSec = 0;
    progressFill.style.width = '0%';
    timeElapsed.textContent = '0:00';
    timeTotal.textContent   = '—';
    currentState = 'idle';
    
    // Stop video playback too
    if (ytPlayer && typeof ytPlayer.stopVideo === 'function') {
      try {
        ytPlayer.stopVideo();
      } catch (e) {}
    }
  }

  // ─── Progress timer (visual only, no audio) ──
  function startTimer() {
    timerInterval = setInterval(() => {
      if (currentState !== 'playing') return;
      elapsedSec++;
      if (durationSec > 0 && elapsedSec >= durationSec) {
        elapsedSec = durationSec;
        applyState('ended');
        return;
      }
      updateProgress();
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function updateProgress() {
    timeElapsed.textContent = fmtTime(elapsedSec);
    if (durationSec > 0) {
      progressFill.style.width = Math.min(100, (elapsedSec / durationSec) * 100) + '%';
    } else {
      // Indeterminate pulse when no duration known
      progressFill.style.width = '0%';
    }
  }

  // ─── Style Application ────────────────────────
  function applyCardStyles(cfg) {
    if (!cfg) return;

    // 1. Position
    const pos = cfg.yt_card_position || 'bottom-left';
    document.body.style.display = 'flex';
    document.body.style.flexDirection = 'row';
    
    if (pos === 'bottom-left') {
      document.body.style.alignItems = 'flex-end';
      document.body.style.justifyContent = 'flex-start';
    } else if (pos === 'bottom-right') {
      document.body.style.alignItems = 'flex-end';
      document.body.style.justifyContent = 'flex-end';
    } else if (pos === 'top-left') {
      document.body.style.alignItems = 'flex-start';
      document.body.style.justifyContent = 'flex-start';
    } else if (pos === 'top-right') {
      document.body.style.alignItems = 'flex-start';
      document.body.style.justifyContent = 'flex-end';
    } else if (pos === 'center') {
      document.body.style.alignItems = 'center';
      document.body.style.justifyContent = 'center';
    }

    // 2. Width
    const width = cfg.yt_card_width || 380;
    card.style.width = `${width}px`;

    // 3. Radius
    const radius = cfg.yt_card_radius !== undefined ? cfg.yt_card_radius : 22;
    card.style.borderRadius = `${radius}px`;

    // 4. Artwork Size
    const artSize = cfg.yt_artwork_size || 82;
    const artWrap = document.querySelector('.artwork-wrap');
    if (artWrap) {
      artWrap.style.width = `${artSize}px`;
      artWrap.style.height = `${artSize}px`;
    }

    // 5. Show Requester
    const showReq = cfg.yt_show_requester !== false;
    document.querySelector('.requester-row').style.display = showReq ? 'flex' : 'none';

    // 6. Show Progress
    const showProg = cfg.yt_show_progress !== false;
    document.querySelector('.progress-section').style.display = showProg ? 'flex' : 'none';

    // 7. Show Artist
    const showArtist = cfg.yt_show_artist !== false;
    artistName.style.display = showArtist ? 'block' : 'none';

    // 8. Show Status Dot
    const showStatus = cfg.yt_show_status_dot !== false;
    document.querySelector('.status-row').style.display = showStatus ? 'flex' : 'none';
  }

  // ─── Firebase ────────────────────────────────
  let db = null;
  const fbConfig = window.ZERO_FM_FIREBASE || {
      apiKey:            "AIzaSyA6c3EaIvuPEfM6sTV0YHqCBHuz35ZmNIU",
      authDomain:        "zero-strom-web.firebaseapp.com",
      projectId:         "zero-strom-web",
      storageBucket:     "zero-strom-web.firebasestorage.app",
      messagingSenderId: "758369466349",
      appId:             "1:758369466349:web:f2ced362a5a049c70b59e4"
  };
  if (typeof firebase !== 'undefined' && fbConfig) {
    try {
      firebase.initializeApp(fbConfig);
      db = firebase.firestore();

      // Listen to active video (only if NOT in dashboard preview mode)
      const params = new URLSearchParams(window.location.search);
      const isPreview = params.get('preview') === 'true';

      if (!isPreview) {
        db.collection('systemConfig').doc('activeYoutubeVideo')
          .onSnapshot((doc) => {
            if (!doc.exists) { setIdle(); return; }
            const data = doc.data();
            const ageMs = Date.now() - (data.timestamp || 0);
            if (ageMs > 2 * 60 * 60 * 1000) { setIdle(); return; } // >2h old → idle
            applyData(data);
          }, err => console.warn('[YT Overlay] Firestore error:', err));
      }

      // Listen to visual configurations
      db.collection('systemConfig').doc('overlayAlertsConfig')
        .onSnapshot((doc) => {
          if (doc.exists) {
            applyCardStyles(doc.data());
          }
        }, err => console.warn('[YT Overlay] Config Firestore error:', err));
    } catch(e) {
      console.error('[YT Overlay] Firebase init error:', e);
    }
  }

  // ─── postMessage (from dashboard panel) ──────
  window.addEventListener('message', (evt) => {
    if (!evt.data) return;
    const { action, payload } = evt.data;

    if (action === 'updateConfig' || action === 'updateLiveConfig') {
      applyCardStyles(payload);
    }

    if (action === 'ytPlay' || action === 'ytResume') {
      if (payload?.videoId) applyData({ ...payload, state: 'playing', timestamp: Date.now() });
      else applyState('playing');
    }
    if (action === 'ytPause')  applyState('paused');
    if (action === 'ytStop' || action === 'ytEnd') setIdle();
    if (action === 'ytSeek' && typeof payload?.elapsed === 'number') {
      elapsedSec = payload.elapsed;
      updateProgress();
    }
    if (action === 'ytSetVolume' && typeof payload?.volume === 'number') {
      currentVolume = payload.volume;
      updatePlayerMuteState(currentVolume);
    }
  });
</script>
