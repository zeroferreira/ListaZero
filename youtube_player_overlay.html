<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <title>YouTube Display Overlay - Zero FM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <!-- Firebase Shared Config -->
  <script src="firebase-config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #ff003c;
      --accent2: #ff6b6b;
      --card-w: 420px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: transparent;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 28px;
      overflow: hidden;
    }

    /* ─── IDLE ─────────────────────────────── */
    #idle {
      display: none; /* hidden by default in OBS */
    }

    /* ─── PLAYER CARD ──────────────────────── */
    #player-card {
      width: var(--card-w);
      overflow: hidden;
      opacity: 0;
      transform: translateY(18px) translate3d(0,0,0);
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.5s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none;
      will-change: transform, opacity;
      backface-visibility: hidden;
    }

    #player-card.visible {
      opacity: 1;
      transform: translateY(0) translate3d(0,0,0);
    }

    /* ─── Premium Themes ────────────────────── */
    #player-card.theme-standard {
      background: rgba(10, 10, 15, 0.82);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: 
        0 32px 80px rgba(0,0,0,0.7), 
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.10) inset;
    }
    
    #player-card.theme-glassmorphism {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 
        0 30px 70px rgba(0,0,0,0.5), 
        0 0 15px rgba(255, 255, 255, 0.05) inset;
    }
    
    #player-card.theme-minimalist {
      background: #0d0d11;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 1px solid #1f1f2e;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    
    #player-card.theme-cyberpunk {
      background: rgba(5, 5, 10, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2.5px solid var(--accent);
      box-shadow: 
        0 0 25px rgba(255, 0, 60, 0.4),
        0 25px 60px rgba(0,0,0,0.9);
    }

    #player-card.theme-simple {
      background: rgba(0, 0, 0, 0.75) !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
    }

    /* ─── Blurred background artwork ──────── */
    .card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(60px) brightness(0.25) saturate(2);
      transform: scale(1.3) translate3d(0,0,0);
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
      z-index: 0;
      transition: background-image 0.6s ease;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      padding: 20px;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "artwork info"
        "status status"
        "progress progress"
        "requester requester";
      gap: 14px 16px;
    }

    /* Thumbnail / Artwork */
    .artwork-wrap {
      grid-area: artwork;
      flex-shrink: 0;
      width: 82px;
      height: 82px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative;
      background: #111;
    }

    .artwork-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s ease;
    }

    /* YouTube logo watermark on artwork */
    .yt-badge {
      position: absolute;
      bottom: 5px;
      right: 5px;
      background: rgba(0,0,0,0.75);
      border-radius: 5px;
      padding: 2px 5px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .yt-badge svg { display: block; }

    /* Text info */
    .info-col {
      grid-area: info;
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 2px;
    }

    .yt-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.9;
      margin-bottom: 2px;
    }

    .song-title {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      line-height: 1.25;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .artist-name {
      font-size: 12.5px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── Requester pill ────────────────── */
    .requester-row {
      grid-area: requester;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .req-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 0, 60, 0.12);
      border: 1px solid rgba(255, 0, 60, 0.28);
      border-radius: 99px;
      padding: 5px 12px;
      font-size: 11.5px;
      font-weight: 700;
      color: #fff;
      max-width: 100%;
      overflow: hidden;
    }
    .req-pill .req-icon { font-size: 12px; flex-shrink: 0; }
    .req-pill .req-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── Progress bar ──────────────────── */
    .progress-section {
      grid-area: progress;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: auto;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
      pointer-events: auto;
      cursor: pointer;
      transition: height 0.15s ease;
    }
    
    .progress-track:hover {
      height: 7px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 100%;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.8s linear;
      will-change: transform;
      position: relative;
      overflow: hidden;
    }

    /* Shimmer using hardware-accelerated transform */
    @keyframes shimmer-move {
      0% { transform: translate3d(-100%, 0, 0); }
      100% { transform: translate3d(100%, 0, 0); }
    }
    .progress-fill.playing::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: shimmer-move 2s linear infinite;
      will-change: transform;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.04em;
    }

    /* ─── State indicator dot ───────────── */
    .state-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--accent);
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    .state-dot.playing { animation: pulse-dot 1.2s ease-in-out infinite; }
    .state-dot.paused { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; animation: none; }
    .state-dot.ended, .state-dot.idle { background: #6b7280; box-shadow: none; animation: none; }

    .state-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .status-row {
      grid-area: status;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: -4px;
    }

    /* ─── Split Two-Columns Layout ───────── */
    #player-card.layout-split-two-columns {
      width: 520px;
    }
    #player-card.layout-split-two-columns .card-inner {
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "artwork info"
        "artwork status"
        "artwork progress"
        "artwork requester";
      gap: 8px 20px;
      padding: 16px;
      align-items: center;
    }
    #player-card.layout-split-two-columns .status-row {
      margin-top: 0;
    }
    
    /* ─── Split Video Left Layout ───────── */
    #player-card.layout-split-video-left {
      width: 580px;
    }
    #player-card.layout-split-video-left .card-inner {
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "artwork info"
        "artwork status"
        "artwork progress"
        "artwork requester";
      gap: 8px 20px;
      padding: 16px;
      align-items: center;
    }
    #player-card.layout-split-video-left .status-row {
      margin-top: 0;
    }
    
    /* YouTube Player Container & responsive iframe */
    #yt-player-container {
      pointer-events: none;
      transition: transform 0.3s ease, opacity 0.3s ease, filter 0.3s ease;
      will-change: transform, opacity, filter;
      transform: translate3d(0,0,0);
      backface-visibility: hidden;
    }
    /* Gradient overlay for full-card video modes to preserve text readability */
    #yt-player-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(10, 10, 15, 0.88) 0%, rgba(10, 10, 15, 0.45) 50%, rgba(5, 5, 10, 0.82) 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 1;
      pointer-events: none;
    }
    #yt-player-container.cover-mode::after {
      opacity: 1;
    }
    #yt-player-container.bg-mode::after {
      background: rgba(10, 10, 15, 0.35);
      opacity: 1;
    }
    #yt-player-container iframe {
      width: 100% !important;
      height: 100% !important;
      border: none;
      pointer-events: none;
      transition: transform 0.3s ease, width 0.3s ease, height 0.3s ease;
      will-change: transform;
      transform: translate3d(0,0,0);
      backface-visibility: hidden;
    }
    /* Evitar congelamiento de iframe pequeño renderizando a tamaño real y escalando por CSS */
    #yt-player-container.miniature-mode iframe {
      width: 320px !important;
      height: 180px !important;
      position: absolute !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) scale(var(--yt-miniature-scale, 0.455)) translate3d(0,0,0) !important;
      transform-origin: center !important;
    }
    
    /* Preview Mode styles for Dashboard */
    body.preview-mode {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 100vw !important;
      height: 100vh !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      background: transparent !important;
    }
    body.preview-mode #player-card {
      transform: scale(var(--preview-scale, 1)) !important;
      transform-origin: center !important;
      margin: 0 !important;
      flex-shrink: 0 !important;
    }

    /* ─── Optimizaciones para OBS Studio ──────────────── */
    /* En OBS Studio, las transparencias y filtros CSS pesados (como blur y backdrop-filter)
       pueden saturar la GPU del software, causando que el video vaya lento (stutter).
       Desactivamos backdrop-filter (que blurea pixeles vacíos en OBS) y usamos colores semi-sólidos visualmente idénticos. */
    body.obs-mode #player-card.theme-standard {
      background: rgba(10, 10, 15, 0.96) !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    
    body.obs-mode #player-card.theme-glassmorphism {
      background: rgba(20, 20, 25, 0.90) !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }

    body.obs-mode #player-card.theme-simple {
      background: rgba(0, 0, 0, 0.85) !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4) !important;
    }
    
    /* Reducir el radio de blur del fondo en OBS para ahorrar fill-rate de la GPU */
    body.obs-mode .card-bg {
      filter: blur(20px) brightness(0.25) saturate(1.8) !important;
      transform: scale(1.15) translate3d(0, 0, 0) !important;
    }
  </style>
</head>
<body>

  <!-- Idle Preview Placeholder -->
  <div id="idle-preview" style="display: none; width: 100%; max-width: 420px; min-height: 140px; background: rgba(255, 255, 255, 0.03); border: 2px dashed rgba(255, 255, 255, 0.15); border-radius: 16px; align-items: center; justify-content: center; color: rgba(255, 255, 255, 0.4); font-size: 13px; font-weight: 600; text-align: center; padding: 24px; flex-direction: column; gap: 8px; font-family: 'Inter', sans-serif; backdrop-filter: blur(10px);">
    <div style="font-size: 28px;">📺</div>
    <div>Reproductor de YouTube (Vista Previa)</div>
    <div style="font-size: 11px; font-weight: 400; color: rgba(255, 255, 255, 0.25); max-width: 280px; line-height: 1.4;">Se activará y mostrará aquí de forma automática al reproducir una canción en la cola.</div>
  </div>

  <!-- Player Card -->
  <div id="player-card" style="position: relative;">
    <div class="card-bg" id="card-bg"></div>
    <div id="yt-player-container" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0.001; pointer-events: none; overflow: hidden; z-index: -999;">
      <div id="yt-player"></div>
    </div>
    <div class="card-inner">

      <!-- Artwork + Info -->
      <div class="artwork-wrap">
        <img id="artwork" src="" alt="Thumbnail">
        <div class="yt-badge">
          <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
            <rect width="14" height="10" rx="2.5" fill="#FF0000"/>
            <path d="M5.5 3L9.5 5L5.5 7V3Z" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="info-col">
        <div class="yt-label-row" style="display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 2px;">
          <div class="yt-label" style="margin-bottom: 0;">▶ YouTube — Zero FM</div>
          <div id="req-badge" style="display: none; align-items: center; gap: 4px; background: rgba(255, 0, 60, 0.15); border: 1px solid rgba(255, 0, 60, 0.3); border-radius: 99px; padding: 2px 8px; font-size: 10px; font-weight: 700; color: #fff; max-width: 120px; overflow: hidden;">
            <span class="req-badge-icon" style="font-size: 9px;">👤</span>
            <span class="req-badge-name" id="req-badge-name" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">—</span>
          </div>
        </div>
        <div class="song-title" id="song-title">Cargando...</div>
        <div class="artist-name" id="artist-name">—</div>
      </div>

      <!-- Status row -->
      <div class="status-row">
        <div class="state-dot" id="state-dot"></div>
        <div class="state-label" id="state-label">En espera</div>
      </div>

      <!-- Progress bar -->
      <div class="progress-section">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="time-elapsed">0:00</span>
          <span id="time-total">—</span>
        </div>
      </div>

      <!-- Requester -->
      <div class="requester-row">
        <div class="req-pill">
          <span class="req-icon">👤</span>
          <span class="req-name" id="req-name">—</span>
        </div>
      </div>

    </div>
  </div>
  
  

<script>
  // Global error logger for debugging in OBS
  window.addEventListener('error', function(event) {
    const debugDiv = document.getElementById('debug-log') || document.createElement('div');
    debugDiv.id = 'debug-log';
    debugDiv.style.position = 'fixed';
    debugDiv.style.bottom = '10px';
    debugDiv.style.left = '10px';
    debugDiv.style.background = 'rgba(255, 0, 0, 0.85)';
    debugDiv.style.color = 'white';
    debugDiv.style.padding = '10px';
    debugDiv.style.borderRadius = '5px';
    debugDiv.style.fontSize = '12px';
    debugDiv.style.zIndex = '99999';
    debugDiv.style.maxWidth = '90vw';
    debugDiv.style.wordBreak = 'break-all';
    debugDiv.textContent = `Error: ${event.message} at ${event.filename}:${event.lineno}`;
    document.body.appendChild(debugDiv);
  });

  // ─── DOM refs ────────────────────────────────
  const card       = document.getElementById('player-card');
  const cardBg     = document.getElementById('card-bg');
  const artwork    = document.getElementById('artwork');
  const songTitle  = document.getElementById('song-title');
  const artistName = document.getElementById('artist-name');
  const stateDot   = document.getElementById('state-dot');
  const stateLabel = document.getElementById('state-label');
  const progressFill = document.getElementById('progress-fill');
  const timeElapsed  = document.getElementById('time-elapsed');
  const timeTotal    = document.getElementById('time-total');
  const reqName    = document.getElementById('req-name');

  // Interactive Progress Bar seeking support
  const progressTrack = document.querySelector('.progress-track');
  if (progressTrack) {
    progressTrack.addEventListener('click', (event) => {
      if (durationSec <= 0) return;
      const rect = progressTrack.getBoundingClientRect();
      const clickX = event.clientX - rect.left;
      const pct = Math.max(0, Math.min(1, clickX / rect.width));
      const targetSec = Math.floor(pct * durationSec);
      
      console.log(`[YT Overlay] Seeking to ${targetSec}s (${Math.round(pct * 100)}%)`);
      
      // Update locally
      elapsedSec = targetSec;
      updateProgress();
      if (ytPlayer && typeof ytPlayer.seekTo === 'function') {
        ytPlayer.seekTo(targetSec, true);
      }
      
      // Sync to Firestore for remote overlays (like OBS)
      if (typeof db !== 'undefined' && db) {
        db.collection('systemConfig').doc('activeYoutubeVideo').update({
          elapsed: targetSec,
          timestamp: Date.now()
        }).catch(err => console.warn('[YT Overlay] Seek Firestore update failed:', err));
      }
    });
  }

  // ─── State ───────────────────────────────────
  let currentVideoId  = null;
  let currentState    = 'idle';   // idle | playing | paused | ended
  let elapsedSec      = 0;
  let lastFirestoreElapsed = null; // Evita saltos de canción involuntarios
  let durationSec     = 0;
  let timerInterval   = null;
  let isVisible       = false;

  // YouTube Player instance state
  let ytPlayer = null;
  let isYtApiReady = false;
  let isYtReady = false;
  let pendingVideoId = null;
  let currentVolume = 100;
  let hasSetInitialVolume = false;
  let lastUpdatedTimestamp = 0;

  // Detect OBS environment and query params globally
  const params = new URLSearchParams(window.location.search);
  const isObs = window.obsstudio || window.navigator.userAgent.includes('OBS') || params.get('obs') === 'true';
  if (isObs) {
    document.body.classList.add('obs-mode');
    console.log("🎥 OBS Studio detectado. Optimizaciones de rendimiento activadas.");
  }

  // Soporte de Chroma Key para capturar ventana en OBS desde Chrome u otro navegador
  const chromaKey = params.get('chromakey');
  if (chromaKey) {
    const chromaColor = chromaKey === 'blue' ? '#0000ff' : '#00ff00';
    document.body.style.setProperty('background-color', chromaColor, 'important');
    document.body.style.setProperty('background', chromaColor, 'important');
    console.log(`💚 Modo Chroma Key activado (${chromaKey}): ${chromaColor}`);
  }

  // Get suggested quality based on active display mode
  function getSuggestedQuality() {
    const mode = window.currentVideoMode || 'audio_only';
    if (mode === 'audio_only' || mode === 'miniature') {
      return 'small'; // 240p is perfect for small sizes or hidden player
    }
    if (mode === 'card_background') {
      return 'medium'; // 360p is perfect for blurred background
    }
    return 'default'; // Let YouTube choose
  }

  // ─── YouTube Iframe API Loader ────────────────
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  window.onYouTubeIframeAPIReady = function() {
    isYtApiReady = true;
    console.log("🎥 API de YouTube lista");
    if (pendingVideoId) {
      createOrLoadPlayer(pendingVideoId);
      pendingVideoId = null;
    }
  };

  function createOrLoadPlayer(videoId, targetState) {
    isYtReady = false; // Reset player ready state
    if (!isYtApiReady) {
      pendingVideoId = videoId;
      return;
    }

    const startState = targetState || 'playing';
    const quality = getSuggestedQuality();

    // Destroy existing player to avoid CEF cross-origin iframe recycling bugs in OBS
    if (ytPlayer) {
      try {
        if (typeof ytPlayer.destroy === 'function') {
          ytPlayer.destroy();
        }
      } catch (e) {
        console.warn("Error destroying player:", e);
      }
      ytPlayer = null;
    }

    // Recreate the div container element
    const container = document.getElementById('yt-player-container');
    if (container) {
      container.innerHTML = '<div id="yt-player"></div>';
    }

    // Determine the origin for YouTube Iframe handshake.
    let originParam = window.location.origin;
    if (originParam === 'null' || originParam.startsWith('file:')) {
      console.warn("⚠️ Advertencia: Estás ejecutando el overlay desde un archivo local (file://). YouTube bloqueará la reproducción de videos protegidos. Por favor, usa tu enlace HTTPS de Vercel en OBS.");
      originParam = 'https://www.youtube.com'; 
    }

    ytPlayer = new YT.Player('yt-player', {
      host: 'https://www.youtube.com',
      height: '100%',
      width: '100%',
      videoId: videoId,
      playerVars: {
        'autoplay': startState === 'playing' ? 1 : 0,
        'controls': 0,
        'disablekb': 1,
        'fs': 0,
        'rel': 0,
        'showinfo': 0,
        'iv_load_policy': 3,
        'enablejsapi': 1,
        'mute': 1, // Start MUTED to bypass OBS autoplay blocking
        'modestbranding': 1,
        'autohide': 1,
        'cc_load_policy': 0,
        'origin': originParam
      },
      events: {
        'onReady': (event) => {
          isYtReady = true;
          const params = new URLSearchParams(window.location.search);
          const isMuteParam = params.get('mute') === 'true';

          if (startState === 'playing') {
            event.target.playVideo();
          } else {
            event.target.pauseVideo();
          }
          if (typeof event.target.setPlaybackQuality === 'function') {
            event.target.setPlaybackQuality(quality);
          }
          if (typeof event.target.getDuration === 'function') {
            const ytDuration = event.target.getDuration();
            if (ytDuration > 0) {
              durationSec = ytDuration;
              timeTotal.textContent = fmtTime(durationSec);
            }
          }
          adjustIframeAspectRatio();

          // Delay unmute to ensure autoplay registry accepts it
          setTimeout(() => {
            if (!isMuteParam && !window.isMutedByIP) {
              event.target.unMute();
              event.target.setVolume(currentVolume);
              console.log("🔊 Autounmute triggered after load.");
            }
          }, 150);
        },
        'onStateChange': (event) => {
          // 1 = PLAYING, 2 = PAUSED, 0 = ENDED
          if (event.data === 1) {
            const params = new URLSearchParams(window.location.search);
            const isMuteParam = params.get('mute') === 'true';
            if (!isMuteParam && !window.isMutedByIP) {
              event.target.unMute();
              event.target.setVolume(currentVolume);
            }
             if (typeof event.target.getDuration === 'function') {
               const ytDuration = event.target.getDuration();
               if (ytDuration > 0 && durationSec !== ytDuration) {
                 durationSec = ytDuration;
                 timeTotal.textContent = fmtTime(durationSec);
               }
             }
             if (currentState !== 'playing') {
               applyState('playing');
             }
          } else if (event.data === 2) {
            if (currentState !== 'paused') {
              applyState('paused');
            }
          } else if (event.data === 0) {
            if (currentState !== 'ended') {
              applyState('ended');
              reportEndedToFirestore();
            }
          }
        },
        'onError': (event) => {
          console.error("❌ Error de YouTube Player:", event.data);
          let errText = "⚠️ Error de reproducción";
          if (event.data === 101 || event.data === 150) {
            errText = "⚠️ Video bloqueado (Copyright)";
          } else if (event.data === 100) {
            errText = "⚠️ Video no encontrado / privado";
          } else if (event.data === 2) {
            errText = "⚠️ ID de video inválido";
          }
          
          songTitle.textContent = errText;
          stateLabel.textContent = "Error";
          stateDot.className = "state-dot paused";
          
          const params = new URLSearchParams(window.location.search);
          const isPreview = params.get('preview') === 'true';
          if (!isPreview) {
            console.warn("⏱️ Saltando canción bloqueada en 5 segundos...");
            setTimeout(() => {
              applyState('ended');
              reportEndedToFirestore();
            }, 5000);
          }
        }
      }
    });
  }

  function updatePlayerMuteState(customVolume) {
    if (!ytPlayer || typeof ytPlayer.mute !== 'function') return;
    
    const params = new URLSearchParams(window.location.search);
    const isMuteParam = params.get('mute') === 'true';

    if (isMuteParam) {
      ytPlayer.mute();
      console.log(`🔇 Audio silenciado por parámetro de URL (?mute=true).`);
      return;
    }

    if (window.isMutedByIP) {
      ytPlayer.mute();
      console.log(`🔇 Audio silenciado debido a otra sesión activa.`);
      return;
    }

    const targetVolume = (typeof customVolume === 'number') ? customVolume : (hasSetInitialVolume ? currentVolume : 100);
    
    if (targetVolume > 0) {
      ytPlayer.unMute();
      ytPlayer.setVolume(targetVolume);
      console.log(`🔊 Audio des-silenciado en vista previa. Volumen: ${targetVolume}`);
    } else {
      ytPlayer.mute();
      console.log(`🔇 Audio silenciado en vista previa (volumen 0)`);
    }
  }

  function syncPlayerState(state, vid) {
    if (typeof YT === 'undefined' || !isYtApiReady || !isYtReady) {
      if (vid) pendingVideoId = vid;
      return;
    }
    if (vid && (!ytPlayer || vid !== currentVideoId)) {
      createOrLoadPlayer(vid);
      return;
    }
    if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
      const ytState = ytPlayer.getPlayerState();
      if (state === 'playing') {
        if (ytState !== 1 && ytState !== 3) {
          updatePlayerMuteState(currentVolume);
          ytPlayer.playVideo();
        }
        // Sync seek position if drift is larger than 4 seconds
        if (typeof ytPlayer.getCurrentTime === 'function' && typeof elapsedSec === 'number' && elapsedSec > 0) {
          const ytCurrent = ytPlayer.getCurrentTime();
          const drift = Math.abs(ytCurrent - elapsedSec);
          if (drift > 4) {
            console.log(`⏰ Seek drift detected: local=${Math.round(ytCurrent)}s, Firestore target=${elapsedSec}s. Seeking player...`);
            ytPlayer.seekTo(elapsedSec, true);
          }
        }
      } else if (state === 'paused' && ytState !== 2) {
        ytPlayer.pauseVideo();
      } else if ((state === 'ended' || state === 'idle') && ytState !== 0 && ytState !== 5) {
        ytPlayer.stopVideo();
      }
    }
  }

  async function reportEndedToFirestore() {
    if (db) {
      try {
        await db.collection('systemConfig').doc('activeYoutubeVideo').update({
          state: 'ended'
        });
        console.log("✅ Video marcado como terminado en Firestore");
      } catch (e) {
        console.error("Error al actualizar Firestore (ended):", e);
      }
    }
  }

  // ─── Helpers ─────────────────────────────────
  function getYoutubeVideoId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtu\.be\/|v\/|watch\?v=|shorts\/)([^#&?]{11})/);
    return m ? m[1] : (url.length === 11 ? url : null);
  }

  function getThumbnailUrl(videoId) {
    if (!videoId) return '';
    return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
  }

  function fmtTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  // ─── Update UI from data ──────────────────────
  function applyData(data) {
    if (!data || !data.videoId) { setIdle(); return; }

    const idlePreview = document.getElementById('idle-preview');
    if (idlePreview) idlePreview.style.display = 'none';

    const vid = getYoutubeVideoId(data.videoId) || data.videoId;
    const thumb = getThumbnailUrl(vid);

    // Artwork + blurred BG
    artwork.src = thumb;
    cardBg.style.backgroundImage = `url('${thumb}')`;

    songTitle.textContent  = data.title    || 'Sin título';
    artistName.textContent = data.artist   || 'YouTube Creator';
    const reqText = data.requester || '—';
    reqName.textContent = reqText;
    const reqBadgeName = document.getElementById('req-badge-name');
    if (reqBadgeName) reqBadgeName.textContent = reqText;

    // Duration
    if (data.duration) {
      durationSec = parseFloat(data.duration);
      timeTotal.textContent = fmtTime(durationSec);
    } else {
      durationSec = 0;
      timeTotal.textContent = '—';
    }

    const videoChanged = currentVideoId !== vid;

    // Elapsed / seek
    if (typeof data.elapsed === 'number') {
      if (videoChanged || lastFirestoreElapsed !== data.elapsed) {
        elapsedSec = data.elapsed;
        lastFirestoreElapsed = data.elapsed;
      }
    } else if (data.state === 'playing' && videoChanged) {
      elapsedSec = 0;
      lastFirestoreElapsed = null;
    }
    
    applyState(data.state || 'playing');
    
    if (data.timestamp) {
      lastUpdatedTimestamp = data.timestamp;
    }
    
    // Sync YT audio player state
    if (videoChanged) {
      createOrLoadPlayer(vid, data.state || 'playing');
    } else {
      syncPlayerState(data.state || 'playing', vid);
    }
    
    if (typeof data.volume === 'number') {
      currentVolume = data.volume;
      hasSetInitialVolume = true;
      updatePlayerMuteState(currentVolume);
    }

    currentVideoId = vid;
    showCard();
    setTimeout(adjustIframeAspectRatio, 150);
  }

  function showCard() {
    card.style.display = 'block';
    // Force browser reflow to register display change before animating opacity
    void card.offsetWidth;
    if (!isVisible) {
      card.classList.add('visible');
      isVisible = true;
    }
  }

  function hideCard() {
    card.classList.remove('visible');
    isVisible = false;
    // Set display: none after transition finishes (500ms)
    setTimeout(() => {
      if (!isVisible) card.style.display = 'none';
    }, 500);
  }

  function applyState(state) {
    currentState = state;
    stopTimer();

    stateDot.className   = 'state-dot';
    progressFill.className = 'progress-fill';

    if (state === 'playing') {
      stateDot.classList.add('playing');
      progressFill.classList.add('playing');
      stateLabel.textContent = 'Reproduciendo';
      startTimer();
    } else if (state === 'paused') {
      stateDot.classList.add('paused');
      stateLabel.textContent = 'En pausa';
      updateProgress();
    } else if (state === 'ended') {
      stateDot.classList.add('ended');
      stateLabel.textContent = 'Terminado';
      elapsedSec = durationSec;
      updateProgress();
      // Auto-hide after 4s
      setTimeout(() => setIdle(), 4000);
    } else {
      stateDot.classList.add('idle');
      stateLabel.textContent = 'En espera';
    }
    syncPlayerState(state, currentVideoId);
  }

  function setIdle() {
    stopTimer();
    currentVideoId = null;
    elapsedSec = 0;
    progressFill.style.transform = 'scaleX(0)';
    timeElapsed.textContent = '0:00';
    timeTotal.textContent   = '—';
    currentState = 'idle';
    
    // Stop video playback too
    if (ytPlayer && typeof ytPlayer.stopVideo === 'function') {
      try {
        ytPlayer.stopVideo();
      } catch (e) {}
    }

    const isPreview = params.get('preview') === 'true';
    const idlePreview = document.getElementById('idle-preview');
    
    if (isPreview) {
      if (idlePreview) idlePreview.style.display = 'none';
      card.style.display = 'block';
      card.classList.add('visible');
      isVisible = true;

      songTitle.textContent  = 'Canción de Prueba (Preview)';
      artistName.textContent = 'Artista de YouTube';
      reqName.textContent    = 'NombreUsuario';
      const reqBadgeName = document.getElementById('req-badge-name');
      if (reqBadgeName) reqBadgeName.textContent = 'NombreUsuario';
      
      const defaultThumb = 'https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg';
      artwork.src = defaultThumb;
      cardBg.style.backgroundImage = `url('${defaultThumb}')`;
      timeTotal.textContent   = '3:33';
      progressFill.style.transform = 'scaleX(0.35)';
      timeElapsed.textContent = '1:14';
      
      stateDot.className = 'state-dot playing';
      stateLabel.textContent = 'En espera (Vista Previa)';
    } else {
      hideCard();
      card.style.display = 'none';
      if (idlePreview) {
        idlePreview.style.display = (!isObs) ? 'flex' : 'none';
      }
    }
  }

  // ─── Progress timer (visual only, no audio) ──
  function startTimer() {
    stopTimer();
    timerInterval = setInterval(() => {
      if (currentState !== 'playing') return;

      // 1. Query duration from API if not loaded yet
      if (ytPlayer && typeof ytPlayer.getDuration === 'function') {
        const ytDuration = ytPlayer.getDuration();
        if (ytDuration > 0 && durationSec !== ytDuration) {
          durationSec = ytDuration;
          timeTotal.textContent = fmtTime(durationSec);
        }
      }

      // 2. Query exact current time from API
      if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
        const ytCurrent = ytPlayer.getCurrentTime();
        if (typeof ytCurrent === 'number') {
          elapsedSec = Math.floor(ytCurrent);
        } else {
          elapsedSec++;
        }
      } else {
        elapsedSec++;
      }

      if (durationSec > 0 && elapsedSec >= durationSec) {
        elapsedSec = durationSec;
        applyState('ended');
        return;
      }
      updateProgress();
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function updateProgress() {
    timeElapsed.textContent = fmtTime(elapsedSec);
    if (durationSec > 0) {
      const pct = Math.min(1, elapsedSec / durationSec);
      progressFill.style.transform = `scaleX(${pct})`;
    } else {
      progressFill.style.transform = 'scaleX(0)';
    }
  }

  function adjustIframeAspectRatio() {
    const iframe = document.querySelector('#yt-player-container iframe');
    if (!iframe) return;
    
    // Si estamos en modo miniatura, el tamaño de iframe se controla por CSS escalado
    const videoMode = window.currentVideoMode || 'audio_only';
    if (videoMode === 'miniature') {
      iframe.style.position = '';
      iframe.style.top = '';
      iframe.style.left = '';
      iframe.style.transform = '';
      iframe.style.width = '';
      iframe.style.height = '';
      return;
    }
    
    const container = document.getElementById('yt-player-container');
    if (container) {
      void container.offsetWidth; // Force layout recalculation
    }
    const w = container ? container.clientWidth : 0;
    const h = container ? container.clientHeight : 0;
    if (!w || !h) return;
    
    const containerRatio = w / h;
    const videoRatio = 16 / 9;
    
    iframe.style.position = 'absolute';
    iframe.style.top = '50%';
    iframe.style.left = '50%';
    iframe.style.transform = 'translate(-50%, -50%)';
    
    if (containerRatio > videoRatio) {
      iframe.style.width = '100%';
      iframe.style.height = `${(containerRatio / videoRatio) * 100}%`;
    } else {
      iframe.style.height = '100%';
      iframe.style.width = `${(videoRatio / containerRatio) * 100}%`;
    }
  }

  function positionMiniatureVideo() {
    const ytContainer = document.getElementById('yt-player-container');
    const artWrap = document.querySelector('.artwork-wrap');
    if (!ytContainer || !artWrap) return;
    
    const videoMode = window.currentVideoMode || 'audio_only';
    if (videoMode !== 'miniature') return;
    
    // Position ytContainer absolutely relative to player-card by checking rects
    const cardRect = card.getBoundingClientRect();
    const artRect = artWrap.getBoundingClientRect();
    
    if (cardRect.width > 0 && artRect.width > 0) {
      const top = artRect.top - cardRect.top;
      const left = artRect.left - cardRect.left;
      const w = artRect.width;
      const h = artRect.height;
      
      ytContainer.style.top = `${top}px`;
      ytContainer.style.left = `${left}px`;
      ytContainer.style.width = `${w}px`;
      ytContainer.style.height = `${h}px`;
    } else {
      // Retry once visible
      setTimeout(positionMiniatureVideo, 100);
    }
    
    const cfg = window.lastConfig || {};
    const artRatio = cfg.yt_artwork_aspect_ratio || '1:1';
    const rawLayout = cfg.yt_card_layout_mode || 'standard';
    const layoutMode = rawLayout.replace(/_/g, '-');
    const isSplit = layoutMode === 'split-two-columns';
    const isVideoLeft = layoutMode === 'split-video-left';
    const defaultArtSize = isVideoLeft ? 180 : (isSplit ? 130 : 82);
    const artSize = cfg.yt_artwork_size || defaultArtSize;
    
    let containerHeight = artSize;
    if (artRatio === '16:9') {
      containerHeight = Math.round(artSize * 9 / 16);
    } else if (artRatio === '4:3') {
      containerHeight = Math.round(artSize * 3 / 4);
    }
    
    const radius = cfg.yt_card_radius !== undefined ? cfg.yt_card_radius : 22;
    ytContainer.style.borderRadius = (isSplit || isVideoLeft) ? `${radius}px` : '14px';
    
    const scale = Math.max(artSize / 320, containerHeight / 180);
    ytContainer.style.setProperty('--yt-miniature-scale', scale);
  }

  // ─── Style Application ────────────────────────
  function applyCardStyles(cfg) {
    if (!cfg) return;
    window.lastConfig = cfg;
    try {

    // 0. Layout Mode
    const rawLayoutMode = cfg.yt_card_layout_mode || 'standard';
    const layoutMode = rawLayoutMode.replace(/_/g, '-');
    card.classList.remove('layout-standard', 'layout-split-two-columns', 'layout-split-video-left');
    card.classList.add(`layout-${layoutMode}`);
    const isSplit = layoutMode === 'split-two-columns';
    const isVideoLeft = layoutMode === 'split-video-left';

    // 1. Position
    const pos = cfg.yt_card_position || 'bottom-left';
    document.body.style.display = 'flex';
    document.body.style.flexDirection = 'row';
    
    if (pos === 'bottom-left') {
      document.body.style.alignItems = 'flex-end';
      document.body.style.justifyContent = 'flex-start';
    } else if (pos === 'bottom-right') {
      document.body.style.alignItems = 'flex-end';
      document.body.style.justifyContent = 'flex-end';
    } else if (pos === 'top-left') {
      document.body.style.alignItems = 'flex-start';
      document.body.style.justifyContent = 'flex-start';
    } else if (pos === 'top-right') {
      document.body.style.alignItems = 'flex-start';
      document.body.style.justifyContent = 'flex-end';
    } else if (pos === 'center') {
      document.body.style.alignItems = 'center';
      document.body.style.justifyContent = 'center';
    }

    // 2. Width
    const defaultWidth = isVideoLeft ? 580 : (isSplit ? 520 : 380);
    const width = cfg.yt_card_width || defaultWidth;
    card.style.width = `${width}px`;

    // 3. Radius
    const radius = cfg.yt_card_radius !== undefined ? cfg.yt_card_radius : 22;
    card.style.borderRadius = `${radius}px`;

    // 4. Artwork Size
    const defaultArtSize = isVideoLeft ? 180 : (isSplit ? 130 : 82);
    const artSize = cfg.yt_artwork_size || defaultArtSize;
    const artRatio = cfg.yt_artwork_aspect_ratio || '1:1';
    const artWrap = document.querySelector('.artwork-wrap');
    if (artWrap) {
      artWrap.style.width = `${artSize}px`;
      if (artRatio === '16:9') {
        artWrap.style.height = `${Math.round(artSize * 9 / 16)}px`;
      } else if (artRatio === '4:3') {
        artWrap.style.height = `${Math.round(artSize * 3 / 4)}px`;
      } else {
        artWrap.style.height = `${artSize}px`;
      }
    }

    // 4.5. Preview Mode Auto-Scaling (fits inside 350px x 180px preview area in Dashboard)
    const isPreview = (new URLSearchParams(window.location.search)).get('preview') === 'true';
    if (isPreview) {
      document.body.classList.add('preview-mode');
      const estimatedHeight = isVideoLeft ? 212 : (isSplit ? 162 : 140);
      const scaleX = 350 / width;
      const scaleY = 165 / estimatedHeight;
      const scale = Math.min(scaleX, scaleY, 1);
      card.style.setProperty('--preview-scale', scale);
    }

    // 5. Show Requester & Position
    const showReq = cfg.yt_show_requester !== false;
    const reqPos = cfg.yt_requester_pos || 'bottom'; // bottom | next-to-label
    
    const reqRow = document.querySelector('.requester-row');
    const reqBadge = document.getElementById('req-badge');
    
    if (reqRow) reqRow.style.display = 'none';
    if (reqBadge) reqBadge.style.display = 'none';
    
    if (showReq) {
      if (reqPos === 'next-to-label') {
        if (reqBadge) reqBadge.style.display = 'inline-flex';
      } else {
        if (reqRow) reqRow.style.display = 'flex';
      }
    }

    // 6. Show Progress
    const showProg = cfg.yt_show_progress !== false;
    document.querySelector('.progress-section').style.display = showProg ? 'flex' : 'none';

    // 7. Show Artist
    const showArtist = cfg.yt_show_artist !== false;
    artistName.style.display = showArtist ? 'block' : 'none';

    // 8. Show Status Dot
    const showStatus = cfg.yt_show_status_dot !== false;
    document.querySelector('.status-row').style.display = showStatus ? 'flex' : 'none';

    // 9. Card Theme (standard | minimalist | glassmorphism | cyberpunk)
    const theme = cfg.yt_card_theme || 'standard';
    card.classList.remove('theme-standard', 'theme-minimalist', 'theme-glassmorphism', 'theme-cyberpunk', 'theme-simple');
    card.classList.add(`theme-${theme}`);

    // 10. Accent & Card Background Colors
    if (cfg.yt_accent_color) {
      document.documentElement.style.setProperty('--accent', cfg.yt_accent_color);
    } else {
      document.documentElement.style.setProperty('--accent', '#ff003c');
    }
    if (cfg.yt_accent2_color) {
      document.documentElement.style.setProperty('--accent2', cfg.yt_accent2_color);
    } else {
      document.documentElement.style.setProperty('--accent2', '#ff6b6b');
    }
    
    if (cfg.yt_card_bg_color) {
      card.style.background = cfg.yt_card_bg_color;
    } else {
      card.style.background = ''; // reset to CSS theme default
    }

    // 10.5 YouTube Video Mode (audio_only | miniature | card_background | card_cover)
    const videoMode = cfg.yt_video_display_mode || 'audio_only';
    window.currentVideoMode = videoMode;
    const ytContainer = document.getElementById('yt-player-container');
    const artworkImg = document.getElementById('artwork');

    if (ytContainer) {
      // Reset classes
      ytContainer.classList.remove('miniature-mode', 'cover-mode', 'bg-mode');
      cardBg.style.opacity = '1'; // Reset background artwork opacity
      ytContainer.style.transform = ''; // Reset scaling transform

      if (videoMode === 'audio_only') {
        ytContainer.style.display = 'block';
        ytContainer.style.position = 'absolute';
        ytContainer.style.top = '0';
        ytContainer.style.left = '0';
        ytContainer.style.width = '100%';
        ytContainer.style.height = '100%';
        ytContainer.style.opacity = '0.001';
        ytContainer.style.zIndex = '-999';
        ytContainer.style.borderRadius = '0';
        ytContainer.style.filter = '';
        
        if (artworkImg) artworkImg.style.opacity = '1';
      } else {
        ytContainer.style.display = 'block'; // Asegurar que sea visible
        
        if (videoMode === 'miniature') {
          // Miniature Mode: Overlay on the artwork box (avoid freezing by scaling a 320x180 frame)
          ytContainer.classList.add('miniature-mode');
          ytContainer.style.position = 'absolute';
          ytContainer.style.opacity = '1';
          ytContainer.style.zIndex = '2'; // In front of standard artwork
          ytContainer.style.overflow = 'hidden';
          ytContainer.style.filter = '';
          
          positionMiniatureVideo();

          if (artworkImg) artworkImg.style.opacity = '1'; // Keep static thumbnail visible under the video overlay
        } else if (videoMode === 'card_background') {
          // Card Background Mode: Covers the whole card behind content (blurred & low opacity)
          ytContainer.classList.add('bg-mode');
          ytContainer.style.position = 'absolute';
          ytContainer.style.top = '0';
          ytContainer.style.left = '0';
          ytContainer.style.width = '100%';
          ytContainer.style.height = '100%';
          ytContainer.style.opacity = cfg.yt_bg_video_opacity !== undefined ? cfg.yt_bg_video_opacity : 0.25;
          ytContainer.style.zIndex = '0'; // Sibling to card-bg, behind card-inner
          ytContainer.style.borderRadius = `${radius}px`;
          ytContainer.style.overflow = 'hidden';
          
          let bgBlur = cfg.yt_bg_video_blur !== undefined ? cfg.yt_bg_video_blur : 4;
          if (isObs) {
            bgBlur = 0; // Force 0 blur in OBS to prevent CEF/Chromium video freezes and GPU lag
          }
          ytContainer.style.filter = bgBlur > 0 ? `blur(${bgBlur}px)` : '';
          ytContainer.style.transform = bgBlur > 0 ? 'scale(1.08) translate3d(0,0,0)' : 'translate3d(0,0,0)';
          
          if (artworkImg) artworkImg.style.opacity = '1'; // Show standard artwork thumbnail
        } else if (videoMode === 'card_cover') {
          // Card Cover Mode: Full-size sharp video as background of the card (100% opacity, no blur)
          ytContainer.classList.add('cover-mode');
          ytContainer.style.position = 'absolute';
          ytContainer.style.top = '0';
          ytContainer.style.left = '0';
          ytContainer.style.width = '100%';
          ytContainer.style.height = '100%';
          ytContainer.style.opacity = '1';
          ytContainer.style.zIndex = '0'; // Sibling to card-bg, behind card-inner
          ytContainer.style.borderRadius = `${radius}px`;
          ytContainer.style.overflow = 'hidden';
          ytContainer.style.filter = ''; // No blur!
          cardBg.style.opacity = '0'; // Hide static blurred background art to show sharp video
          
          if (artworkImg) artworkImg.style.opacity = '1'; // Keep artwork thumbnail visible in info col
        }
      }
    }

    // 11. Font Sizes
    const titleSize = cfg.yt_title_font_size || 16;
    songTitle.style.fontSize = `${titleSize}px`;
    
    const artistSize = cfg.yt_artist_font_size || 12.5;
    artistName.style.fontSize = `${artistSize}px`;

    // 12. Requester Pill & Badge Styles
    const reqSize = cfg.yt_requester_size || 11.5;
    const reqPill = document.querySelector('.req-pill');
    if (reqPill) reqPill.style.fontSize = `${reqSize}px`;
    if (reqBadge) reqBadge.style.fontSize = `${Math.max(8, reqSize - 1.5)}px`;

    const reqBg = cfg.yt_requester_bg || 'rgba(255, 0, 60, 0.12)';
    const reqBorder = cfg.yt_requester_border || 'rgba(255, 0, 60, 0.28)';
    if (reqPill) {
      reqPill.style.background = reqBg;
      reqPill.style.borderColor = reqBorder;
    }
    if (reqBadge) {
      reqBadge.style.background = reqBg;
      reqBadge.style.borderColor = reqBorder;
    }
    // Fullscreen URL parameter override
    const isFullscreenParam = params.get('fullscreen') === 'true';
    if (ytContainer && isFullscreenParam) {
      if (ytContainer.parentElement !== document.body) {
        document.body.insertBefore(ytContainer, document.body.firstChild);
      }
      ytContainer.style.display = 'block';
      ytContainer.style.position = 'fixed';
      ytContainer.style.top = '0';
      ytContainer.style.left = '0';
      ytContainer.style.width = '100vw';
      ytContainer.style.height = '100vh';
      ytContainer.style.opacity = '1';
      ytContainer.style.zIndex = '-1';
      ytContainer.style.borderRadius = '0';
      ytContainer.style.filter = '';
      ytContainer.style.overflow = 'hidden';
      ytContainer.style.pointerEvents = 'none';
      
      // Hide static blurred background art to show sharp video
      cardBg.style.opacity = '0';
    }

    positionMiniatureVideo();
    adjustIframeAspectRatio();

    // Aplicar cambio de calidad en tiempo real si el reproductor está listo
    if (ytPlayer && typeof ytPlayer.setPlaybackQuality === 'function') {
      ytPlayer.setPlaybackQuality(getSuggestedQuality());
    }
    } catch (err) {
      console.warn('[YT Overlay] Error applying styles:', err);
    }
  }

  // ─── Firebase ────────────────────────────────
  let db = null;
  const fbConfig = window.ZERO_FM_FIREBASE || {
      apiKey:            "AIzaSyA6c3EaIvuPEfM6sTV0YHqCBHuz35ZmNIU",
      authDomain:        "zero-strom-web.firebaseapp.com",
      projectId:         "zero-strom-web",
      storageBucket:     "zero-strom-web.firebasestorage.app",
      messagingSenderId: "758369466349",
      appId:             "1:758369466349:web:f2ced362a5a049c70b59e4"
  };
  if (typeof firebase !== 'undefined' && fbConfig) {
    try {
      firebase.initializeApp(fbConfig);
      db = firebase.firestore();
      try {
        db.settings({ experimentalForceLongPolling: true });
      } catch (e) {
        console.warn('Could not set experimentalForceLongPolling:', e);
      }

      // Listen to active video in both preview and OBS mode to keep them in sync
      db.collection('systemConfig').doc('activeYoutubeVideo')
        .onSnapshot((doc) => {
          if (!doc.exists) { setIdle(); return; }
          const data = doc.data();
          const ageMs = Date.now() - (data.timestamp || 0);
          if (ageMs > 2 * 60 * 60 * 1000) { setIdle(); return; } // >2h old → idle
          applyData(data);
        }, err => console.warn('[YT Overlay] Firestore error:', err));

      window.isMutedByIP = false;
      const params = new URLSearchParams(window.location.search);
      const isPreview = params.get('preview') === 'true';

      if (isPreview) {
        setIdle();
        // Register this preview session in Firestore
        db.collection('systemConfig').doc('activeAudioSession').set({
          hostname: window.location.hostname,
          timestamp: Date.now()
        }).catch(err => console.warn('Error setting active audio session:', err));

        // Listen to active audio session to dynamically handle double audio
        db.collection('systemConfig').doc('activeAudioSession')
          .onSnapshot((doc) => {
            if (doc.exists && doc.data()) {
              const activeHost = doc.data().hostname || '';
              const isIP = (host) => /^[0-9.]+$/.test(host) && host !== '127.0.0.1';
              
              if (isIP(activeHost) && window.location.hostname === 'localhost') {
                window.isMutedByIP = true;
                console.log(`🔇 Muted localhost preview because active session is on IP: ${activeHost}`);
                if (ytPlayer && typeof ytPlayer.mute === 'function') {
                  ytPlayer.mute();
                }
              } else {
                window.isMutedByIP = false;
                console.log(`🔊 Active audio host is ${activeHost}. Playing preview audio.`);
                if (ytPlayer && typeof ytPlayer.unMute === 'function') {
                  ytPlayer.unMute();
                  ytPlayer.setVolume(currentVolume);
                }
              }
            }
          }, err => console.warn('Error listening to active audio session:', err));
      }

      // Listen to visual configurations
      db.collection('systemConfig').doc('overlayAlertsConfig')
        .onSnapshot((doc) => {
          if (doc.exists) {
            applyCardStyles(doc.data());
          }
        }, err => console.warn('[YT Overlay] Config Firestore error:', err));
    } catch(e) {
      console.error('[YT Overlay] Firebase init error:', e);
    }
  }

  // ─── postMessage (from dashboard panel) ──────
  window.addEventListener('message', (evt) => {
    if (!evt.data) return;
    const { action, payload } = evt.data;

    if (action === 'updateConfig' || action === 'updateLiveConfig') {
      applyCardStyles(payload);
    }

    if (action === 'ytPlay' || action === 'ytResume') {
      if (payload?.videoId) applyData({ ...payload, state: 'playing', timestamp: Date.now() });
      else applyState('playing');
    }
    if (action === 'ytPause')  applyState('paused');
    if (action === 'ytStop' || action === 'ytEnd') setIdle();
    if (action === 'ytSeek' && typeof payload?.elapsed === 'number') {
      elapsedSec = payload.elapsed;
      updateProgress();
    }
    if (action === 'ytSetVolume' && typeof payload?.volume === 'number') {
      currentVolume = payload.volume;
      hasSetInitialVolume = true;
      updatePlayerMuteState(currentVolume);
    }
  });

  window.addEventListener('resize', () => {
    positionMiniatureVideo();
  });
</script>
</body>
</html>
