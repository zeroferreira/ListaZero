                    let borderStyle = 'solid';
                    
                    if (type === 'follow') {
                        opacity = config.followOpacity !== undefined ? config.followOpacity : 0.76;
                        radius = config.followRadius !== undefined ? config.followRadius : 28;
                        fontSize = config.followFontSize !== undefined ? config.followFontSize : 16;
                        borderWidth = config.followBorderWidth !== undefined ? config.followBorderWidth : 1;
                        borderColor = config.followBorderColor || '#ffffff';
                        borderOpacity = config.followBorderOpacity !== undefined ? config.followBorderOpacity : 8;
                        borderStyle = config.followBorderStyle || 'solid';
                    } else if (type === 'like') {
                        opacity = config.likeOpacity !== undefined ? config.likeOpacity : 0.76;
                        radius = config.likeRadius !== undefined ? config.likeRadius : 28;
                        fontSize = config.likeFontSize !== undefined ? config.likeFontSize : 16;
                        borderWidth = config.likeBorderWidth !== undefined ? config.likeBorderWidth : 1;
                        borderColor = config.likeBorderColor || '#ffffff';
                        borderOpacity = config.likeBorderOpacity !== undefined ? config.likeBorderOpacity : 8;
                        borderStyle = config.likeBorderStyle || 'solid';

                        const heartSize = config.likeHeartSize !== undefined ? config.likeHeartSize : 190;
                        const usernameSize = config.likeUsernameSize !== undefined ? config.likeUsernameSize : 35;
                        const messageSize = config.likeMessageSize !== undefined ? config.likeMessageSize : 20;
                        const wrapperHeight = config.likeWrapperHeight !== undefined ? config.likeWrapperHeight : 290;
                        document.documentElement.style.setProperty('--like-heart-size', heartSize + 'px');
                        document.documentElement.style.setProperty('--like-username-size', usernameSize + 'px');
                        document.documentElement.style.setProperty('--like-message-size', messageSize + 'px');
                        document.documentElement.style.setProperty('--like-wrapper-height', wrapperHeight + 'px');
                    } else if (type === 'gift') {
                        opacity = config.giftOpacity !== undefined ? config.giftOpacity : 0.76;
                        radius = config.giftRadius !== undefined ? config.giftRadius : 28;
                        fontSize = config.giftFontSize !== undefined ? config.giftFontSize : 16;
                        borderWidth = config.giftBorderWidth !== undefined ? config.giftBorderWidth : 1;
                        borderColor = config.giftBorderColor || '#ffffff';
                        borderOpacity = config.giftBorderOpacity !== undefined ? config.giftBorderOpacity : 8;
                        borderStyle = config.giftBorderStyle || 'solid';
                    } else if (type === 'subscribe') {
                        opacity = config.subscribeOpacity !== undefined ? config.subscribeOpacity : 0.76;
                        radius = config.subscribeRadius !== undefined ? config.subscribeRadius : 28;
                        fontSize = config.subscribeFontSize !== undefined ? config.subscribeFontSize : 16;
                        borderWidth = config.subscribeBorderWidth !== undefined ? config.subscribeBorderWidth : 1;
                        borderColor = config.subscribeBorderColor || '#ffffff';
                        borderOpacity = config.subscribeBorderOpacity !== undefined ? config.subscribeBorderOpacity : 8;
                        borderStyle = config.subscribeBorderStyle || 'solid';
                    }
                    
                    alertBox.style.setProperty('--card-bg-opacity', opacity);
                    alertBox.style.setProperty('--card-border-radius', radius + 'px');
                    document.documentElement.style.setProperty('--font-size-base', fontSize + 'px');
                    
                    const brVal = parseInt(borderColor.substr(1,2), 16) || 255;
                    const bgVal = parseInt(borderColor.substr(3,2), 16) || 255;
                    const bbVal = parseInt(borderColor.substr(5,2), 16) || 255;
                    const bOp = borderOpacity / 100;
                    alertBox.style.setProperty('--card-border-width', borderWidth + 'px');
                    alertBox.style.setProperty('--card-border-style', borderStyle);
                    alertBox.style.setProperty('--card-border-color', `rgba(${brVal},${bgVal},${bbVal},${bOp})`);
                    
                    if (!showCard) {
                        alertBox.classList.add('no-card-bg');
                        const alertFrame = alertBox.closest('.alert-frame');
                        if (alertFrame) alertFrame.classList.add('no-card-bg');
                    } else {
                        alertBox.classList.remove('no-card-bg');
                        const alertFrame = alertBox.closest('.alert-frame');
                        if (alertFrame) alertFrame.classList.remove('no-card-bg');
                    }
                }
            }

            // Aplicar fuentes y sombras dinámicas en base a la alerta activa actual
            loadFontDynamically(fontFamily);
            applyTextShadow(textShadow, theme.color);

            // Construir texto del username con efecto de rebote letra por letra
            const $usernameContainer = $("#usernameContainer");
            $usernameContainer.removeClass("rainbow-text");
            $usernameContainer.empty();

            const name = data.user || "Anónimo";
            // Activar arcoíris si está habilitado
            if (rainbowText) {
                $usernameContainer.addClass("rainbow-text");
            }

            name.split("").forEach((char, index) => {
                const $span = $("<span>").text(char === " " ? "\u00A0" : char);
                if (bounceText) {
                    $span.addClass("bounce-char");
                    $span.css("--delay", `${index * 0.05}s`);
                }
                $usernameContainer.append($span);
            });

            // Configurar Lottie / Avatar / Fallbacks Nativos
            const $mediaContainer = $("#mediaContainer");
            $mediaContainer.find("lottie-player").remove();
            $mediaContainer.find(".main-heart-container").remove();
            $mediaContainer.find(".fallback-badge-container").remove();
            
            const $userAvatar = $("#userAvatar");
            $userAvatar.hide().removeClass("avatar-sync-pulse"); // Reset position/pulse styling
            
            // Limpiar cualquier intervalo de likes anterior
            if (likeStormInterval) {
                clearInterval(likeStormInterval);
                likeStormInterval = null;
            }

            if (showLottie) {
                if (type === 'like') {
                    // 1. Inyectar corazón principal para tormenta de likes
                    const $heartContainer = $("<div>").addClass("main-heart-container");
                    $heartContainer.html(`
                        <svg class="main-heart-svg" viewBox="0 0 24 24" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="var(--like-heart-color-start, #ff0844)" />
                                    <stop offset="100%" stop-color="var(--like-heart-color-end, #ffb199)" />
                                </linearGradient>
                            </defs>
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" 
                                  fill="url(#heartGrad)" 
                                  stroke="var(--like-heart-border-color, transparent)" 
                                  stroke-width="var(--like-heart-border-width, 0px)"
                                  style="vector-effect: non-scaling-stroke;" />
                        </svg>
                    `);
                    $mediaContainer.append($heartContainer);

                    // 2. Si hay avatar de usuario, se muestra con pulso sincronizado en la capa superior
                    if (data.profilePic) {
                        $userAvatar.attr("src", data.profilePic).addClass("avatar-sync-pulse").show();
                    } else {
                        $userAvatar.hide();
                    }

                    // 3. Crear contenedor de corazones flotantes si no existe
                    let $heartsContainer = $("#floatingHeartsContainer");
                    if ($heartsContainer.length === 0) {
                        $heartsContainer = $("<div>").attr("id", "floatingHeartsContainer").addClass("floating-hearts-container");
                        $("body").append($heartsContainer);
                    }

                    // 4. Iniciar flujo de corazones flotantes
                    likeStormInterval = setInterval(() => {
                        const container = document.getElementById('floatingHeartsContainer');
                        if (!container) return;

                        const heart = document.createElement('div');
                        heart.className = 'floating-heart';

                        // Propiedades aleatorias
                        const size = Math.random() * 20 + 20; // 20px a 40px
                        const left = 50 + (Math.random() * 30 - 15); // 35vw a 65vw
                        const duration = Math.random() * 1.2 + 2.4; // 2.4s a 3.6s
                        const color = HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)];
                        
                        heart.style.width = `${size}px`;
                        heart.style.height = `${size}px`;
                        heart.style.left = `${left}vw`;
                        heart.style.animationDuration = `${duration}s`;
                        
                        // Variables CSS personalizadas de desviación
                        const drift1 = Math.random() * 120 - 60;
                        const drift2 = Math.random() * 400 - 200;
                        const rot1 = Math.random() * 60 - 30;
                        const rot2 = Math.random() * 360 - 180;
                        
                        heart.style.setProperty('--drift-1', `${drift1}px`);
                        heart.style.setProperty('--drift-2', `${drift2}px`);
                        heart.style.setProperty('--rot-1', `${rot1}deg`);
                        heart.style.setProperty('--rot-2', `${rot2}deg`);

                        // SVG del corazón flotante
                        heart.innerHTML = `
                            <svg viewBox="0 0 24 24" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${color}" />
                            </svg>
                        `;

                        container.appendChild(heart);
                        
                        // Remover después de que termine la animación
                        heart.addEventListener('animationend', () => heart.remove());
                    }, 120);
                } else if (type === 'follow') {
                    // SVG fallback para seguidor (Silueta de usuario premium rosa)
                    const $badgeContainer = $("<div>").addClass("fallback-badge-container");
                    $badgeContainer.html(`
                        <svg class="follow-badge-svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="followGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ec4899" />
                                    <stop offset="100%" stop-color="#f472b6" />
                                </linearGradient>
                            </defs>
                            <circle cx="50" cy="50" r="45" stroke="url(#followGrad)" stroke-width="4" fill="rgba(236, 72, 153, 0.1)" />
                            <path d="M50 52C58.2843 52 65 45.2843 65 37C65 28.7157 58.2843 22 50 22C41.7157 22 35 28.7157 35 37C35 45.2843 41.7157 52 50 52Z" fill="url(#followGrad)" />
                            <path d="M50 58C37.8497 58 28 67.8497 28 80H72C72 67.8497 62.1503 58 50 58Z" fill="url(#followGrad)" />
                            <circle cx="75" cy="75" r="13" fill="#ec4899" />
                            <path d="M75 70V80M70 75H80" stroke="white" stroke-width="2.5" stroke-linecap="round" />
                        </svg>
                    `);
                    $mediaContainer.append($badgeContainer);
                    if (data.profilePic) {
                        $userAvatar.attr("src", data.profilePic).show();
                    }
                } else if (type === 'gift') {
                    // SVG fallback para regalo (Caja de regalo dorada 3D)
                    const $badgeContainer = $("<div>").addClass("fallback-badge-container");
                    $badgeContainer.html(`
                        <svg class="gift-box-svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="giftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#eab308" />
                                    <stop offset="100%" stop-color="#f59e0b" />
                                </linearGradient>
                                <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ef4444" />
                                    <stop offset="100%" stop-color="#b91c1c" />
                                </linearGradient>
                            </defs>
                            <rect x="25" y="40" width="50" height="42" rx="6" fill="url(#giftGrad)" stroke="#fef08a" stroke-width="2" />
                            <rect x="20" y="32" width="60" height="12" rx="3" fill="url(#giftGrad)" stroke="#fef08a" stroke-width="2" />
                            <rect x="44" y="32" width="12" height="50" fill="url(#ribbonGrad)" />
                            <rect x="20" y="44" width="60" height="10" fill="url(#ribbonGrad)" />
                            <path d="M50 32C42 22 52 14 50 25C48 14 58 22 50 32Z" fill="url(#ribbonGrad)" stroke="#fee2e2" stroke-width="1.5" />
                        </svg>
                    `);
                    $mediaContainer.append($badgeContainer);
                    if (data.profilePic) {
                        $userAvatar.attr("src", data.profilePic).show();
                    }
                } else if (type === 'subscribe') {
                    // SVG fallback para suscripción (Trofeo estrella cian brillante)
                    const $badgeContainer = $("<div>").addClass("fallback-badge-container");
                    $badgeContainer.html(`
                        <svg class="trophy-svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#06b6d4" />
                                    <stop offset="100%" stop-color="#0891b2" />
                                </linearGradient>
                            </defs>
                            <path d="M30 25H70V45C70 56 61 65 50 65C39 65 30 56 30 45V25Z" fill="url(#trophyGrad)" stroke="#cffafe" stroke-width="2" />
                            <path d="M50 65V80M38 80H62" stroke="url(#trophyGrad)" stroke-width="6" stroke-linecap="round" />
                            <path d="M30 30H20C14.5 30 14.5 40 20 40H30" stroke="url(#trophyGrad)" stroke-width="4" stroke-linecap="round" />
                            <path d="M70 30H80C85.5 30 85.5 40 80 40H70" stroke="url(#trophyGrad)" stroke-width="4" stroke-linecap="round" />
                            <path d="M50 30L53 37L61 38L55 43L57 51L50 47L43 51L45 43L39 38L47 37L50 30Z" fill="#cffafe" />
                        </svg>
                    `);
                    $mediaContainer.append($badgeContainer);
                    if (data.profilePic) {
                        $userAvatar.attr("src", data.profilePic).show();
                    }
                }
            } else {
                // Si no se muestra Lottie, solo mostramos el avatar si existe
                if (data.profilePic) {
                    $userAvatar.attr("src", data.profilePic).show();
                }
            }

            // Reproducir Audio
            if (playAudio) {
                const $audio = $("#alertAudio");
                const audioUrl = theme.audio || theme.defaultAudio;
                $audio.attr("src", audioUrl);
                const audioEl = $audio[0];
                audioEl.volume = alertVolume / 100;
                
                // Forzar play con manejo de políticas del navegador
                audioEl.play().catch(e => console.warn("[Audio] Interacción bloqueada por el navegador:", e));
            }

            // Disparar explosión de partículas de colores (Confeti)
            spawnParticles(theme.color, type);

            // TTS (Text to Speech) - Leer mensaje en voz alta
            triggerTTS(data, ttsEnabled);

            // Mostrar el overlay con animación
            $wrapper.css("display", "flex").addClass("anim-enter");

            // Watchdog de seguridad: desbloquea la cola si algo falla inesperadamente
            const watchdogTimer = setTimeout(() => {
                if (isAlertPlaying) {
                    console.warn('[ZeroFM Watchdog] Cola desbloqueada por timeout de seguridad (12s)');
                    $wrapper.hide();
                    isAlertPlaying = false;
                    if (likeStormInterval) {
                        clearInterval(likeStormInterval);
                        likeStormInterval = null;
                    }
                    processQueue();
                }
            }, 12000);

            // Duración de la alerta (5.5 segundos)
            activeAlertTimeout = setTimeout(() => {
                clearTimeout(watchdogTimer); // Watchdog ya no es necesario
                $wrapper.addClass("anim-exit");
                activeAlertExitTimeout = setTimeout(() => {
                    $wrapper.hide();
                    isAlertPlaying = false;
                    if (likeStormInterval) {
                        clearInterval(likeStormInterval);
                        likeStormInterval = null;
                    }
                    processQueue(); // Siguiente alerta
                }, 400);
            }, 5500);
        }

        // =============================================
        //  SPAWN PARTICLES (Confeti Premium)
        // =============================================
        // =============================================
        //  SPAWN PARTICLES (Confeti Premium + Emojis)
        // =============================================
        const PARTICLE_EMOJIS = {
            follow:    ['⭐', '✨', '💫', '🌟'],
            gift:      ['🪙', '💰', '✨', '💛'],
            subscribe: ['✨', '💎', '⚡', '🌀'],
            like:      ['❤️', '💗', '💖', '💝']
        };

        function spawnParticles(color, type) {
            const container = document.body;
            const emojis = PARTICLE_EMOJIS[type] || ['✨', '⭐', '💫'];

            // --- Partículas geométricas (reducidas a 22) ---
            for (let i = 0; i < 22; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = Math.random() > 0.45 ? color : '#ffffff';
                const size = Math.random() * 10 + 5;
                particle.style.width  = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = '50vw';
                particle.style.top  = '45vh';
                const angle    = Math.random() * Math.PI * 2;
                const distance = Math.random() * 240 + 80;
                particle.style.setProperty('--tx',  `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty',  `${Math.sin(angle) * distance}px`);
                particle.style.setProperty('--rot', `${Math.random() * 720 - 360}deg`);
                container.appendChild(particle);
                particle.addEventListener('animationend', () => particle.remove());
            }

            // --- Partículas emoji tipo-específicas (16) ---
            for (let i = 0; i < 16; i++) {
                const p = document.createElement('div');
                p.className = 'particle-emoji';
                p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.fontSize = `${Math.random() * 10 + 14}px`;
                p.style.left = '50vw';
                p.style.top  = '45vh';
                const angle    = Math.random() * Math.PI * 2;
                const distance = Math.random() * 190 + 60;
                p.style.setProperty('--tx',  `${Math.cos(angle) * distance}px`);
                p.style.setProperty('--ty',  `${Math.sin(angle) * distance}px`);
                p.style.setProperty('--rot', `${Math.random() * 360 - 180}deg`);
                p.style.animationDelay = `${Math.random() * 0.25}s`;
                container.appendChild(p);
                p.addEventListener('animationend', () => p.remove());
            }
        }

        // =============================================
        //  TEXT-TO-SPEECH (TTS)
        // =============================================

        // Caché de voces — se llena cuando el navegador las tiene listas
        let _cachedVoices = [];
        if ('speechSynthesis' in window) {
            const _loadVoices = () => { _cachedVoices = window.speechSynthesis.getVoices(); };
            _loadVoices(); // intento inicial (puede estar vacío en Chrome)
            window.speechSynthesis.addEventListener('voiceschanged', _loadVoices);
        }

        function triggerTTS(data, ttsEnabled, onEndCallback) {
            if (!('speechSynthesis' in window) || !ttsEnabled) {
                if (onEndCallback) onEndCallback();
                return;
            }
            
            const isChat = data.type === 'chat';
            const text = isChat 
                ? (data.message || "") 
                : `${data.user} ${data.message.replace(/🎁|👤|⭐|❤️/g, "")}`;

            if (!text.trim()) {
                if (onEndCallback) onEndCallback();
                return;
            }
            
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                const config = window.overlayAlertsConfig || {};
                
                if (isChat) {
                    utterance.lang = config.chatTtsLanguage || 'es-MX';
                    const speed = data.speedOverride !== undefined ? data.speedOverride : (config.chatTtsSpeed !== undefined ? config.chatTtsSpeed : 50);
                    const pitch = data.pitchOverride !== undefined ? data.pitchOverride : (config.chatTtsPitch !== undefined ? config.chatTtsPitch : 50);
                    const volume = config.chatTtsVolume !== undefined ? config.chatTtsVolume : 80;
                    
                    utterance.rate = speed / 50;
                    utterance.pitch = pitch / 50;
                    utterance.volume = volume / 100;
                    
                    if (data.voiceOverride && data.voiceOverride !== 'Default Voice' && data.voiceOverride !== '') {
                        const customVoice = _cachedVoices.find(v => v.name === data.voiceOverride);
                        if (customVoice) utterance.voice = customVoice;
                    } else if (config.chatTtsRandomVoice === true) {
                        const filtered = _cachedVoices.filter(v => v.lang.startsWith(utterance.lang));
                        if (filtered.length > 0) {
                            utterance.voice = filtered[Math.floor(Math.random() * filtered.length)];
                        }
                    } else if (config.chatTtsVoice && config.chatTtsVoice !== 'Default Voice') {
                        const customVoice = _cachedVoices.find(v => v.name === config.chatTtsVoice);
                        if (customVoice) utterance.voice = customVoice;
                    } else {
                        const esVoice = _cachedVoices.find(v => v.lang.includes('es') || v.lang.includes('ES'));
                        if (esVoice) utterance.voice = esVoice;
                    }
                } else {
                    utterance.lang = 'es-MX';
                    const esVoice = _cachedVoices.find(v => v.lang.includes('es') || v.lang.includes('ES'));
                    if (esVoice) utterance.voice = esVoice;
                    utterance.rate = 1.0;
                    utterance.volume = 0.85;
                }
                
                let calledEnd = false;
                const done = () => {
                    if (calledEnd) return;
                    calledEnd = true;
                    if (onEndCallback) onEndCallback();
                };
                
                utterance.onend = done;
                utterance.onerror = done;
                
                // Fallback timeout
                const charCount = text.length;
                const estDuration = (charCount * 80) + 1500;
                setTimeout(done, Math.max(2000, Math.min(10000, estDuration)));
                
                window.speechSynthesis.speak(utterance);
            }, isChat ? 50 : 1000);
        }

        // =============================================
        //  PREVIEW / DEMO
        // =============================================
        window.preview = function(type) {
            const types = ['follow', 'gift', 'subscribe', 'like'];
            const chosenType = type || types[Math.floor(Math.random() * types.length)];
            
            let mockData = {};
            if (chosenType === 'follow') {
                mockData = {
                    type: 'follow',
                    user: "ZeroFM_Lover",
                    message: "¡Gracias por seguir el canal! 👤",
                    profilePic: "https://i.pravatar.cc/100?img=21"
                };
            } else if (chosenType === 'gift') {
                mockData = {
                    type: 'gift',
                    user: "GifterPro",
                    giftName: "TikTok Rose",
                    coins: 10,
                    message: "¡Gracias por 10x TikTok Rose! 🎁",
                    profilePic: "https://i.pravatar.cc/100?img=12"
                };
            } else if (chosenType === 'subscribe') {
                mockData = {
                    type: 'subscribe',
                    user: "MusicFanatic",
                    message: "¡Gracias por suscribirte al canal! ⭐",
                    profilePic: "https://i.pravatar.cc/100?img=33"
                };
            } else if (chosenType === 'like') {
                mockData = {
                    type: 'like',
                    user: "SuperLiker",
                    likes: 1200,
                    message: "¡Envió 1,200 likes! ❤️",
                    profilePic: "https://i.pravatar.cc/100?img=47"
                };
            }
            
            addAlert(mockData);
        };

        // Receptor de eventos de mensajería (postMessage) para simulación local offline y actualizaciones en tiempo real
        window.addEventListener('message', function(event) {
            if (!event.data) return;
            
            if (event.data.action === 'triggerTestAlert') {
                console.log("[alerts_overlay] Alerta de prueba local recibida:", event.data.payload);
                const payload = event.data.payload;
                // Filtrar simulación por tipo si la URL está restringida
                if (urlType === 'all' || payload.type === urlType) {
                    addAlert(payload);
                }
            } else if (event.data.action === 'updateLiveConfig') {
                console.log("[alerts_overlay] Configuración en tiempo real recibida:", event.data.config);
                window.overlayAlertsConfig = event.data.config;
                // Aplicar estilos estáticos inmediatos
                applyInitialStyles();
                
                // Si la alerta actual está reproduciéndose, actualizarla en tiempo real en el DOM
                if (isAlertPlaying) {
                    const config = window.overlayAlertsConfig || {};
                    const alertBox = document.querySelector('.alert-box');
                    const alertFrame = document.querySelector('.alert-frame');
                    if (alertBox) {
                        let opacity = 0.76;
                        let radius = 28;
                        let fontSize = 16;
                        let showCard = true;
                        let fontFamily = 'Outfit';
                        let textShadow = '3d-retro';
                        let messageTemplate = '';
                        
                        let borderWidth = 1;
                        let borderColor = '#ffffff';
                        let borderOpacity = 8;
                        let borderStyle = 'solid';
                        
                        const $wrapper = $("#alertWrapper");
                        let type = 'follow';
                        if ($wrapper.hasClass('type-like')) type = 'like';
                        else if ($wrapper.hasClass('type-gift')) type = 'gift';
                        else if ($wrapper.hasClass('type-subscribe')) type = 'subscribe';
                        
                        if (type === 'follow') {
                            opacity = config.followOpacity !== undefined ? config.followOpacity : 0.76;
                            radius = config.followRadius !== undefined ? config.followRadius : 28;
                            fontSize = config.followFontSize !== undefined ? config.followFontSize : 16;
                            showCard = config.followShowCard !== undefined ? config.followShowCard : true;
                            fontFamily = config.followFontFamily !== undefined ? config.followFontFamily : 'Outfit';
                            textShadow = config.followTextShadow !== undefined ? config.followTextShadow : '3d-retro';
                            borderWidth = config.followBorderWidth !== undefined ? config.followBorderWidth : 1;
                            borderColor = config.followBorderColor || '#ffffff';
                            borderOpacity = config.followBorderOpacity !== undefined ? config.followBorderOpacity : 8;
                            borderStyle = config.followBorderStyle || 'solid';
                            messageTemplate = config.followsAlertMsg || '¡gracias por seguir el canal! 👤';
                        } else if (type === 'like') {
                            opacity = config.likeOpacity !== undefined ? config.likeOpacity : 0.76;
                            radius = config.likeRadius !== undefined ? config.likeRadius : 28;
                            fontSize = config.likeFontSize !== undefined ? config.likeFontSize : 16;
                            showCard = config.likeShowCard !== undefined ? config.likeShowCard : true;
                            fontFamily = config.likeFontFamily !== undefined ? config.likeFontFamily : 'Outfit';
                            textShadow = config.likeTextShadow !== undefined ? config.likeTextShadow : '3d-retro';
                            messageTemplate = config.likesAlertMsg || '¡Envió {likes} likes! ❤️';
                            borderWidth = config.likeBorderWidth !== undefined ? config.likeBorderWidth : 1;
                            borderColor = config.likeBorderColor || '#ffffff';
                            borderOpacity = config.likeBorderOpacity !== undefined ? config.likeBorderOpacity : 8;
                            borderStyle = config.likeBorderStyle || 'solid';

                            const heartSize = config.likeHeartSize !== undefined ? config.likeHeartSize : 190;
                            const usernameSize = config.likeUsernameSize !== undefined ? config.likeUsernameSize : 35;
                            const messageSize = config.likeMessageSize !== undefined ? config.likeMessageSize : 20;
                            const wrapperHeight = config.likeWrapperHeight !== undefined ? config.likeWrapperHeight : 290;
                            document.documentElement.style.setProperty('--like-heart-size', heartSize + 'px');
                            document.documentElement.style.setProperty('--like-username-size', usernameSize + 'px');
                            document.documentElement.style.setProperty('--like-message-size', messageSize + 'px');
                            document.documentElement.style.setProperty('--like-wrapper-height', wrapperHeight + 'px');
                        } else if (type === 'gift') {
                            opacity = config.giftOpacity !== undefined ? config.giftOpacity : 0.76;
                            radius = config.giftRadius !== undefined ? config.giftRadius : 28;
                            fontSize = config.giftFontSize !== undefined ? config.giftFontSize : 16;
                            showCard = config.giftShowCard !== undefined ? config.giftShowCard : true;
                            fontFamily = config.giftFontFamily !== undefined ? config.giftFontFamily : 'Outfit';
                            textShadow = config.giftTextShadow !== undefined ? config.giftTextShadow : '3d-retro';
                            borderWidth = config.giftBorderWidth !== undefined ? config.giftBorderWidth : 1;
                            borderColor = config.giftBorderColor || '#ffffff';
                            borderOpacity = config.giftBorderOpacity !== undefined ? config.giftBorderOpacity : 8;
                            borderStyle = config.giftBorderStyle || 'solid';
                            messageTemplate = config.giftsAlertMsg || '¡Gracias por {repeatCount}x {giftName}! 🎁';
                        } else if (type === 'subscribe') {
                            opacity = config.subscribeOpacity !== undefined ? config.subscribeOpacity : 0.76;
                            radius = config.subscribeRadius !== undefined ? config.subscribeRadius : 28;
                            fontSize = config.subscribeFontSize !== undefined ? config.subscribeFontSize : 16;
                            showCard = config.subscribeShowCard !== undefined ? config.subscribeShowCard : true;
                            fontFamily = config.subscribeFontFamily !== undefined ? config.subscribeFontFamily : 'Outfit';
                            textShadow = config.subscribeTextShadow !== undefined ? config.subscribeTextShadow : '3d-retro';
                            borderWidth = config.subscribeBorderWidth !== undefined ? config.subscribeBorderWidth : 1;
                            borderColor = config.subscribeBorderColor || '#ffffff';
                            borderOpacity = config.subscribeBorderOpacity !== undefined ? config.subscribeBorderOpacity : 8;
                            borderStyle = config.subscribeBorderStyle || 'solid';
                            messageTemplate = config.subsAlertMsg || '¡gracias por suscribirte al canal! ⭐';
                        }
                        
                        alertBox.style.setProperty('--card-bg-opacity', opacity);
                        alertBox.style.setProperty('--card-border-radius', radius + 'px');
                        document.documentElement.style.setProperty('--font-size-base', fontSize + 'px');
                        
                        alertBox.style.setProperty('--card-border-width', borderWidth + 'px');
                        alertBox.style.setProperty('--card-border-style', borderStyle);
                        const brVal = parseInt(borderColor.substr(1,2), 16) || 255;
                        const bgVal = parseInt(borderColor.substr(3,2), 16) || 255;
                        const bbVal = parseInt(borderColor.substr(5,2), 16) || 255;
                        const bOp = borderOpacity / 100;
                        alertBox.style.setProperty('--card-border-color', `rgba(${brVal},${bgVal},${bbVal},${bOp})`);
                        
                        if (!showCard) {
                            alertBox.classList.add('no-card-bg');
                            if (alertFrame) alertFrame.classList.add('no-card-bg');
                        } else {
                            alertBox.classList.remove('no-card-bg');
                            if (alertFrame) alertFrame.classList.remove('no-card-bg');
                        }
                        
                        loadFontDynamically(fontFamily);
                        const theme = ALERT_THEMES[type] || ALERT_THEMES.follow;
                        applyTextShadow(textShadow, theme.color);
                        
                        // Actualizar mensaje en tiempo real si cambió
                        if (messageTemplate) {
                            let formattedMsg = messageTemplate;
                            if (type === 'follow') {
                                formattedMsg = formattedMsg.replace(/{user}/g, 'PruebaSeguidor');
                            } else if (type === 'like') {
                                formattedMsg = formattedMsg
                                    .replace(/{user}/g, 'PruebaLikes')
                                    .replace(/{likes}/g, '150')
                                    .replace(/{total}/g, '1500')
                                    .replace(/{milestone}/g, '100');
                            } else if (type === 'gift') {
                                formattedMsg = formattedMsg
                                    .replace(/{user}/g, 'PruebaRegalo')
                                    .replace(/{giftName}/g, 'Rosa')
                                    .replace(/{giftname}/g, 'Rosa')
                                    .replace(/{repeatCount}/g, '1')
                                    .replace(/{repeatcount}/g, '1')
                                    .replace(/{coins}/g, '1')
                                    .replace(/{total}/g, '10')
                                    .replace(/{totalCoins}/g, '10');
                            } else if (type === 'subscribe') {
                                formattedMsg = formattedMsg.replace(/{user}/g, 'PruebaSubs');
                            }
                            $("#alertMessage").text(formattedMsg);
                        }
                    }
                    
                    // Prolongar la duración de la alerta mientras el usuario configure cosas
                    if (activeAlertTimeout) clearTimeout(activeAlertTimeout);
                    if (activeAlertExitTimeout) clearTimeout(activeAlertExitTimeout);
                    
                    const $wrapper = $("#alertWrapper");
                    $wrapper.removeClass("anim-exit"); // Evitar animación de salida durante edición
                    
                    activeAlertTimeout = setTimeout(() => {
                        $wrapper.addClass("anim-exit");
                        activeAlertExitTimeout = setTimeout(() => {
                            $wrapper.hide();
                            isAlertPlaying = false;
                            if (likeStormInterval) {
                                clearInterval(likeStormInterval);
                                likeStormInterval = null;
                            }
                            processQueue();
                        }, 400);
                    }, 5500); // 5.5 segundos más
                }
            }
        });
    </script>
