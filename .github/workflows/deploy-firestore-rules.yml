name: Deploy Firestore Rules

on:
  push:
    branches:
      - main
    paths:
      - "firestore.rules"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-firestore-rules.yml"
  workflow_dispatch:

jobs:
  deploy-firestore-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate required secret
        env:
          FIREBASE_SERVICE_ACCOUNT_ZERO_STROM_WEB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZERO_STROM_WEB }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_ZERO_STROM_WEB" ]; then
            echo "Falta el secreto FIREBASE_SERVICE_ACCOUNT_ZERO_STROM_WEB en GitHub Actions."
            exit 1
          fi

      - name: Debug secret target
        env:
          FIREBASE_SERVICE_ACCOUNT_ZERO_STROM_WEB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZERO_STROM_WEB }}
        run: |
          python3 - <<'PY'
          import json, os
          raw = os.environ["FIREBASE_SERVICE_ACCOUNT_ZERO_STROM_WEB"]
          data = json.loads(raw)
          print("Secret project_id:", data.get("project_id", ""))
          print("Secret client_email:", data.get("client_email", ""))
          PY

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZERO_STROM_WEB }}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules
        run: firebase deploy --only firestore:rules --project zero-strom-web --non-interactive --debug
